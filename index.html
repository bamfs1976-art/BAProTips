<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111118">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
<title>Booking Analytics Pro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d14;--card:#1a1a24;--card2:#242430;--yellow:#ffd700;--red:#e53333;
--green:#33d96a;--orange:#f59e0b;--blue:#6699ff;--purple:#a78bfa;--cyan:#22d3ee;
--text:#fff;--text2:#999;--text3:#8b929d;--divider:#262630;--radius:16px;
--role-cta:var(--yellow);--role-win:var(--green);--role-warn:var(--orange);--role-info:var(--blue);
--nav-bg:rgba(13,13,20,0.92);--nav-safe-bg:rgba(13,13,20,0.92);
--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,34px);
}
html[data-theme="light"]{
--bg:#f5f0e8;--card:#fffcf5;--card2:#f0ead8;--yellow:#c85a00;--red:#b5000a;
--green:#1a7a3c;--orange:#c47a00;--blue:#1558a8;--purple:#7c3aed;--cyan:#0d7a8a;
--text:#1a1410;--text2:#5c4a35;--text3:#6a5a4a;--divider:#e8e0cc;
--role-cta:#c85a00;--role-win:#1a7a3c;--role-warn:#c47a00;--role-info:#1558a8;
--nav-bg:rgba(245,240,232,0.95);--nav-safe-bg:rgba(245,240,232,0.95);
}
html[data-theme="light"] .nav-bar{background:var(--nav-bg)}
html[data-theme="light"] .nav-safe{background:var(--nav-safe-bg)}
html[data-theme="light"] .sec-nav{background:var(--card)}
html[data-theme="light"] .msheet{background:var(--bg)}
html[data-theme="light"] .mhdr{background:var(--bg)}
html[data-theme="light"] .onboard-card{background:var(--card);border-color:var(--divider)}
html[data-theme="light"] .acca-footer{background:rgba(0,0,0,.02)}
html[data-theme="light"] .predcard{background:linear-gradient(135deg,#f5f0e8,#eee8d8);border-color:rgba(21,88,168,.15)}
html[data-theme="light"] .predcard .ptitle{color:var(--blue)}
html[data-theme="light"] .acca-img{background:linear-gradient(135deg,#f5f0e8,#ece4d0,#e8f0e8);color:var(--text)}
html[data-theme="light"] .acca-img .watermark{color:rgba(26,20,16,.3)}
html[data-theme="light"] .copy-toast{background:var(--green);color:#fff}
html[data-theme="light"] .acc-bar{background:linear-gradient(135deg,rgba(26,122,60,.05),rgba(26,122,60,.02));border-color:rgba(26,122,60,.1)}
html[data-theme="light"] .share-card{background:linear-gradient(135deg,#f5f0e8,#ece4d0);border-color:rgba(200,90,0,.1)}
html[data-theme="light"] .share-card::after{color:var(--text3)}
html[data-theme="light"] .vbadge.good{color:var(--green);background:rgba(26,122,60,.1)}
html[data-theme="light"] .vbadge.fair{color:var(--orange);background:rgba(196,122,0,.1)}
html[data-theme="light"] .vbadge.poor{color:var(--red);background:rgba(181,0,10,.1)}
html[data-theme="light"] .pill.on{background:rgba(200,90,0,.1);color:var(--yellow);border-color:rgba(200,90,0,.25)}
html[data-theme="light"] .lpill.on{background:rgba(200,90,0,.08);color:var(--yellow);border-color:rgba(200,90,0,.2)}
html[data-theme="light"] .spick{background:rgba(200,90,0,.08);color:var(--yellow)}
html[data-theme="light"] .lopt.sel{background:rgba(200,90,0,.06);border-color:rgba(200,90,0,.2)}
html[data-theme="light"] .sus-alert{background:rgba(200,90,0,.06);border-color:rgba(200,90,0,.1)}
html[data-theme="light"] .live-alert{background:rgba(181,0,10,.05);border-color:rgba(181,0,10,.1)}
html[data-theme="light"] .live-alert.warn{background:rgba(196,122,0,.06);border-color:rgba(196,122,0,.1)}
html[data-theme="light"] .acca-type.match{color:var(--blue);background:rgba(21,88,168,.1)}
html[data-theme="light"] .acca-type.corners{color:var(--cyan);background:rgba(13,122,138,.1)}
html[data-theme="light"] .acca-type.bookings{color:var(--yellow);background:rgba(200,90,0,.1)}
html[data-theme="light"] .acca-type.value{color:var(--purple);background:rgba(124,58,237,.1)}
html[data-theme="light"] .acca-copy{background:var(--card2);border-color:var(--divider);color:var(--text2)}
html[data-theme="light"] .acca-share{background:rgba(21,88,168,.08);border-color:rgba(21,88,168,.18);color:var(--blue)}
html[data-theme="light"] .share-btn{background:rgba(21,88,168,.06);border-color:rgba(21,88,168,.12);color:var(--blue)}
html[data-theme="light"] .ttip{background:rgba(21,88,168,.12);color:var(--blue);border-color:rgba(21,88,168,.22)}
html[data-theme="light"] .ttip:hover{background:rgba(21,88,168,.22)}
html[data-theme="light"] .ttip:focus{outline:2px solid var(--blue)}
html[data-theme="light"] .tooltip-pop{border-color:var(--yellow)}
html[data-theme="light"] .tooltip-pop .tp-title{color:var(--yellow)}
html[data-theme="light"] .stab.on{color:var(--yellow);border-bottom-color:var(--yellow)}
html[data-theme="light"] .sec-nav-btn.active{color:var(--yellow);border-bottom-color:var(--yellow)}
html[data-theme="light"] .nav-btn.active{color:var(--yellow)}
html[data-theme="light"] .nav-btn.active svg{filter:drop-shadow(0 0 4px rgba(200,90,0,.4))}
html[data-theme="light"] .mclose{color:var(--yellow)}
html[data-theme="light"] .form-W{background:var(--green);color:#fff}
html[data-theme="light"] .form-L{background:var(--red);color:#fff}
html[data-theme="light"] .ctable .win{color:var(--yellow);background:rgba(200,90,0,.04)}
html[data-theme="light"] .spin{border-top-color:var(--yellow)}
html[data-theme="light"] .sinput:focus{border-color:var(--yellow)}
html[data-theme="light"] .btn-p{background:var(--yellow);color:#fff}
html[data-theme="light"] .onboard-card h2 span{color:var(--yellow)}
html[data-theme="light"] .rcard-rank.top3{color:var(--yellow);text-shadow:0 0 10px rgba(200,90,0,.3)}
html[data-theme="light"] .ldot{background:var(--green);box-shadow:0 0 8px var(--green)}
html[data-theme="light"] .demo-banner{background:rgba(196,122,0,.08);border-color:rgba(196,122,0,.2);color:var(--orange)}
#theme-toggle-btn{position:fixed;top:calc(var(--safe-top) + 8px);right:12px;z-index:95;width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--divider);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;touch-action:manipulation}
body{padding-top:var(--safe-top)}
::-webkit-scrollbar{width:0;height:0}
#app{display:flex;flex-direction:column;height:100%}
.tab-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bottom))}

.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--divider);z-index:100;display:flex;flex-direction:column}
.nav-row{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-row::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#6b7280;font-size:10px;font-weight:500;padding:8px 12px 6px;cursor:pointer;transition:color .2s;min-width:56px}
.nav-btn.active{color:var(--yellow)}
.nav-btn svg{width:18px;height:18px;fill:currentColor}
.nav-btn.active svg{filter:drop-shadow(0 0 4px rgba(255,215,0,.4))}
.nav-safe{height:var(--safe-bottom);background:var(--nav-safe-bg)}

.pg-title{font-size:24px;font-weight:800;padding:14px 20px 6px;letter-spacing:-.5px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.card-flush{padding:0;overflow:hidden}
.sec-title{font-size:13px;font-weight:700;padding:10px 20px 6px;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 10px}
.stat-grid-3{grid-template-columns:1fr 1fr 1fr}
.stat-card{background:var(--card);border-radius:var(--radius);padding:12px}
.stat-card .lb{font-size:10px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.stat-card .vl{font-size:22px;font-weight:800;letter-spacing:-.5px}
.stat-card .sub{font-size:10px;color:var(--text3);margin-top:2px}

.pills{display:flex;gap:6px;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:6px}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 14px;min-height:36px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--card2);color:var(--text2);border:1px solid transparent;transition:all .2s;white-space:nowrap}
.pill.on{background:rgba(255,215,0,.12);color:var(--yellow);border-color:rgba(255,215,0,.3)}
.pill.red{background:rgba(229,51,51,.12);color:var(--red);border-color:rgba(229,51,51,.3)}

.ci{display:inline-block;border-radius:2px;vertical-align:middle;flex-shrink:0}
.ci-y{background:var(--yellow)}.ci-r{background:var(--red)}.ci-yr{background:linear-gradient(90deg,var(--yellow) 50%,var(--red) 50%)}

.prow{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s}
.prow:active{background:var(--card2)}
.prank{font-size:12px;font-weight:700;color:var(--text3);width:20px;text-align:center}
.pphoto{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--card2);flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pteam{font-size:10px;color:var(--text2);display:flex;align-items:center;gap:3px}
.pteam img{width:12px;height:12px}
.pcards{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pcc{font-size:11px;font-weight:700;display:flex;align-items:center;gap:2px}
.rbadge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;flex-shrink:0;text-transform:uppercase}
.rdiv{height:1px;background:var(--divider);margin:0 14px 0 44px}

.sbar{display:flex;align-items:center;gap:8px;background:var(--card2);border-radius:12px;padding:9px 14px;margin:6px 16px}
.sbar input{flex:1;background:none;border:none;color:var(--text);font-size:14px;outline:none}
.sbar input::placeholder{color:var(--text3)}
.sbar svg{width:16px;height:16px;fill:var(--text3);flex-shrink:0}

.lpill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:18px;font-size:11px;font-weight:500;background:var(--card2);color:var(--text2);border:1px solid transparent;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .2s;margin-right:5px}
.lpill.on{background:rgba(255,215,0,.1);color:var(--yellow);border-color:rgba(255,215,0,.25)}
.lpill img{width:14px;height:14px;flex-shrink:0}
.lpill{gap:4px}
.lrow{padding:6px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
.lrow::-webkit-scrollbar{display:none}
/* League Picker v2 — tap-to-open modal */
.lp-trigger{display:flex;align-items:center;gap:8px;padding:8px 14px;margin:4px 16px;background:var(--card);border:1px solid var(--divider);border-radius:12px;cursor:pointer;transition:background .15s}
.lp-trigger:active{background:var(--card2)}
.lp-trigger .lp-logo{width:22px;height:22px;flex-shrink:0}
.lp-trigger .lp-name{font-size:13px;font-weight:600;flex:1}
.lp-trigger .lp-arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.lp-cats{padding:0}
.lp-cat-hdr{display:flex;align-items:center;gap:6px;padding:10px 16px 6px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none}
.lp-cat-hdr .lp-cat-arrow{font-size:10px;transition:transform .2s;margin-left:auto}
.lp-cat-hdr.collapsed .lp-cat-arrow{transform:rotate(-90deg)}
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 8px}
.lp-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;background:var(--card2);border:1px solid transparent;cursor:pointer;transition:all .15s;overflow:hidden}
.lp-item:active{background:var(--card)}
.lp-item.sel{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.2)}
.lp-item img{width:16px;height:16px;flex-shrink:0}
.lp-item .lp-i-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.lp-item .lp-i-cc{font-size:10px;color:var(--text3)}
.lp-item .lp-i-check{color:var(--yellow);font-size:12px;flex-shrink:0;display:none}
.lp-item.sel .lp-i-check{display:inline}
.lp-search{display:flex;align-items:center;gap:8px;background:var(--card2);border-radius:10px;padding:8px 12px;margin:8px 12px 4px}
.lp-search input{flex:1;background:none;border:none;color:var(--text);font-size:13px;outline:none}
.lp-search input::placeholder{color:var(--text3)}
.lp-search svg{width:14px;height:14px;fill:var(--text3);flex-shrink:0}
.lp-recent{display:flex;gap:6px;padding:4px 12px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.lp-recent::-webkit-scrollbar{display:none}
.lp-recent-pill{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:500;background:var(--card);border:1px solid var(--divider);cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .15s}
.lp-recent-pill:active{background:var(--card2)}
.lp-recent-pill img{width:12px;height:12px}
html[data-theme="light"] .lp-trigger{background:var(--card);border-color:var(--divider)}
html[data-theme="light"] .lp-item.sel{background:rgba(200,90,0,.06);border-color:rgba(200,90,0,.2)}
html[data-theme="light"] .lp-item.sel .lp-i-check{color:var(--yellow)}
html[data-theme="light"] .lp-recent-pill{background:var(--card);border-color:var(--divider)}

.spick{display:inline-flex;align-items:center;background:rgba(255,215,0,.08);color:var(--yellow);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;border:none;margin-left:16px}
.spick select{background:none;border:none;color:var(--yellow);font-size:12px;font-weight:600;outline:none;-webkit-appearance:none;cursor:pointer}

.fcard{background:var(--card);border-radius:var(--radius);padding:12px;margin:0 16px 10px;cursor:pointer;transition:background .15s}
.fcard:active{background:var(--card2)}
.fhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fst{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.fteams{display:flex;align-items:center;justify-content:space-between}
.fteam{text-align:center;width:80px}
.fteam img{width:26px;height:26px;margin-bottom:3px}
.ftn{font-size:10px;color:var(--text2)}
.fscore{font-size:22px;font-weight:800;letter-spacing:1px;text-align:center}
.fsep{color:var(--text3);font-weight:300;font-size:14px;margin:0 5px}

.pred-bar{height:6px;border-radius:3px;display:flex;overflow:hidden;margin:6px 0}
.pred-bar div{height:100%;transition:width .3s}

.ldot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:50px 0}
.spin{width:26px;height:26px;border:3px solid var(--card2);border-top-color:var(--yellow);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:12px;color:var(--text3)}
.empty{text-align:center;padding:50px 20px}
.empty .ei{font-size:36px;margin-bottom:10px}
.empty .et{font-size:15px;font-weight:600;color:var(--text2)}
.empty .es{font-size:11px;color:var(--text3);margin-top:3px}
.errbanner{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(245,158,11,.08);border-radius:10px;margin:6px 16px;font-size:11px;color:var(--orange)}

.sinput{width:100%;background:var(--card2);border:1px solid var(--divider);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'SF Mono',monospace;outline:none}
.sinput:focus{border-color:var(--yellow)}
.btn-p{background:var(--yellow);color:#111;border:none;border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer}
.btn-p:active{opacity:.7}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lopt{display:flex;align-items:center;gap:6px;padding:8px;background:var(--card2);border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .2s;font-size:10px}
.lopt.sel{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.25)}
.lopt img{width:18px;height:18px}

.tab-page{display:none}.tab-page.active{display:block;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}

.bpbar{height:18px;border-radius:4px;overflow:visible;background:var(--card2);position:relative;margin:4px 0}
.bpfill{height:100%;border-radius:4px;transition:width .4s}
.bplabel{position:absolute;right:6px;top:1px;font-size:10px;font-weight:700}

.sus-alert{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.12);border-radius:10px;margin:4px 16px;font-size:11px}
.live-alert{display:flex;align-items:center;gap:8px;padding:10px;background:rgba(229,51,51,.06);border:1px solid rgba(229,51,51,.12);border-radius:10px;margin:4px 16px}
.live-alert.warn{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.12)}

.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.moverlay.open{opacity:1;pointer-events:all}
.msheet{background:var(--bg);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 var(--safe-bottom);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.moverlay.open .msheet{transform:translateY(0)}
.mhandle{width:36px;height:4px;border-radius:2px;background:var(--text3);margin:10px auto 6px}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 10px;border-bottom:1px solid var(--divider);position:sticky;top:0;background:var(--bg);z-index:1}
.mtitle{font-size:16px;font-weight:700}
.mclose{background:none;border:none;color:var(--yellow);font-size:14px;font-weight:600;cursor:pointer;padding:4px 8px}
.mbody{padding:16px}

.stabs{display:flex;border-bottom:1px solid var(--divider);margin:0 16px;overflow-x:auto}
.stabs::-webkit-scrollbar{display:none}
.stab{flex:0 0 auto;text-align:center;padding:10px 14px;font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.stab.on{color:var(--yellow);border-bottom-color:var(--yellow);font-weight:700}

.irow{display:flex;justify-content:space-between;padding:7px 0;font-size:12px}
.irow .lb{color:var(--text2)}.irow .vl{font-weight:600}

.dhdr{display:flex;align-items:center;gap:12px;padding:14px 20px}
.dphoto{width:60px;height:60px;border-radius:50%;object-fit:cover;background:var(--card2);border:3px solid var(--card2)}
.dname{font-size:18px;font-weight:800;letter-spacing:-.3px}
.dteam{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.dteam img{width:14px;height:14px}
.csum{display:flex;justify-content:space-around;padding:10px;text-align:center}
.csum .cnt{font-size:18px;font-weight:800}
.csum .clb{font-size:10px;color:var(--text3);margin-top:1px}
.csum .sep{width:1px;background:var(--divider)}

.predcard{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(102,153,255,.15);border-radius:var(--radius);padding:14px;margin:0 16px 10px;overflow:hidden}
.predcard .ptitle{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Standings table */
.stable{width:100%;border-collapse:collapse;font-size:11px}
.stable th{text-align:left;padding:6px 8px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--divider);position:sticky;top:0;background:var(--card)}
.stable th.n{text-align:center}
.stable td{padding:6px 8px;border-bottom:1px solid var(--divider)}
.stable td.n{text-align:center;font-weight:600}
.stable tr:active{background:var(--card2)}
.stable .pos{font-weight:700;width:20px;text-align:center}
.stable .tname{display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.stable .tname img{width:16px;height:16px;flex-shrink:0}
.form-dot{width:14px;height:14px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin:0 1px}
.form-W{background:var(--green);color:#111}
.form-D{background:var(--text3);color:#fff}
.form-L{background:var(--red);color:#fff}

/* Match stat bar */
.mstat{display:flex;align-items:center;gap:8px;padding:5px 0}
.mstat .lb{font-size:10px;color:var(--text2);width:80px;text-align:center}
.mstat .v{font-size:11px;font-weight:700;width:36px;flex-shrink:0}
.mstat .vr{text-align:right}
.mstat .bar{flex:1;height:6px;border-radius:3px;background:var(--card2)}
.mstat .bf{height:100%;border-radius:3px;transition:width .3s}

/* Injury chip */
.injchip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(229,51,51,.08);color:var(--red);margin:2px 4px 2px 0}
.injchip.sus{background:rgba(255,215,0,.08);color:var(--yellow)}

/* Odds */
.odds-row{display:flex;gap:6px;margin:6px 0}
.odds-cell{flex:1;text-align:center;padding:6px 4px;background:var(--card2);border-radius:8px}
.odds-cell .olbl{font-size:10px;color:var(--text3)}
.odds-cell .oval{font-size:14px;font-weight:700;color:var(--cyan)}

/* Team modal */
.tcrest{width:48px;height:48px}
.tform{display:flex;gap:2px;margin:4px 0}

/* H2H */
.h2h-vs{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px;text-align:center}
.h2h-team{display:flex;flex-direction:column;align-items:center;gap:4px}
.h2h-team img{width:36px;height:36px}
.h2h-team span{font-size:11px;font-weight:600}
.h2h-x{font-size:20px;font-weight:800;color:var(--text3)}

/* Heatmap */
.hmap{display:flex;gap:3px}
.hcell{flex:1;text-align:center;border-radius:4px;padding:7px 2px;font-size:10px;font-weight:700}
.hlbl{font-size:10px;color:var(--text3);margin-top:2px;text-align:center}

/* Timeline */
.tbar{position:relative;height:32px;border-radius:6px;background:#1a3a1a;margin-bottom:10px;overflow:visible}
.tmark{position:absolute;top:-3px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.tmin{font-size:10px;color:rgba(255,255,255,.35);position:absolute;bottom:2px;transform:translateX(-50%)}
.thalf{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.2)}

/* Lineup pitch */
.pitch{background:linear-gradient(180deg,#1a5c2a 0%,#1a6830 50%,#1a5c2a 100%);border-radius:12px;padding:12px;margin:8px 0;position:relative;min-height:260px}
.pitch::before{content:'';position:absolute;top:50%;left:10%;right:10%;height:1px;background:rgba(255,255,255,.15)}
.pitch-row{display:flex;justify-content:space-around;margin:6px 0}
.pitch-player{text-align:center;width:50px}
.pitch-player .num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-bottom:2px}
.pitch-player .pn{font-size:10px;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Ref Tracker */
.rcard{background:var(--card);border-radius:var(--radius);margin:0 16px 10px;overflow:hidden;cursor:pointer;transition:transform .15s;border:1px solid var(--divider)}
.rcard:active{transform:scale(.98)}
.rcard-top{display:flex;align-items:center;gap:10px;padding:12px 14px}
.rcard-rank{font-size:18px;font-weight:900;color:var(--text3);width:24px;text-align:center;flex-shrink:0}
.rcard-rank.top3{color:var(--yellow);text-shadow:0 0 10px rgba(255,215,0,.3)}
.rcard-info{flex:1;min-width:0}
.rcard-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcard-meta{font-size:10px;color:var(--text3);margin-top:1px}
.rcard-stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--divider)}
.rcard-stat{padding:8px 6px;text-align:center;border-right:1px solid var(--divider)}
.rcard-stat:last-child{border-right:none}
.rcard-stat .sv{font-size:15px;font-weight:800;letter-spacing:-.5px}
.rcard-stat .sl{font-size:10px;color:var(--text3);margin-top:1px;text-transform:uppercase}
.rcard-expand{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.rcard-expand.open{max-height:1200px}
.rcard-detail{padding:0 14px 14px}
.ref-compare-bar{position:fixed;bottom:calc(72px + var(--safe-bottom));left:0;right:0;background:rgba(13,13,20,.95);backdrop-filter:blur(20px);border-top:1px solid var(--divider);padding:8px 16px;z-index:90;display:flex;align-items:center;gap:8px;transform:translateY(100%);transition:transform .3s}
.ref-compare-bar.show{transform:translateY(0)}
.ref-slot{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:var(--card2);color:var(--text2);display:flex;align-items:center;gap:4px}
.ref-slot .x{cursor:pointer;color:var(--text3);font-weight:800}
.ctable{width:100%;font-size:11px;border-collapse:collapse}
.ctable th{text-align:left;padding:6px 8px;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--divider)}
.ctable td{padding:6px 8px;border-bottom:1px solid var(--divider);font-weight:600}
.ctable .win{color:var(--yellow);background:rgba(255,215,0,.04)}
.ctable .lose{color:var(--text3)}
.share-card{background:linear-gradient(135deg,#14141f,#1a1030);border:1px solid rgba(255,215,0,.1);border-radius:var(--radius);padding:16px;margin:8px 0;position:relative}
.share-card::after{content:'PL Ref Tracker';position:absolute;bottom:6px;right:10px;font-size:10px;color:var(--text3)}

/* Value badges */
.vbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase}
.vbadge.good{color:var(--green);background:rgba(51,217,106,.1)}
.vbadge.fair{color:var(--yellow);background:rgba(255,215,0,.1)}
.vbadge.poor{color:var(--red);background:rgba(229,51,51,.1)}

/* Watchlist pin */
.pin-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:2px;opacity:.5;transition:opacity .2s}
.pin-btn.pinned{opacity:1}

/* Tooltip — see bottom of CSS for improved version (Improvement 10) */
.tooltip-pop{position:fixed;left:16px;right:16px;bottom:100px;background:var(--card);border:1px solid var(--yellow);border-radius:12px;padding:12px 16px;z-index:300;font-size:12px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
.tooltip-pop.show{display:block;animation:fi .2s}
.tooltip-pop .tp-title{font-weight:700;color:var(--yellow);margin-bottom:4px;font-size:11px}
.tooltip-pop .tp-close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer}

/* Onboarding */
.onboard{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.onboard-card{background:var(--bg);border:1px solid var(--divider);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center}
.onboard-card h2{font-size:22px;font-weight:900;margin-bottom:4px}
.onboard-card h2 span{color:var(--yellow)}
.onboard-card p{font-size:12px;color:var(--text2);margin:8px 0 16px;line-height:1.5}
.onboard-features{text-align:left;margin:12px 0;display:flex;flex-direction:column;gap:6px}
.onboard-features div{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.onboard-features div span:first-child{font-size:14px}

/* Share btn */
.share-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;font-size:10px;font-weight:600;background:rgba(102,153,255,.08);border:1px solid rgba(102,153,255,.15);color:var(--blue);cursor:pointer;transition:all .15s}
.share-btn:active{background:rgba(102,153,255,.2)}

/* Copy toast */
.copy-toast{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%);background:var(--green);color:#111;padding:8px 20px;border-radius:10px;font-size:12px;font-weight:700;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}
.copy-toast.show{opacity:1}

/* Accuracy tracker */
.acc-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:linear-gradient(135deg,rgba(51,217,106,.05),rgba(51,217,106,.02));border:1px solid rgba(51,217,106,.1);border-radius:10px;margin:6px 16px}
.acc-ring{width:36px;height:36px;flex-shrink:0}

/* (Removed: email capture + pro gate — Improvement 8) */

/* Acca Engine */
.acca-card{background:var(--card);border-radius:var(--radius);margin:0 16px 14px;overflow:hidden;border:1px solid var(--divider)}
.acca-card.disabled{opacity:.45;pointer-events:none}
.acca-hdr{display:flex;align-items:center;gap:8px;padding:14px 16px 10px}
.acca-type{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.acca-type.match{color:var(--blue);background:rgba(91,141,239,.12)}
.acca-type.corners{color:var(--cyan);background:rgba(34,211,238,.12)}
.acca-type.bookings{color:var(--yellow);background:rgba(255,215,0,.12)}
.acca-type.value{color:#a78bfa;background:rgba(167,139,250,.12)}
.acca-scope{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;color:var(--text3);background:var(--card2)}
.acca-title{font-size:15px;font-weight:800;flex:1}
.acca-refresh{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;color:var(--text3);transition:transform .3s}
.acca-refresh:active{transform:rotate(180deg)}
.acca-meta{display:flex;align-items:center;gap:6px;padding:0 16px 8px;font-size:10px;color:var(--text3)}
.acca-sel{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--divider)}
.acca-sel:active{background:var(--card2)}
.acca-num{font-size:14px;font-weight:900;color:var(--text3);width:18px;flex-shrink:0}
.acca-crest{width:24px;height:24px;flex-shrink:0}
.acca-info{flex:1;min-width:0}
.acca-match{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acca-detail{font-size:10px;color:var(--text3);margin-top:1px}
.acca-tip{text-align:right;flex-shrink:0}
.acca-tipval{font-size:12px;font-weight:800}
.acca-conf{font-size:10px;color:var(--text3)}
.acca-footer{padding:12px 16px;border-top:1px solid var(--divider);background:rgba(255,255,255,.02)}
.acca-odds{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.acca-odds .lbl{font-size:10px;color:var(--text2)}
.acca-odds .val{font-size:18px;font-weight:900}
.acca-actions{display:flex;gap:8px}
.acca-actions button{flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.acca-copy{background:var(--card2);border:1px solid var(--divider);color:var(--text2)}
.acca-share{background:rgba(91,141,239,.1);border:1px solid rgba(91,141,239,.2);color:var(--blue)}
.acca-notice{padding:10px 16px;font-size:10px;color:var(--text3);text-align:center;border-top:1px solid var(--divider);font-style:italic}

/* Acca share image */
.acca-img{position:fixed;left:-9999px;top:0;width:400px;background:linear-gradient(135deg,#0d0d14,#1a1030,#0f1a20);padding:24px;border-radius:0;font-family:-apple-system,system-ui,sans-serif;color:#fff;z-index:-1}
.acca-img .watermark{font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-top:12px}

/* Section nav bar (Improvement 1) */
.sec-nav{display:flex;background:var(--card);border-bottom:1px solid var(--divider);padding:0}
.sec-nav-btn{flex:1;text-align:center;padding:12px 10px;font-size:12px;font-weight:600;color:#6b7280;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.sec-nav-btn.active{color:var(--yellow);border-bottom-color:var(--yellow)}

/* Utility classes (Improvement 9) */
.lbl-sm{font-size:10px;color:var(--text2)}
.lbl-xs{font-size:10px;color:var(--text3)}
.row-gap-8{display:flex;align-items:center;gap:8px}
.row-gap-6{display:flex;align-items:center;gap:6px}
.modal-sub-hdr{padding:8px 0 4px}

/* Improved tooltip (Improvement 10) */
.ttip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(102,153,255,.15);color:var(--blue);font-size:11px;font-weight:700;cursor:pointer;margin-left:4px;vertical-align:middle;border:1px solid rgba(102,153,255,.25);transition:background .2s;flex-shrink:0}
.ttip:hover{background:rgba(102,153,255,.3)}
.ttip:focus{outline:2px solid var(--blue);outline-offset:2px}

/* Feature 1: Booking Points */
.bp-risk-low{color:var(--green);background:rgba(51,217,106,.1)}
.bp-risk-med{color:var(--orange);background:rgba(245,158,11,.1)}
.bp-risk-high{color:var(--red);background:rgba(229,51,51,.1)}
.bp-risk-vhigh{color:#ff1744;background:rgba(255,23,68,.12)}
.bp-line{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700;margin:1px}
.bp-over{color:var(--green);background:rgba(51,217,106,.06);border:1px solid rgba(51,217,106,.12)}
.bp-under{color:var(--red);background:rgba(229,51,51,.06);border:1px solid rgba(229,51,51,.12)}

/* Feature 2: Value Edge Chip */
.vedge-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;vertical-align:middle;margin-left:4px}
.vedge-chip.edge-good{color:var(--green);background:rgba(51,217,106,.1)}
.vedge-chip.edge-fair{color:var(--orange);background:rgba(245,158,11,.1)}
.vedge-chip.edge-poor{color:var(--red);background:rgba(229,51,51,.1)}
.vedge-chip.edge-none{color:var(--text3);background:var(--card2)}
.vedge-popover{position:fixed;left:16px;right:16px;bottom:120px;background:var(--card);border:1px solid var(--divider);border-radius:12px;padding:12px 16px;z-index:300;font-size:12px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
.vedge-popover.show{display:block;animation:fi .2s}

/* Feature 3: Bet Tracker */
.tracker-hdr{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 8px}
.tracker-hdr-wide{grid-template-columns:repeat(5,1fr)}
.tracker-tbl{width:100%;font-size:11px;border-collapse:collapse}
.tracker-tbl th{text-align:left;padding:6px 8px;color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--divider);position:sticky;top:0;background:var(--card)}
.tracker-tbl td{padding:6px 8px;border-bottom:1px solid var(--divider)}
.tracker-tbl tr:active{background:var(--card2)}
.track-btn{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.15);color:var(--yellow);cursor:pointer;white-space:nowrap}
.track-btn:active{background:rgba(255,215,0,.2)}
html[data-theme="light"] .track-btn{background:rgba(200,90,0,.06);border-color:rgba(200,90,0,.15);color:var(--yellow)}

/* Feature 5: Dual gauge */
.dual-gauge{display:flex;gap:12px;justify-content:center;padding:10px 0}
.dual-gauge>div{display:flex;flex-direction:column;align-items:center}
.pos-ctx{font-size:11px;color:var(--text2);text-align:center;padding:4px 16px 8px;line-height:1.4}

/* Feature 6: Matchup */
.matchup-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border-radius:10px;margin:4px 16px 6px;border:1px solid var(--divider)}
.matchup-arrow{font-size:14px;color:var(--red)}
.matchup-score-bar{height:6px;border-radius:3px;background:var(--card2);overflow:hidden;margin:3px 0}
.matchup-score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--orange),var(--red))}

/* Feature 7: Intensity gauge */
.intensity-gauge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
.intensity-low{color:var(--text3);background:rgba(85,85,85,.1)}
.intensity-med{color:var(--orange);background:rgba(245,158,11,.1)}
.intensity-high{color:var(--red);background:rgba(229,51,51,.12);animation:pulse 2s infinite}
.value-alert-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(51,217,106,.06);border:1px solid rgba(51,217,106,.15);border-radius:10px;margin:6px 16px;animation:fi .3s}
.booking-window{display:flex;gap:2px;margin:4px 0}
.booking-window .bw-seg{flex:1;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:var(--card2);color:var(--text3)}
.booking-window .bw-seg.active{background:rgba(229,51,51,.25);color:var(--red)}
.booking-window .bw-seg.peak{background:rgba(229,51,51,.5);color:#fff}

/* Feature 8: League calibration badge */
.cal-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.cal-badge.cal-std{color:var(--text3);background:var(--card2)}
.cal-badge.cal-high{color:var(--red);background:rgba(229,51,51,.1)}
.cal-badge.cal-low{color:var(--blue);background:rgba(102,153,255,.1)}

/* Light theme overrides for new features */
html[data-theme="light"] .vedge-chip.edge-good{color:var(--green);background:rgba(26,122,60,.1)}
html[data-theme="light"] .vedge-chip.edge-fair{color:var(--orange);background:rgba(196,122,0,.1)}
html[data-theme="light"] .vedge-chip.edge-poor{color:var(--red);background:rgba(181,0,10,.1)}
html[data-theme="light"] .vedge-popover{background:var(--card);border-color:var(--divider)}
html[data-theme="light"] .matchup-row{background:var(--card);border-color:var(--divider)}
html[data-theme="light"] .value-alert-banner{background:rgba(26,122,60,.06);border-color:rgba(26,122,60,.15)}
html[data-theme="light"] .cal-badge.cal-high{color:var(--red);background:rgba(181,0,10,.08)}
html[data-theme="light"] .cal-badge.cal-low{color:var(--blue);background:rgba(21,88,168,.08)}

/* ==========================================================
   IMPROVEMENT LOG
   1.  .sec-nav, .sec-nav-btn — Two-level navigation system
   2.  S.tab default — Changed from 'dashboard' to 'tips'
   3.  All font-size < 10px — Raised to 10px minimum
   4.  --text3 — Changed from #555 to #6b7280; .nav-btn isolated
   5.  .ltxt — Descriptive loading copy per tab
   6.  --role-cta/win/warn/info — Colour role variables added
   7.  .acca-card.disabled .acca-hdr — Weekend-only badge
   8.  PRO_TABS, proGate, emailCapture, saveEmail — Removed
   9.  .lbl-sm, .lbl-xs, .row-gap-8, .row-gap-6, .modal-sub-hdr
   10. .ttip — Enlarged, keyboard-accessible, focus/hover states
   11. .pg-title — Consistent emoji + name per tab
   ========================================================== */

/* ====== FIX ROUND 2 — Applied fixes ======
   FIX 1:  Supabase anon key settings field + test connection
   FIX 2:  HT/FT settlement — proper half-time goal counting
   FIX 3:  tipsLoading guard prevents empty flash during sync
   FIX 4:  waitForChart() polls for Chart.js before rendering
   FIX 5:  Copy Tip button on individual tip cards
   FIX 6:  Responsible gambling notice at bottom of tips feed
   FIX 7:  Betting term tooltips (BTTS, Asian Handicap, etc.)
   FIX 8:  Bet type pill filter on tips feed
   FIX 9:  Manual settlement override with inline edit
   FIX 10: Demo mode with 5 example tips when no API key
   FIX 11: .lbl-sm, .lbl-xs, .row-gap-8, .row-gap-6, .modal-sub-hdr
   FIX 12: --role-cta/win/warn/info in tips + intel sections
   FIX 13: Loading state ltxt on all spinners
   12. Light theme — warm sand palette, burnt orange accents, full component overrides, theme toggle
   ============================================== */
.tip-edit-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.tip-edit-row select,.tip-edit-row input{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--divider);background:var(--card2);color:var(--text)}
.tip-edit-row button{font-size:10px;padding:3px 10px;border-radius:6px;background:var(--role-cta);color:#111;border:none;font-weight:600;cursor:pointer}
.demo-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 16px;margin:6px 16px;font-size:11px;color:var(--orange)}
.gamble-footer{padding:12px 20px;font-size:10px;color:var(--text3);text-align:center;border-top:1px solid var(--divider);margin-top:8px}
/* TV Guide */
.tv-date-hdr{font-size:12px;font-weight:700;padding:10px 20px 4px;color:var(--text2)}
.tv-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--divider)}
.tv-card:last-child{border-bottom:none}
.tv-time{font-size:12px;font-weight:700;color:var(--text);width:42px;flex-shrink:0;font-variant-numeric:tabular-nums}
.tv-teams{flex:1;min-width:0}
.tv-match{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-comp{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-chan{display:flex;align-items:center;gap:4px;flex-shrink:0;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap}
.tv-chan.sky{background:rgba(0,112,186,.12);color:#0070ba}
.tv-chan.tnt{background:rgba(200,50,50,.12);color:#c83232}
.tv-chan.bbc{background:rgba(0,0,0,.08);color:var(--text)}
.tv-chan.itv{background:rgba(0,130,180,.1);color:#0082b4}
.tv-chan.prime{background:rgba(0,168,225,.1);color:#00a8e1}
.tv-chan.c4{background:rgba(120,120,120,.1);color:var(--text2)}
.tv-chan.prem{background:rgba(200,160,0,.1);color:#c8a000}
.tv-chan.free{background:rgba(51,217,106,.08);color:var(--green)}
html[data-theme="light"] .tv-chan.sky{background:rgba(0,112,186,.08);color:#005a96}
html[data-theme="light"] .tv-chan.tnt{background:rgba(180,40,40,.08);color:#a02828}
html[data-theme="light"] .tv-chan.bbc{background:rgba(0,0,0,.05);color:#1a1410}
html[data-theme="light"] .tv-chan.itv{background:rgba(0,110,160,.08);color:#006ea0}
html[data-theme="light"] .tv-chan.prime{background:rgba(0,150,200,.08);color:#0096c8}
.tv-3pm{font-size:10px;color:var(--text3);padding:6px 14px;font-style:italic}

/* ====== FIX 1: Nav Scroll Indicator ====== */
.nav-row{position:relative}
.nav-row::after{content:'';position:absolute;right:0;top:0;bottom:0;width:32px;background:linear-gradient(to right,transparent,var(--nav-bg));pointer-events:none;z-index:2;transition:opacity .3s}
.nav-row.scrolled-end::after{opacity:0}

/* ====== FIX 2: Refresh Button ====== */
.refresh-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--card2);border:1px solid var(--divider);cursor:pointer;margin-left:8px;vertical-align:middle;transition:transform .3s,background .15s;flex-shrink:0}
.refresh-btn:active{background:var(--card)}
.refresh-btn svg{width:14px;height:14px;fill:var(--text3)}
.refresh-btn.spinning svg{animation:ref-spin .8s linear infinite}
@keyframes ref-spin{to{transform:rotate(360deg)}}

/* ====== FIX 3: Loading Skeletons ====== */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{padding:16px}
.skel-line{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite ease-in-out;margin-bottom:10px}
.skel-line.w50{width:50%}.skel-line.w70{width:70%}.skel-line.w40{width:40%}.skel-line.w90{width:90%}
.skel-card{height:100px;border-radius:var(--radius);background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite ease-in-out;margin-bottom:10px}
.skel-circle{width:34px;height:34px;border-radius:50%;background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite ease-in-out;flex-shrink:0}
.skel-row{display:flex;align-items:center;gap:10px;padding:10px 14px}
.skel-stat{height:70px;border-radius:var(--radius);background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite ease-in-out}

/* ====== FIX 4: Error Panel with Retry ====== */
.err-panel{text-align:center;padding:40px 20px}
.err-panel .err-icon{font-size:36px;margin-bottom:8px}
.err-panel .err-msg{font-size:13px;color:var(--text2);margin-bottom:12px}
.err-panel .err-retry{display:inline-flex;align-items:center;gap:4px;padding:8px 20px;border-radius:10px;background:var(--card2);border:1px solid var(--divider);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.err-panel .err-retry:active{background:var(--card)}

/* ====== FIX 5: Touch Target Sizes — applied inline below ====== */

/* ====== FIX 7: Settings Sections ====== */
.settings-section{margin:0 16px 8px;background:var(--card);border-radius:var(--radius);overflow:hidden}
.settings-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.settings-section-hdr:active{background:var(--card2)}
.settings-section-hdr .ss-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.settings-section-hdr .ss-arrow{font-size:12px;color:var(--text3);transition:transform .2s}
.settings-section-hdr.collapsed .ss-arrow{transform:rotate(-90deg)}
.settings-section-body{padding:0 16px 14px}
.settings-section-body.collapsed{display:none}

/* ====== FIX 9: Colour Contrast ====== */

/* ====== FIX 10: Haptic/Visual Feedback ====== */
.btn-pop{transition:transform .1s ease}
.btn-pop:active{transform:scale(0.95)}
@keyframes pop-bounce{0%{transform:scale(0.95)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
.btn-pop-done{animation:pop-bounce .3s ease}
@keyframes check-pulse{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.track-success{display:inline-flex;align-items:center;gap:4px;color:var(--green);font-size:11px;font-weight:700;animation:check-pulse .4s ease}

/* ====== FIX 6: League Picker Favourites ====== */
.lp-fav-star{background:none;border:none;font-size:14px;cursor:pointer;padding:2px;flex-shrink:0;opacity:.4;transition:opacity .15s}
.lp-fav-star.faved{opacity:1}
.lp-fav-section{padding:4px 12px 8px}
.lp-fav-label{font-size:10px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px;display:flex;align-items:center;gap:4px}

/* ====== ENHANCEMENT A: Daily Briefing ====== */
.briefing-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--divider);border-radius:var(--radius);padding:14px 16px;margin:8px 16px}
.briefing-title{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.briefing-stats{display:flex;gap:12px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.briefing-stats span{display:flex;align-items:center;gap:4px}

/* ====== ENHANCEMENT B: Player Comparison ====== */
.compare-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:10px;font-weight:600;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.15);color:var(--purple);cursor:pointer;transition:all .15s}
.compare-btn:active{background:rgba(167,139,250,.2)}
.compare-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.compare-col{text-align:center}
.compare-col .cmp-name{font-size:12px;font-weight:700;margin-bottom:6px}
.compare-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.compare-bar-row .cmp-label{font-size:10px;color:var(--text3);width:60px;text-align:right}
.compare-bar-row .cmp-bars{flex:1;display:flex;gap:2px;height:8px}
.compare-bar-row .cmp-bar{height:100%;border-radius:4px}
.compare-bar-row .cmp-val{font-size:10px;font-weight:700;width:30px}
.compare-clear{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;font-size:10px;font-weight:600;background:var(--card2);border:1px solid var(--divider);color:var(--text3);cursor:pointer}

/* ====== ENHANCEMENT C: Sparklines ====== */
.sparkline-svg{display:inline-block;vertical-align:middle}
.sparkline-svg polyline{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ====== ENHANCEMENT D: Global Search ====== */
.gsearch{position:relative;padding:4px 16px;display:none}
.gsearch.visible{display:block}
.gsearch-bar{display:flex;align-items:center;gap:8px;background:var(--card2);border-radius:12px;padding:8px 12px}
.gsearch-bar input{flex:1;background:none;border:none;color:var(--text);font-size:13px;outline:none}
.gsearch-bar input::placeholder{color:var(--text3)}
.gsearch-bar svg{width:16px;height:16px;fill:var(--text3);flex-shrink:0}
.gsearch-results{position:absolute;left:16px;right:16px;top:100%;background:var(--card);border:1px solid var(--divider);border-radius:12px;max-height:300px;overflow-y:auto;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none}
.gsearch-results.visible{display:block}
.gsearch-group-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:8px 12px 4px}
.gsearch-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;transition:background .1s}
.gsearch-item:active{background:var(--card2)}
.gsearch-item img{width:16px;height:16px;flex-shrink:0}
.gsearch-toggle{position:fixed;top:calc(var(--safe-top) + 8px);right:50px;z-index:95;width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--divider);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ====== ENHANCEMENT E: Match Booking Risk Score ====== */
.risk-ring{display:inline-flex;flex-direction:column;align-items:center;flex-shrink:0}
.risk-ring svg{display:block}
.risk-label{font-size:10px;font-weight:700;margin-top:2px}

/* ====== ENHANCEMENT F: Streak Indicators ====== */
.streak-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700;margin-left:4px;white-space:nowrap}
.streak-badge.hot{color:var(--red);background:rgba(229,51,51,.1)}
.streak-badge.clean{color:var(--green);background:rgba(51,217,106,.1)}

/* ====== ENHANCEMENT G: Today's Matches Panel ====== */
.today-panel{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin:8px 16px}
.today-panel .tp-hdr{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.quick-pick{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--divider)}
.quick-pick:last-child{border-bottom:none}

/* ====== ENHANCEMENT H: Share Player Profile ====== */
.share-profile-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:10px;font-weight:600;background:rgba(102,153,255,.08);border:1px solid rgba(102,153,255,.15);color:var(--blue);cursor:pointer;transition:all .15s;margin-left:6px}
.share-profile-btn:active{background:rgba(102,153,255,.2)}
.player-share-card{position:fixed;left:-9999px;top:0;width:400px;background:linear-gradient(135deg,#0d0d14,#1a1030);padding:24px;color:#fff;z-index:-1;font-family:-apple-system,system-ui,sans-serif}
html[data-theme="light"] .player-share-card{background:linear-gradient(135deg,#f5f0e8,#ece4d0);color:var(--text)}

/* ====== ENHANCEMENT I: Coach Marks ====== */
.coach-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;display:flex;align-items:center;justify-content:center}
.coach-card{background:var(--bg);border:1px solid var(--yellow);border-radius:16px;padding:24px;max-width:320px;width:90%;text-align:center}
.coach-card .coach-step{font-size:10px;color:var(--yellow);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.coach-card .coach-text{font-size:14px;font-weight:600;margin-bottom:4px}
.coach-card .coach-desc{font-size:11px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.coach-card .coach-btns{display:flex;gap:8px;justify-content:center}
.coach-card .coach-next{padding:8px 24px;border-radius:8px;background:var(--yellow);color:#111;font-size:12px;font-weight:700;border:none;cursor:pointer}
.coach-card .coach-skip{padding:8px 16px;border-radius:8px;background:none;border:1px solid var(--divider);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer}
.coach-highlight{position:fixed;z-index:590;border:2px solid var(--yellow);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.7);pointer-events:none;transition:all .3s}

/* ====== ENHANCEMENT J: Data Freshness ====== */
.freshness-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;margin-left:6px;vertical-align:middle}
.freshness-badge.fresh{color:var(--green);background:rgba(51,217,106,.08)}
.freshness-badge.stale{color:var(--orange);background:rgba(245,158,11,.08)}
.freshness-badge.outdated{color:var(--red);background:rgba(229,51,51,.08);cursor:pointer}

/* ====== Light theme overrides for new features ====== */
html[data-theme="light"] .refresh-btn{background:var(--card2);border-color:var(--divider)}
html[data-theme="light"] .refresh-btn svg{fill:var(--text3)}
html[data-theme="light"] .skel-line,html[data-theme="light"] .skel-card,html[data-theme="light"] .skel-circle,html[data-theme="light"] .skel-stat{background:linear-gradient(90deg,var(--card2) 25%,var(--card) 50%,var(--card2) 75%);background-size:400px 100%}
html[data-theme="light"] .err-panel .err-retry{background:var(--card2);border-color:var(--divider);color:var(--text)}
html[data-theme="light"] .settings-section{background:var(--card)}
html[data-theme="light"] .briefing-card{background:linear-gradient(135deg,var(--card),var(--card2));border-color:var(--divider)}
html[data-theme="light"] .compare-btn{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.12);color:var(--purple)}
html[data-theme="light"] .gsearch-results{background:var(--card);border-color:var(--divider)}
html[data-theme="light"] .gsearch-toggle{background:var(--card);border-color:var(--divider)}
html[data-theme="light"] .coach-card{background:var(--bg);border-color:var(--yellow)}
html[data-theme="light"] .streak-badge.hot{color:var(--red);background:rgba(181,0,10,.08)}
html[data-theme="light"] .streak-badge.clean{color:var(--green);background:rgba(26,122,60,.08)}
html[data-theme="light"] .today-panel{background:var(--card)}
html[data-theme="light"] .nav-row::after{background:linear-gradient(to right,transparent,var(--nav-bg))}
</style>
</head>

//  SUPABASE CLIENT — reads from cloud, localStorage as fallback
// ======================================================================
const SB_URL='https://knodunjnsxelmpziupwk.supabase.co';
let sbClient=null;
function initSupabase(){
  if(sbClient) return sbClient;
  const anonKey=localStorage.getItem('sb_anon_key')||'';
  if(!anonKey||typeof supabase==='undefined') return null;
  try{sbClient=supabase.createClient(SB_URL,anonKey);console.log('[Supabase] Client initialized')}catch(e){console.warn('[Supabase] Init failed:',e.message)}
  return sbClient;
}
function sbReady(){return!!initSupabase()}

// Sync tips from Supabase to localStorage
async function syncTipsFromSupabase(){
  if(!sbReady()) return false;
  try{
    const{data,error}=await sbClient.from('daily_tips').select('*').order('generated_at',{ascending:false}).limit(50);
    if(error){console.warn('[Supabase] Tips fetch error:',error.message);return false}
    if(!data||!data.length) return false;
    // Convert Supabase rows to localStorage format
    const tips=data.map(r=>({
      id:r.tip_id,match:r.match,competition:r.competition,kickoff:r.kickoff,
      betType:r.bet_type,selection:r.selection,confidence:r.confidence,
      rationale:r.rationale,status:r.status,isAcca:r.is_acca,
      accaLegs:r.acca_legs||[],settledScore:r.settled_score,
      generatedAt:r.generated_at,settledAt:r.settled_at
    }));
    localStorage.setItem('dailyTips',JSON.stringify(tips));
    console.log(`[Supabase] Synced ${tips.length} tips to localStorage`);
    return true;
  }catch(e){console.warn('[Supabase] Sync error:',e.message);return false}
}

// Sync stats from Supabase
async function syncStatsFromSupabase(){
  if(!sbReady()) return false;
  try{
    const{data,error}=await sbClient.from('tip_stats').select('*').order('stats_date',{ascending:false}).limit(1);
    if(error||!data||!data.length) return false;
    const r=data[0];
    const stats={
      total:r.total,won:r.won,lost:r.lost,void:r.voided,
      winRate:r.win_rate,wonThisWeek:r.won_this_week,
      streak:r.streak,streakDir:r.streak_dir,
      winRateByBetType:r.win_rate_by_bet||{},
      winRateByComp:r.win_rate_by_comp||{},
      accaWinRate:r.acca_win_rate,
      longestWin:r.longest_win,longestLoss:r.longest_loss
    };
    localStorage.setItem('tipStats',JSON.stringify(stats));
    console.log('[Supabase] Synced stats to localStorage');
    return true;
  }catch(e){console.warn('[Supabase] Stats sync error:',e.message);return false}
}

// ---- API ----
async function api(ep,params={},ttl=3600){
  if(!S.apiKey) throw new Error('No API key');
  const qs=new URLSearchParams(params).toString();
  const url=`https://v3.football.api-sports.io${ep}?${qs}`;
  const now=Date.now();
  if(S.cache[url]&&(now-S.cache[url].t)<ttl*1000) return S.cache[url].d;
  const r=await fetch(url,{headers:{'x-apisports-key':S.apiKey,'Accept':'application/json'}});
  if(r.status===429) throw new Error('Rate limit');
  if(r.status===401||r.status===403) throw new Error('Invalid API key');
  if(!r.ok) throw new Error('Error '+r.status);
  const j=await r.json();
  const d=j.response||[];
  S.cache[url]={d,t:now};
  return d;
}

// ====== FIX 8: Swipe-to-Dismiss Modals ======
function initSwipeDismiss(){
  document.querySelectorAll('.msheet').forEach(sheet=>{
    let startY=0,currentY=0,isDragging=false;
    sheet.addEventListener('touchstart',e=>{
      const touch=e.touches[0];
      startY=touch.clientY;currentY=startY;isDragging=true;
    },{passive:true});
    sheet.addEventListener('touchmove',e=>{
      if(!isDragging)return;
      currentY=e.touches[0].clientY;
      const delta=currentY-startY;
      if(delta>0){sheet.style.transform=`translateY(${delta}px)`;sheet.style.transition='none'}
    },{passive:true});
    sheet.addEventListener('touchend',()=>{
      if(!isDragging)return;isDragging=false;
      const delta=currentY-startY;
      sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
      if(delta>80){
        const overlay=sheet.closest('.moverlay');
        if(overlay){overlay.classList.remove('open');sheet.style.transform=''}
      } else {sheet.style.transform=''}
    },{passive:true});
  });
}

// ====== ENHANCEMENT A: Daily Briefing ======
async function buildDailyBriefing(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const fx=await api('/fixtures',{league:S.league,season:S.season,date:today},300).catch(()=>[]);
    if(!fx.length) return '';
    let strictRefs=0,watchedPlaying=0;
    const wp=typeof getWatchPlayers==='function'?getWatchPlayers():[];
    fx.forEach(f=>{
      if(f.fixture.referee){
        const rn=f.fixture.referee.split(',')[0].trim();
        const rs=S.refCache[rn];
        if(rs&&rs.strict>60) strictRefs++;
      }
    });
    // Check watched players
    if(wp.length){
      const teamIds=new Set();
      fx.forEach(f=>{teamIds.add(f.teams.home.id);teamIds.add(f.teams.away.id)});
      wp.forEach(p=>{if(p.tid&&teamIds.has(p.tid))watchedPlaying++});

function renderComparison(p1,p2){

    {l:'Fouls/90',k:'fp90',fmt:v=>v.toFixed(1),col:'var(--orange)'},

    {l:'Apps',k:'apps',fmt:v=>v,col:'var(--text2)'},
    {l:'Goals',k:'goals',fmt:v=>v,col:'var(--green)'},

  });

// ====== ENHANCEMENT C: Sparklines (Inline SVG) ======
function sparklineSVG(values,w=60,h=20,color='var(--yellow)'){
  if(!values||values.length<2) return '';
  const max=Math.max(...values,0.01),min=Math.min(...values,0);
  const range=max-min||1;
  const pts=values.map((v,i)=>{
    const x=(i/(values.length-1))*w;
    const y=h-((v-min)/range)*h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="sparkline-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" stroke="${color}"/></svg>`;
}

// ====== ENHANCEMENT E: Match Booking Risk Score ======
function calcMatchRisk(fixture){
  let refStrict=50,t1avg=0.2,t2avg=0.2,calFactor=1;
  if(fixture.fixture.referee){
    const rn=fixture.fixture.referee.split(',')[0].trim();
    const rs=S.refCache[rn];
    if(rs) refStrict=rs.strict||50;
  }
  calFactor=typeof getCalMult==='function'?getCalMult(S.league):1;
  // Rough estimate from available data
  const score=Math.min(100,Math.round((refStrict*0.3)+(t1avg*100*0.25)+(t2avg*100*0.25)+(calFactor*20)));
  return score;
}
function riskRingSVG(score,size=36){
  const r=(size-4)/2,circ=2*Math.PI*r,arc=(score/100)*circ;
  let col='var(--green)',lbl='Low';
  if(score>60){col='var(--red)';lbl='Very High'}
  else if(score>30){col='var(--orange)';lbl='Medium'}
  return `<div class="risk-ring"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--card2)" stroke-width="3"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${arc} ${circ}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="${col}" font-size="10" font-weight="800">${score}</text></svg><span class="risk-label" style="color:${col}">${lbl}</span></div>`;
}

function getPlayerStreakBadge(player){
  // Lightweight check based on available season data
  if(!player||!player.apps) return '';
  const cardsPerGame=player.apps>0?player.tot/player.apps:0;
  if(cardsPerGame>=0.6&&player.tot>=3) return `<span class="streak-badge hot">&#x1F525; Card magnet</span>`;
  if(player.tot===0&&player.apps>=5) return `<span class="streak-badge clean">&#x2705; ${player.apps}m clean</span>`;
  return '';
}

// ====== ENHANCEMENT J: Data Freshness Indicators ======
function timeSince(ts){
  if(!ts)return null;
  const diff=Math.round((Date.now()-ts)/60000);
  if(diff<1)return 'Just now';
  if(diff<60)return diff+'m ago';
  const h=Math.floor(diff/60);
  if(h<24)return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function freshnessBadge(tab){
  const ts=S.lastLoaded[tab];
  if(!ts)return '';
  const diff=(Date.now()-ts)/60000;
  const text=timeSince(ts);
  if(diff>120)return `<span class="freshness-badge outdated" onclick="doRefresh('${tab}')">&#x1F534; Outdated - tap to refresh</span>`;
  if(diff>30)return `<span class="freshness-badge stale">&#x1F7E0; ${text}</span>`;
  return `<span class="freshness-badge fresh">&#x1F7E2; ${text}</span>`;
}
function markLoaded(tab){S.lastLoaded[tab]=Date.now()}

// ---- Helpers ----
function ci(type,s=10){const h=Math.round(s*1.36);const c=type==='y'?'ci-y':type==='r'?'ci-r':'ci-yr';return `<span class="ci ${c}" style="width:${s}px;height:${h}px"></span>`}
function toP(r){
  const st=r.statistics?.[0];if(!st)return null;
  const y=st.cards?.yellow||0,yr=st.cards?.yellowred||0,rd=st.cards?.red||0;
  const apps=st.games?.appearences||0,mins=st.games?.minutes||0,fouls=st.fouls?.committed||0,foulsD=st.fouls?.drawn||0;
  const tot=y+yr+rd,p90=mins>0?tot/(mins/90):0,fp90=mins>0?fouls/(mins/90):0,mpc=tot>0?Math.round(mins/tot):0;
  const tackles=st.tackles?.total||0,interceptions=st.tackles?.interceptions||0,blocks=st.tackles?.blocks||0;
  const duelsT=st.duels?.total||0,duelsW=st.duels?.won||0,duelPct=duelsT>0?Math.round(duelsW/duelsT*100):0;
  const dribA=st.dribbles?.attempts||0,dribS=st.dribbles?.success||0;
  const passT=st.passes?.total||0,passA=st.passes?.accuracy||0,passK=st.passes?.key||0;
  const shotsT=st.shots?.total||0,shotsOn=st.shots?.on||0;
  const rating=st.games?.rating?parseFloat(st.games.rating):0;
  let risk='Low',rc='#33d96a';
  if(p90>=.5){risk='Very High';rc='#e53333'}else if(p90>=.35){risk='High';rc='#f59e0b'}else if(p90>=.2){risk='Medium';rc='#ffd700'}
  return{id:r.player.id,name:r.player.name,photo:r.player.photo,age:r.player.age,
    nationality:r.player.nationality,height:r.player.height,weight:r.player.weight,
    injured:r.player.injured,
    team:st.team.name,tlogo:st.team.logo,tid:st.team.id,
    league:st.league.name,season:st.league.season,
    y,yr,rd,tot,apps,mins,fouls,foulsD,p90,fp90,mpc,risk,rc,
    tackles,interceptions,blocks,duelsT,duelsW,duelPct,
    dribA,dribS,passT,passA,passK,shotsT,shotsOn,rating,
    pos:st.games?.position||'',goals:st.goals?.total||0,assists:st.goals?.assists||0}
}
function sdate(d){if(!d)return'';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function stime(d){if(!d)return'';return new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function rbadge(r,c){return `<span class="rbadge" style="color:${c};background:${c}22">${r}</span>`}

  return `<div class="prow" onclick="openPlayer(${p.id})"><span class="prank">${rank}</span><img class="pphoto" src="${p.photo||''}" alt="" onerror="this.src=''"><div class="pinfo"><div class="pname">${p.name}${p.injured?'<span style="color:var(--red);margin-left:4px;font-size:10px">&#x1FA79;</span>':''}${getPlayerStreakBadge(p)}</div><div class="pteam"><img src="${p.tlogo||''}" alt="" onerror="this.style.display='none'">${p.team}</div></div><div class="pcards"><span class="pcc" style="color:var(--yellow)">${ci('y',8)} ${p.y+p.yr}</span>${p.rd>0?`<span class="pcc" style="color:var(--red)">${ci('r',8)} ${p.rd}</span>`:''}</div>${showRate?`<span style="font-size:10px;color:var(--text3)">${p.p90.toFixed(2)}/90</span>`:''}${rbadge(p.risk,p.rc)}</div>`

  // Favourites section (FIX 6)
  const favs=getFavLeagues();
  if(!sq&&favs.length){
    h+=`<div class="lp-fav-label">&#x2B50; Favourites</div><div class="lp-grid lp-fav-section">`;
    favs.forEach(id=>{
      const lg=LEAGUE_MAP[id];if(!lg)return;
      h+=`<div class="lp-item${id===S.league?' sel':''}" onclick="selectLeague(${id})"><img src="${llogo(id)}" alt="" onerror="this.style.display='none'">${flagImg(lg,14)}<span class="lp-i-name">${lg.name}</span><span class="lp-i-check">&#x2713;</span></div>`;
    });
    h+=`</div>`;
  }

  // Recents row (only if no search and has recents)
  if(!sq&&recents.length){
    h+=`<div style="padding:8px 12px 2px;font-size:10px;font-weight:600;color:var(--text3)">RECENT</div>`;
    h+=`<div class="lp-recent">`;
    recents.forEach(id=>{
      const lg=LEAGUE_MAP[id];
      if(!lg) return;
      h+=`<button class="lp-recent-pill${id===S.league?' lpill on':''}" onclick="selectLeague(${id})"><img src="${llogo(id)}" alt="" style="width:12px;height:12px" onerror="this.style.display='none'">${lg.name}</button>`;
    });
    h+=`</div>`;
  }

  // Categories
  LEAGUE_CATS.forEach(cat=>{
    let items=cat.ids.map(id=>LEAGUE_MAP[id]).filter(Boolean);
    if(sq) items=items.filter(l=>l.name.toLowerCase().includes(sq)||l.cc.toLowerCase().includes(sq));
    if(!items.length) return;

    const collapsed=!sq&&lpCollapsed[cat.key];
    h+=`<div class="lp-cat-hdr${collapsed?' collapsed':''}" onclick="toggleLpCat('${cat.key}')"><span>${cat.label}</span><span style="font-size:10px;color:var(--text3);margin-left:4px">(${items.length})</span><span class="lp-cat-arrow">▼</span></div>`;
    if(!collapsed){
      h+=`<div class="lp-grid">`;
      items.forEach(l=>{
        h+=`<div class="lp-item${l.id===S.league?' sel':''}" onclick="selectLeague(${l.id})"><img src="${llogo(l.id)}" alt="" onerror="this.style.display='none'">${flagImg(l,14)}<span class="lp-i-name">${l.name}<br><span class="lp-i-cc">${l.cc}</span></span><button class="lp-fav-star${isFavLeague(l.id)?' faved':''}" onclick="event.stopPropagation();toggleFavLeague(${l.id})">${isFavLeague(l.id)?'&#x2605;':'&#x2606;'}</button><span class="lp-i-check">&#x2713;</span></div>`;
      });
      h+=`</div>`;
    }
  });

  // No results
  if(sq){
    const totalMatches=LEAGUES.filter(l=>l.name.toLowerCase().includes(sq)||l.cc.toLowerCase().includes(sq)).length;
    if(!totalMatches) h+=`<div class="empty" style="padding:30px 20px"><div class="ei">🔍</div><div class="et">No competitions found</div><div class="es">Try a different search term</div></div>`;
  }

  body.innerHTML=h;
  // Refocus search input
  const inp=document.getElementById('lp-search-input');
  if(inp&&sq){inp.focus();inp.setSelectionRange(sq.length,sq.length)}
}

//  CORNER PREDICTION ENGINE
// ======================================================================
async function predictCorners(f){
  try{
    const hid=f.teams.home.id,aid=f.teams.away.id;

    // 1. Get team stats (corners for/against at home and away)
    const [homeStats,awayStats]=await Promise.all([
      api('/teams/statistics',{team:hid,league:S.league,season:S.season},7200).catch(()=>null),
      api('/teams/statistics',{team:aid,league:S.league,season:S.season},7200).catch(()=>null)
    ]);

    // Extract corner data from recent fixtures
    let homeCorFor=5.5,homeCorAg=4.5,awayCorFor=4.5,awayCorAg=5; // defaults
    let homeGamesH=0,awayGamesA=0;

    // Get last 8 home fixtures for home team + last 8 away fixtures for away team
    const [homeFx,awayFx]=await Promise.all([
      api('/fixtures',{team:hid,season:S.season,league:S.league,last:12},3600).catch(()=>[]),
      api('/fixtures',{team:aid,season:S.season,league:S.league,last:12},3600).catch(()=>[])
    ]);

    // Process home team's home matches
    const homeHome=homeFx.filter(fx=>fx.teams.home.id===hid&&['FT','AET','PEN'].includes(fx.fixture.status.short)).slice(0,6);
    let hhCorFor=0,hhCorAg=0;
    for(const fx of homeHome){
      try{
        const ms=await api('/fixtures/statistics',{fixture:fx.fixture.id},86400);
        if(ms.length===2){
          const hTeam=ms.find(t=>t.team.id===hid),aTeam=ms.find(t=>t.team.id!==hid);
          const hc=parseInt(hTeam?.statistics?.find(s=>s.type==='Corner Kicks')?.value)||0;
          const ac=parseInt(aTeam?.statistics?.find(s=>s.type==='Corner Kicks')?.value)||0;
          hhCorFor+=hc;hhCorAg+=ac;homeGamesH++;
        }
      }catch(e){}
    }
    if(homeGamesH>0){homeCorFor=hhCorFor/homeGamesH;homeCorAg=hhCorAg/homeGamesH}

    // Process away team's away matches
    const awayAway=awayFx.filter(fx=>fx.teams.away.id===aid&&['FT','AET','PEN'].includes(fx.fixture.status.short)).slice(0,6);
    let aaCorFor=0,aaCorAg=0;
    for(const fx of awayAway){
      try{
        const ms=await api('/fixtures/statistics',{fixture:fx.fixture.id},86400);
        if(ms.length===2){
          const aTeam=ms.find(t=>t.team.id===aid),hTeam=ms.find(t=>t.team.id!==aid);
          const ac=parseInt(aTeam?.statistics?.find(s=>s.type==='Corner Kicks')?.value)||0;
          const hc=parseInt(hTeam?.statistics?.find(s=>s.type==='Corner Kicks')?.value)||0;
          aaCorFor+=ac;aaCorAg+=hc;awayGamesA++;
        }
      }catch(e){}
    }
    if(awayGamesA>0){awayCorFor=aaCorFor/awayGamesA;awayCorAg=aaCorAg/awayGamesA}

    // 2. Referee corner factor
    let refCorners=10; // league average default
    if(f.fixture.referee){
      const rn=f.fixture.referee.split(',')[0].trim();
      const rs=S.refCache[rn];
      if(rs&&rs.cornpm) refCorners=rs.cornpm;
    }

    // 3. Competitiveness factor (close matches = more corners from pressing)
    let compFactor=1.0,compLabel='Medium';
    try{
      const pr=await api('/predictions',{fixture:f.fixture.id},86400);
      if(pr.length){
        const ph=parseInt(pr[0].predictions?.percent?.home)||50;
        const closeness=1-Math.abs(ph-50)/50; // 1 = very close, 0 = one-sided
        compFactor=0.9+closeness*0.2; // 0.9 to 1.1 range
        compLabel=closeness>0.6?'High (tight game)':closeness>0.3?'Medium':'Low (one-sided)';
      }
    }catch(e){}

    // 4. H2H corner history
    let h2hCorners=0,h2hGames=0;
    try{
      const h2h=await api('/fixtures/headtohead',{h2h:`${hid}-${aid}`,last:5},86400);
      for(const fx of h2h.slice(0,3)){
        try{
          const ms=await api('/fixtures/statistics',{fixture:fx.fixture.id},86400);
          ms.forEach(t=>{
            const c=parseInt(t.statistics?.find(s=>s.type==='Corner Kicks')?.value)||0;
            h2hCorners+=c;
          });
          h2hGames++;
        }catch(e){}
      }
    }catch(e){}
    const h2hAvg=h2hGames>0?h2hCorners/h2hGames:10;

    // 5. WEIGHTED PREDICTION MODEL
    // Home corners = (home team corners at home × 35% + away team corners conceded away × 25% + ref factor portion × 20% + comp × 10% + h2h × 10%)
    const homeExpCorFor=homeCorFor*0.35+awayCorAg*0.25+(refCorners*0.5)*0.20+homeCorFor*compFactor*0.10+(h2hAvg*0.5)*0.10;
    const awayExpCorFor=awayCorFor*0.35+homeCorAg*0.25+(refCorners*0.5)*0.20+awayCorFor*compFactor*0.10+(h2hAvg*0.5)*0.10;
    const totalPred=(homeExpCorFor+awayExpCorFor)*compFactor;

    return{
      total:Math.max(4,totalPred),
      home:Math.max(1.5,homeExpCorFor),
      away:Math.max(1.5,awayExpCorFor),
      homeAvg:homeCorFor,
      awayAvg:awayCorFor,
      homeConceded:homeCorAg,
      awayConceded:awayCorAg,
      refCorners,
      compFactor,
      compLabel,
      h2hAvg,
      confidence:Math.min(95,Math.round((homeGamesH+awayGamesA)*8))
    };
  }catch(e){return null}
}
