function getUKChannel(fixture,leagueId){
  const tvLg=UK_TV_LEAGUES.find(t=>t.lid===leagueId);
  if(!tvLg) return null;
  const d=new Date(fixture.fixture.date);
  const day=d.getDay(); // 0=Sun
  const hour=d.getHours();
  const homeName=fixture.teams?.home?.name||'';

  for(const rule of tvLg.rules){
    // Check home team match (for Nations League etc)
    if(rule.home&&!homeName.includes(rule.home)) continue;
    // Check day restriction
    if(rule.days&&!rule.days.includes(day)) continue;
    // Check hour restriction
    if(rule.hours&&!rule.hours.some(h=>Math.abs(hour-h)<=0)) continue;
    return{ch:rule.ch,cls:rule.cls||'',free:rule.free||false,note:rule.note||''};
  }
  // Fallback: if league has rules but no specific match, use first rule with a channel
  const fallback=tvLg.rules.find(r=>r.ch);
  if(fallback) return{ch:fallback.ch,cls:fallback.cls||'',free:fallback.free||false,note:''};
  return null;
}

// TV Guide date range: 27 Mar 2026 – 31 Jul 2026
const TV_START=new Date('2026-03-27T00:00:00');
const TV_END=new Date('2026-07-31T23:59:59');

let tvViewMode='upcoming'; // 'upcoming' or 'month'
let tvMonthFilter=null; // null = show all, or 'Mar','Apr','May','Jun','Jul'
const TV_MONTHS=['Mar','Apr','May','Jun','Jul'];

async function buildTVGuide(){
  const tvLeagueIds=UK_TV_LEAGUES.map(t=>t.lid);
  const now=new Date();
  const allFixtures=[];

  // Fetch fixtures in 2-week batches across the date range using date param
  // Priority leagues fetched with more depth; others get fewer fixtures
  const priorityLeagues=[39,2,3,848,45,48,179,135,78,61,140,1,4,5,34,11,9,307,253,528];
  const rangeStart=now>TV_START?now:TV_START;

  // Fetch by date windows: today + 2 weeks, then month-by-month summaries
  // For API efficiency, fetch next:20 for priority leagues (covers ~2 months of fixtures)
  for(const lid of priorityLeagues){
    if(!tvLeagueIds.includes(lid)) continue;
    try{
      // Fetch large batch — API returns chronologically, we filter by our date range
      const fx=await api('/fixtures',{league:lid,season:S.season,next:30},3600);
      fx.forEach(f=>{
        const d=new Date(f.fixture.date);
        if(d<rangeStart||d>TV_END) return;
        const tv=getUKChannel(f,lid);
        if(tv&&tv.ch) allFixtures.push({f,tv,lid,date:d});
      });
    }catch(e){}
  }

  // Also fetch for summer tournaments (World Cup, Euros, Copa America) by date range
  const summerTournaments=[1,4,9,15];
  for(const lid of summerTournaments){
    if(priorityLeagues.includes(lid)) continue;
    if(!tvLeagueIds.includes(lid)) continue;
    try{
      const fx=await api('/fixtures',{league:lid,season:S.season,next:30},3600);
      fx.forEach(f=>{
        const d=new Date(f.fixture.date);
        if(d<rangeStart||d>TV_END) return;
        const tv=getUKChannel(f,lid);
        if(tv&&tv.ch) allFixtures.push({f,tv,lid,date:d});
      });
    }catch(e){}
  }

  allFixtures.sort((a,b)=>a.date-b.date);
  if(!allFixtures.length) return '';

  // Group by month, then by date
  const byMonth={};
  TV_MONTHS.forEach(m=>byMonth[m]=[]);
  allFixtures.forEach(item=>{
    const m=item.date.toLocaleDateString('en-GB',{month:'short'});
    if(byMonth[m]) byMonth[m].push(item);
  });

  // Count per month for tabs
  const monthCounts={};
  TV_MONTHS.forEach(m=>monthCounts[m]=byMonth[m].length);
  const totalMatches=allFixtures.length;
  const freeMatches=allFixtures.filter(i=>i.tv.free).length;

  // Build header with stats
  let h=`<div class="sec-title"><span class="dot" style="background:var(--cyan)"></span>📺 Football on UK TV</div>`;
  h+=`<div style="display:flex;gap:8px;padding:0 16px 6px;font-size:10px;color:var(--text2)"><span>${totalMatches} matches</span><span>·</span><span style="color:var(--green)">${freeMatches} free-to-air</span><span>·</span><span>27 Mar – 31 Jul 2026</span></div>`;

  // Month filter pills
  h+=`<div class="pills" style="margin-bottom:8px"><button class="pill${!tvMonthFilter?' on':''}" onclick="tvMonthFilter=null;reRenderTV()">All</button>`;
  TV_MONTHS.forEach(m=>{
    const cnt=monthCounts[m];
    h+=`<button class="pill${tvMonthFilter===m?' on':''}" onclick="tvMonthFilter='${m}';reRenderTV()">${m} <span style="font-size:10px;opacity:.7">(${cnt})</span></button>`;
  });
  h+=`<button class="pill${tvViewMode==='free'?' on':''}" onclick="tvViewMode=tvViewMode==='free'?'upcoming':'free';reRenderTV()">📡 Free only</button></div>`;

  // Filter fixtures
  let filtered=allFixtures;
  if(tvMonthFilter) filtered=filtered.filter(i=>i.date.toLocaleDateString('en-GB',{month:'short'})===tvMonthFilter);
  if(tvViewMode==='free') filtered=filtered.filter(i=>i.tv.free);

  if(!filtered.length){
    h+=`<div class="empty" style="padding:30px"><div class="ei">📺</div><div class="et">No matches found</div><div class="es">Try a different month or filter</div></div>`;
    h+=tvDisclaimer();
    return h;
  }

  // Group filtered by date
  const byDate={};
  filtered.forEach(item=>{
    const dk=item.date.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    if(!byDate[dk]) byDate[dk]=[];
    byDate[dk].push(item);
  });

  let dateCount=0;
  const maxDates=tvMonthFilter?31:21; // Show more if month filtered
  for(const[dateLabel,items] of Object.entries(byDate)){
    if(dateCount>=maxDates) break;
    const isToday=items[0].date.toDateString()===now.toDateString();
    const isTomorrow=items[0].date.toDateString()===new Date(now.getTime()+86400000).toDateString();
    const dayName=items[0].date.toLocaleDateString('en-GB',{weekday:'short'});
    const label=isToday?`📺 Today — ${dateLabel}`:isTomorrow?`Tomorrow — ${dateLabel}`:dateLabel;

    h+=`<div class="tv-date-hdr">${label}</div><div class="card card-flush" style="margin-bottom:8px">`;

    items.forEach(item=>{
      const f=item.f;
      const time=item.date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const lg=LEAGUE_MAP[item.lid];
      const compName=lg?lg.name:'';
      const freeTag=item.tv.free?'<span class="tv-chan free" style="margin-left:4px;font-size:10px">FREE</span>':'';
      const blackout=item.tv.note==='3pm blackout'?'<span style="font-size:10px;color:var(--red);margin-left:4px">🚫 Blackout</span>':'';

      h+=`<div class="tv-card"><span class="tv-time">${time}</span><div class="tv-teams"><div class="tv-match"><img src="${f.teams.home.logo||''}" alt="" style="width:14px;height:14px;vertical-align:middle;margin-right:3px" onerror="this.style.display='none'">${f.teams.home.name} vs ${f.teams.away.name}<img src="${f.teams.away.logo||''}" alt="" style="width:14px;height:14px;vertical-align:middle;margin-left:3px" onerror="this.style.display='none'"></div><div class="tv-comp">${compName}${item.tv.note&&item.tv.note!=='3pm blackout'?' · '+item.tv.note:''}</div></div><span class="tv-chan ${item.tv.cls}">${item.tv.ch||''}</span>${freeTag}${blackout}</div>`;
    });

    h+=`</div>`;
    dateCount++;
  }

  if(Object.keys(byDate).length>maxDates){

}

          h+=`<div style="flex:1;padding:5px 8px;background:var(--card2);border-radius:8px;text-align:center"><div style="font-size:10px;color:var(--text3)">AWAY</div><div style="font-size:14px;font-weight:700;color:var(--purple)">${cornerPred.away.toFixed(1)}</div></div>`;

          const ou=cornerPred.total>=10.5?'Over':'Under';

        }
      }catch(e){}

      // Injuries
      try{
        const inj=await api('/injuries',{fixture:f.fixture.id},3600);
        if(inj.length){
          h+=`<div style="margin-top:6px;display:flex;flex-wrap:wrap">`;
          inj.slice(0,8).forEach(i=>{
            const isSus=i.player.reason?.toLowerCase().includes('suspend');
            h+=`<span class="injchip${isSus?' sus':''}">${isSus?'🚫':'🩹'} ${i.player.name?.split(' ').pop()||'?'}</span>`;
          });
          if(inj.length>8) h+=`<span class="injchip" style="background:var(--card2);color:var(--text3)">+${inj.length-8} more</span>`;
          h+=`</div>`;
        }
      }catch(e){}

      // H2H button
      h+=`<div style="text-align:center;margin-top:6px"><button style="background:var(--card2);border:1px solid var(--divider);color:var(--text2);font-size:10px;padding:4px 14px;border-radius:8px;cursor:pointer" onclick="event.stopPropagation();openH2H(${f.teams.home.id},${f.teams.away.id},'${esc(f.teams.home.name)}','${esc(f.teams.away.name)}','${f.teams.home.logo}','${f.teams.away.logo}')">H2H Discipline Report</button></div>`;
      h+=`</div>`;
    }
    el.innerHTML=h;
  }catch(e){el.innerHTML=`<div class="pg-title">&#x1F4C5; Upcoming ${refreshBtn('upcoming')}</div>${leagueHdr()}${lpicker()}${errPanel(e.message)}`}
}

let refSort='cpm',refExpanded=null,refCompare=[];
async function loadReferees(){
  const el=document.getElementById('page-referees');
  el.innerHTML=`<div class="pg-title">&#x1F3C1; Ref Tracker ${refreshBtn('referees')}${freshnessBadge('referees')}</div>${leagueHdr()}${lpicker()}${skeleton('list')}`;
  try{
    const fx=await api('/fixtures',{league:S.league,season:S.season,status:'FT-AET-PEN'},1800);
    if(!fx.length){el.innerHTML=`<div class="pg-title">&#x1F3C1; Ref Tracker ${refreshBtn('referees')}</div>${leagueHdr()}${lpicker()}<div class="empty"><div class="ei">&#x1F4C5;</div><div class="et">No completed fixtures</div></div>`;return}
    const refMap={};
    fx.forEach(f=>{const rn=f.fixture.referee;if(!rn)return;const name=rn.split(',')[0].trim();if(!refMap[name])refMap[name]={name,matches:0,fixtures:[],yellows:0,reds:0,secondYellows:0,pens:0,pensMissed:0,fouls:0,corners:0,homeCards:0,awayCards:0,firstHalfCards:0,secondHalfCards:0,minuteBuckets:{'1-15':0,'16-30':0,'31-45':0,'46-60':0,'61-75':0,'76-90':0,'90+':0},bigMatches:[],cardEvents:[]};refMap[name].matches++;refMap[name].fixtures.push(f)});
    const allRefs=Object.values(refMap).sort((a,b)=>b.matches-a.matches);
    const topRefs=allRefs.slice(0,20);
    for(const ref of topRefs){
      const sample=ref.fixtures.slice(0,15);
      for(const f of sample){
        try{
          const [events,stats]=await Promise.all([api('/fixtures/events',{fixture:f.fixture.id},86400),api('/fixtures/statistics',{fixture:f.fixture.id},86400).catch(()=>[])]);
          events.filter(e=>e.type==='Card').forEach(c=>{
            const min=(c.time.elapsed||0)+(c.time.extra||0);
            if(c.detail==='Yellow Card'){ref.yellows++;if(c.team.id===f.teams.home.id)ref.homeCards++;else ref.awayCards++;if(min<=45)ref.firstHalfCards++;else ref.secondHalfCards++}
            else if(c.detail==='Second Yellow card'){ref.secondYellows++;if(min<=45)ref.firstHalfCards++;else ref.secondHalfCards++}
            else if(c.detail==='Red Card'){ref.reds++;if(min<=45)ref.firstHalfCards++;else ref.secondHalfCards++}
            if(min<=15)ref.minuteBuckets['1-15']++;else if(min<=30)ref.minuteBuckets['16-30']++;else if(min<=45)ref.minuteBuckets['31-45']++;else if(min<=60)ref.minuteBuckets['46-60']++;else if(min<=75)ref.minuteBuckets['61-75']++;else if(min<=90)ref.minuteBuckets['76-90']++;else ref.minuteBuckets['90+']++;
            ref.cardEvents.push({min,type:c.detail,player:c.player.name,team:c.team.name,reason:c.comments||'',match:`${f.teams.home.name} vs ${f.teams.away.name}`,date:f.fixture.date});
          });
          events.filter(e=>e.type==='Goal'&&(e.detail==='Penalty'||e.detail==='Missed Penalty')).forEach(e=>{if(e.detail==='Penalty')ref.pens++;else ref.pensMissed++});
          stats.forEach(t=>{t.statistics?.forEach(s=>{if(s.type==='Fouls')ref.fouls+=(parseInt(s.value)||0);if(s.type==='Corner Kicks')ref.corners+=(parseInt(s.value)||0)})});
          const totalCards=events.filter(e=>e.type==='Card').length;
          if(totalCards>=6)ref.bigMatches.push({match:`${f.teams.home.name} ${f.goals.home}-${f.goals.away} ${f.teams.away.name}`,cards:totalCards,date:f.fixture.date});
        }catch(e){}
      }
      const gm=Math.min(ref.matches,sample.length);
      ref.cpm=gm>0?(ref.yellows+ref.reds+ref.secondYellows)/gm:0;
      ref.ypm=gm>0?ref.yellows/gm:0;
      ref.rpm=gm>0?(ref.reds+ref.secondYellows)/gm:0;
      ref.ppm=gm>0?(ref.pens+ref.pensMissed)/gm:0;
      ref.fpm=gm>0?ref.fouls/gm:0;
      ref.cornpm=gm>0?ref.corners/gm:0;
      ref.fpt=ref.cpm>0?ref.fpm/ref.cpm:99;
      ref.homeBias=gm>0?ref.homeCards/Math.max(ref.homeCards+ref.awayCards,1)*100:50;
      ref.h1pct=(ref.yellows+ref.reds+ref.secondYellows)>0?ref.firstHalfCards/(ref.firstHalfCards+ref.secondHalfCards)*100:50;
      ref.totalCards=ref.yellows+ref.reds+ref.secondYellows;
      ref.totalPens=ref.pens+ref.pensMissed;
      ref.sampled=gm;
      ref.strict=Math.min(100,Math.round(ref.cpm*12+ref.rpm*30+(1/Math.max(ref.fpt,1))*25+ref.ppm*8));
      S.refCache[ref.name]=ref;
    }
    S._refs=topRefs.filter(r=>r.sampled>0);
    markLoaded('referees');
    renderRefsPage();
  }catch(e){el.innerHTML=`<div class="pg-title">&#x1F3C1; Ref Tracker ${refreshBtn('referees')}</div>${leagueHdr()}${lpicker()}${errPanel(e.message)}`}
}

function renderRefsPage(){

  list.forEach((r,i)=>{

    const isExp=refExpanded===r.name;
    const isCmp=refCompare.includes(r.name);

    h+=`<div class="rcard"><div class="rcard-top" onclick="refExpanded=refExpanded==='${r.name}'?null:'${r.name}';renderRefsPage()"><div class="rcard-rank${rank<=3?' top3':''}">${rank}</div><div class="rcard-info"><div class="rcard-name">${r.name}</div><div class="rcard-meta">${r.matches} matches · ${r.sampled} analyzed</div></div>${rbadge(strictLabel,strictCol)}</div>`;

    h+=`<div class="rcard-stats"><div class="rcard-stat"><div class="sv" style="color:var(--yellow)">${r.cpm.toFixed(1)}</div><div class="sl">Cards/m</div></div><div class="rcard-stat"><div class="sv" style="color:var(--yellow)">${r.ypm.toFixed(1)}</div><div class="sl">${ci('y',6)}/m</div></div><div class="rcard-stat"><div class="sv" style="color:var(--red)">${r.rpm.toFixed(2)}</div><div class="sl">${ci('r',6)}/m</div></div><div class="rcard-stat"><div class="sv" style="color:var(--cyan)">${r.ppm.toFixed(2)}</div><div class="sl">Pens/m</div></div></div>`;

    // Expandable detail

    // Strictness meter
    h+=`<div style="margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span style="color:var(--text2)">Strictness Score</span><span style="color:${strictCol};font-weight:700">${r.strict}/100</span></div><div style="height:7px;border-radius:4px;background:var(--card2)"><div style="height:100%;width:${r.strict}%;border-radius:4px;background:${strictCol}"></div></div></div>`;

    h+=`<div style="text-align:center;padding:6px;background:var(--card2);border-radius:8px"><div style="font-size:14px;font-weight:800;color:var(--orange)">${r.fpt.toFixed(1)}</div><div style="font-size:10px;color:var(--text3)">FOULS/CARD</div></div>`;
    h+=`<div style="text-align:center;padding:6px;background:var(--card2);border-radius:8px"><div style="font-size:14px;font-weight:800;color:var(--blue)">${r.fpm.toFixed(0)}</div><div style="font-size:10px;color:var(--text3)">FOULS/MATCH</div></div>`;

    h+=`<div style="display:flex;gap:8px;margin:8px 0"><div style="flex:1"><div style="font-size:10px;color:var(--text3)">1st Half</div><div style="height:5px;border-radius:3px;background:var(--card2);margin:2px 0"><div style="height:100%;width:${r.h1pct}%;border-radius:3px;background:var(--yellow)"></div></div><div style="font-size:10px;font-weight:700;color:var(--yellow)">${r.h1pct.toFixed(0)}%</div></div><div style="flex:1"><div style="font-size:10px;color:var(--text3)">2nd Half</div><div style="height:5px;border-radius:3px;background:var(--card2);margin:2px 0"><div style="height:100%;width:${100-r.h1pct}%;border-radius:3px;background:var(--orange)"></div></div><div style="font-size:10px;font-weight:700;color:var(--orange)">${(100-r.h1pct).toFixed(0)}%</div></div></div>`;

    if(r.bigMatches.length){

    h+=`</div></div></div></div>`;
  });
  if(!list.length) h+=`<div class="empty"><div class="ei">🏁</div><div class="et">No referee data</div></div>`;
  document.getElementById('page-referees').innerHTML=h;
}

// ---- Ref Compare ----
function toggleRefCompare(name){
  const idx=refCompare.indexOf(name);
  if(idx>=0)refCompare.splice(idx,1);else if(refCompare.length<3)refCompare.push(name);
  updateRefCompareBar();renderRefsPage();
}
function updateRefCompareBar(){
  const bar=document.getElementById('ref-compare-bar');
  const slots=document.getElementById('ref-compare-slots');
  const go=document.getElementById('ref-compare-go');
  bar.classList.toggle('show',refCompare.length>0);
  slots.innerHTML=refCompare.map(n=>`<div class="ref-slot">${n.split(' ').pop()} <span class="x" onclick="toggleRefCompare('${n}')">×</span></div>`).join('');
  go.disabled=refCompare.length<2;
}
function openRefCompare(){
  if(refCompare.length<2)return;
  openModal('refcompare');
  const refs=refCompare.map(n=>(S._refs||[]).find(r=>r.name===n)).filter(Boolean);
  const body=document.getElementById('modal-refcompare-body');
  const metrics=[{key:'strict',label:'Strictness',fmt:v=>v,best:'max'},{key:'cpm',label:'Cards/Match',fmt:v=>v.toFixed(2),best:'max'},{key:'ypm',label:'Yellows/Match',fmt:v=>v.toFixed(2),best:'max'},{key:'rpm',label:'Reds/Match',fmt:v=>v.toFixed(3),best:'max'},{key:'fpt',label:'Foul Tolerance',fmt:v=>v.toFixed(1),best:'min'},{key:'fpm',label:'Fouls/Match',fmt:v=>v.toFixed(0),best:'max'},{key:'ppm',label:'Pens/Match',fmt:v=>v.toFixed(3),best:'max'},{key:'totalPens',label:'Pen Decisions',fmt:v=>v,best:'max'},{key:'cornpm',label:'Corners/Match',fmt:v=>v.toFixed(1),best:'max'},{key:'homeBias',label:'Home Card %',fmt:v=>v.toFixed(0)+'%',best:'none'},{key:'h1pct',label:'1st Half %',fmt:v=>v.toFixed(0)+'%',best:'none'},{key:'matches',label:'Total Matches',fmt:v=>v,best:'max'},{key:'totalCards',label:'Total Cards',fmt:v=>v,best:'max'}];
  let h=`<table class="ctable"><thead><tr><th>Metric</th>${refs.map(r=>`<th style="text-align:center">${r.name.split(' ').pop()}</th>`).join('')}</tr></thead><tbody>`;
  metrics.forEach(m=>{const vals=refs.map(r=>r[m.key]);const best=m.best==='max'?Math.max(...vals):m.best==='min'?Math.min(...vals):null;h+=`<tr><td style="color:var(--text2)">${m.label}</td>`;refs.forEach(r=>{const v=r[m.key];h+=`<td class="${best!==null&&v===best?'win':'lose'}" style="text-align:center">${m.fmt(v)}</td>`});h+=`</tr>`});
  h+=`</tbody></table>`;
  // Visual bars
  const colors=['var(--yellow)','var(--blue)','var(--purple)'];
  ['cpm','fpt','ppm','strict'].forEach(key=>{
    const label={cpm:'Cards/Match',fpt:'Foul Tolerance',ppm:'Penalties/Match',strict:'Strictness'}[key];
    const max=Math.max(...refs.map(r=>r[key]),0.1);
    h+=`<div style="font-size:10px;font-weight:700;margin:10px 0 4px;color:var(--text2)">${label}</div>`;
    refs.forEach((r,i)=>{h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:10px;width:55px;color:var(--text3)">${r.name.split(' ').pop()}</span><div style="flex:1;height:7px;border-radius:4px;background:var(--card2)"><div style="height:100%;width:${(r[key]/max)*100}%;border-radius:4px;background:${colors[i]}"></div></div><span style="font-size:10px;font-weight:700;color:${colors[i]};width:28px;text-align:right">${typeof r[key]==='number'&&r[key]%1?r[key].toFixed(1):r[key]}</span></div>`});
  });
  body.innerHTML=h;
}

function openRefProfile(name){
  const ref=(S._refs||[]).find(r=>r.name===name);if(!ref)return;
  openModal('refprofile');
  const body=document.getElementById('modal-refprofile-body');
  const strictCol=ref.strict>70?'var(--red)':ref.strict>45?'var(--orange)':ref.strict>25?'var(--yellow)':'var(--green)';
  const strictLabel=ref.strict>70?'VERY STRICT':ref.strict>45?'STRICT':ref.strict>25?'MODERATE':'LENIENT';

  let h=`<div class="share-card"><div style="font-size:10px;color:var(--yellow);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${S.season}/${S.season+1} Season</div><div style="font-size:20px;font-weight:900;margin-bottom:10px">${ref.name} ${rbadge(strictLabel,strictCol)}</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px"><div><div style="font-size:20px;font-weight:900;color:var(--yellow)">${ref.cpm.toFixed(1)}</div><div style="font-size:10px;color:var(--text3)">CARDS/MATCH</div></div><div><div style="font-size:20px;font-weight:900;color:var(--red)">${ref.rpm.toFixed(2)}</div><div style="font-size:10px;color:var(--text3)">REDS/MATCH</div></div><div><div style="font-size:20px;font-weight:900;color:var(--cyan)">${ref.ppm.toFixed(2)}</div><div style="font-size:10px;color:var(--text3)">PENS/MATCH</div></div></div><div style="font-size:10px;color:var(--text3)">${ref.matches} matches · ${ref.totalCards} cards · ${ref.totalPens} pen decisions</div></div>`;

  // Gauge
  h+=`<div style="text-align:center;margin:12px 0"><svg width="140" height="80" viewBox="0 0 160 90"><path d="M20 80 A60 60 0 0 1 140 80" fill="none" stroke="var(--card2)" stroke-width="12" stroke-linecap="round"/><path d="M20 80 A60 60 0 0 1 140 80" fill="none" stroke="${strictCol}" stroke-width="12" stroke-dasharray="${(ref.strict/100)*188.5} 188.5" stroke-linecap="round"/><text x="80" y="68" text-anchor="middle" fill="${strictCol}" font-size="26" font-weight="900">${ref.strict}</text><text x="80" y="84" text-anchor="middle" fill="var(--text3)" font-size="9">${strictLabel}</text></svg></div>`;

  // Full stats
  h+=`<div style="font-size:12px;font-weight:700;margin:10px 0 6px">Full Statistics</div>`;
  [['Cards per Match',ref.cpm.toFixed(2),'var(--yellow)'],['Yellows per Match',ref.ypm.toFixed(2),'var(--yellow)'],['Reds per Match',ref.rpm.toFixed(3),'var(--red)'],['Foul Tolerance',ref.fpt.toFixed(1),'var(--orange)'],['Fouls per Match',ref.fpm.toFixed(0),'var(--blue)'],['Pens per Match',ref.ppm.toFixed(3),'var(--cyan)'],['Pens Given',ref.pens,'var(--cyan)'],['Pens Missed',ref.pensMissed,'var(--text2)'],['Corners per Match',ref.cornpm.toFixed(1),'var(--purple)'],['1st Half Cards',ref.h1pct.toFixed(0)+'%','var(--yellow)'],['2nd Half Cards',(100-ref.h1pct).toFixed(0)+'%','var(--orange)'],['Home Card Bias',ref.homeBias.toFixed(0)+'%','var(--blue)'],['Matches Analyzed',ref.sampled,'var(--text2)']].forEach(([l,v,c])=>{h+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--divider);font-size:11px"><span style="color:var(--text2)">${l}</span><span style="font-weight:700;color:${c}">${v}</span></div>`});

  // Timing heatmap
  h+=`<div style="font-size:12px;font-weight:700;margin:14px 0 6px">Card Timing</div>`;
  const bvals=Object.values(ref.minuteBuckets),bmax=Math.max(...bvals,1);
  h+=`<div class="hmap">${Object.entries(ref.minuteBuckets).map(([k,v])=>{const intensity=v/bmax;let bg='var(--card2)';if(intensity>.66)bg='rgba(229,51,51,.5)';else if(intensity>.33)bg='rgba(255,215,0,.3)';else if(intensity>0)bg='rgba(255,215,0,.1)';return `<div><div class="hcell" style="background:${bg};color:${v?'white':'var(--text3)'}">${v}</div><div class="hlbl">${k}'</div></div>`}).join('')}</div>`;

  // Card events log
  if(ref.cardEvents.length){
    h+=`<div style="font-size:12px;font-weight:700;margin:14px 0 6px">Card Decisions (${ref.cardEvents.length})</div>`;
    ref.cardEvents.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).slice(0,25).forEach(c=>{
      const type=c.type==='Yellow Card'?'y':c.type==='Second Yellow card'?'yr':'r';
      h+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--divider);font-size:10px">${ci(type,8)}<span style="font-weight:600;flex:1">${c.player||'?'}</span><span style="color:var(--text3)">${c.min}' · ${c.team}</span></div>`;
      if(c.reason)h+=`<div style="font-size:10px;color:var(--text3);padding:0 0 2px 16px">↳ ${c.reason}</div>`;
    });
  }
  body.innerHTML=h;
}

    // Accuracy tracker
    const predHist=await checkPredAccuracy().catch(()=>[]);
    h+=renderAccuracy(predHist,'cards');
    h+=renderAccuracy(predHist,'corners');

    h+=`<div class="sec-title" style="color:var(--blue)">⚡ Booking Predictions ${tip('predCards')} ${calBadge(S.league)}</div>`;
    h+=`<div style="font-size:10px;color:var(--text3);padding:0 20px 8px">Weighted: Player cards/90 (25%) · Fouls/90 (20%) · Referee tendency (20%) · Match competitiveness (15%) · H2H (10%) · Injuries (10%)</div>`;
    const calMult=getCalMult(S.league);

    for(const f of fx.slice(0,5)){
      h+=`<div class="predcard">`;
      h+=`<div class="ptitle">${f.teams.home.name} vs ${f.teams.away.name}</div>`;
      h+=`<div style="font-size:10px;color:var(--text3);margin-bottom:8px">${stime(f.fixture.date)} ${sdate(f.fixture.date)}${f.fixture.referee?' · 🏁 '+f.fixture.referee.split(',')[0]:''}</div>`;

      let refFactor=0.5;
      if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs)refFactor=Math.min(rs.cpm/8,1)}

      const homePlayers=players.filter(p=>p.tid===f.teams.home.id);
      const awayPlayers=players.filter(p=>p.tid===f.teams.away.id);
      const allMatch=[...homePlayers,...awayPlayers].sort((a,b)=>b.p90-a.p90);
      const avgTeamCards=(homePlayers.reduce((s,p)=>s+p.p90,0)+awayPlayers.reduce((s,p)=>s+p.p90,0));
      const predCards=Math.max(2,Math.round((avgTeamCards*0.6+refFactor*6)*10)/10);

      // Get prediction for competitiveness factor
      let compFactor=0.5,matchPred=null;
      try{const pr=await api('/predictions',{fixture:f.fixture.id},86400);if(pr.length){matchPred=pr[0];const ph=parseInt(pr[0].predictions?.percent?.home)||50;compFactor=1-Math.abs(ph-50)/50}}catch(e){}

      // Injuries count
      let injCount=0;
      try{const inj=await api('/injuries',{fixture:f.fixture.id},3600);injCount=inj.length}catch(e){}

      const adjCards=Math.max(1.5,predCards*(0.7+compFactor*0.3)*calMult);

      h+=`<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">`;
      h+=`<div class="stat-card" style="flex:1;min-width:80px;padding:8px"><div class="lb">Cards</div><div class="vl" style="color:var(--yellow);font-size:18px">${adjCards.toFixed(1)}</div></div>`;
      h+=`<div class="stat-card" style="flex:1;min-width:80px;padding:8px"><div class="lb">Ref</div><div class="vl" style="color:${refFactor>0.6?'var(--red)':'var(--green)'};font-size:18px">${(refFactor*100).toFixed(0)}%</div></div>`;
      h+=`<div class="stat-card" style="flex:1;min-width:80px;padding:8px"><div class="lb">Comp.</div><div class="vl" style="color:${compFactor>0.6?'var(--red)':'var(--blue)'};font-size:18px">${(compFactor*100).toFixed(0)}%</div></div>`;
      h+=`</div>`;

      // Store prediction for accuracy tracking
      storePrediction(f.fixture.id,'cards',adjCards,{home:f.teams.home.name,away:f.teams.away.name});

      if(injCount>0) h+=`<div style="font-size:10px;color:var(--orange);margin-bottom:6px">🩹 ${injCount} players injured/suspended — may affect lineup aggression</div>`;

      if(allMatch.length){
        h+=`<div style="font-size:11px;font-weight:600;margin-bottom:4px">Player Booking Probability ${tip('value')}</div>`;
        allMatch.slice(0,6).forEach(p=>{
          const rawProb=Math.round((p.p90*40+p.fp90*15+refFactor*25+compFactor*10));
          const prob=Math.min(95,Math.round(rawProb*calMult));
          const barCol=prob>60?'var(--red)':prob>35?'var(--orange)':'var(--yellow)';
          const impliedOdds=prob>50?'1.80':'3.00';
          h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><img src="${p.photo||''}" alt="" style="width:20px;height:20px;border-radius:50%;background:var(--card2);flex-shrink:0" onerror="this.src=''"><span style="font-size:10px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span>${vedgeChip(prob,impliedOdds)}<div class="bpbar" style="width:60px;flex-shrink:0"><div class="bpfill" style="width:${prob}%;background:${barCol}"></div><span class="bplabel" style="color:${barCol}">${prob}%</span></div></div>`;
        });
      }

      if(matchPred){
        const mp=matchPred.predictions;
        h+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--divider);font-size:10px;color:var(--blue)">💡 ${mp.advice||''} ${mp.under_over?'· Goals: '+mp.under_over:''}</div>`;
      }

      // Share button
      const topPlayer=allMatch[0];
      const shareText=`⚽ Booking Tip: ${f.teams.home.name} vs ${f.teams.away.name} (${sdate(f.fixture.date)})\\n🟨 Predicted cards: ${adjCards.toFixed(1)}\\n🏁 Referee factor: ${(refFactor*100).toFixed(0)}%\\n${topPlayer?`👤 Top risk: ${topPlayer.name} (${topPlayer.p90.toFixed(2)}/90 · ${topPlayer.risk})`:''} \\n📊 via Booking Analytics Pro`;
      h+=`<div style="display:flex;justify-content:flex-end;gap:6px;margin-top:6px">${trackBtn(f.teams.home.name+' vs '+f.teams.away.name,'Booking',topPlayer?topPlayer.name+' to be booked':'Over '+adjCards.toFixed(1)+' cards','')}${shareBtn(shareText)}</div>`;
      h+=`</div>`;
    }

    // Suspension risk
    h+=`<div class="sec-title" style="color:var(--orange)">⚠️ Suspension Risk</div>`;
    const atRisk=players.filter(p=>p.y>=4&&p.y<5).sort((a,b)=>b.y-a.y);
    const suspended=players.filter(p=>p.y>=5);
    suspended.forEach(p=>{h+=`<div class="sus-alert" style="background:rgba(229,51,51,.06);border-color:rgba(229,51,51,.12)"><span style="color:var(--red)">🚫</span><span style="flex:1">${p.name} (${p.team})</span><span style="color:var(--red);font-weight:700">${p.y+p.yr}Y — SUSPENDED</span></div>`});
    atRisk.forEach(p=>{h+=`<div class="sus-alert"><span style="color:var(--orange)">⚠️</span><span style="flex:1">${p.name} (${p.team})</span><span style="color:var(--orange);font-weight:700">${p.y+p.yr}Y — 1 from ban</span></div>`});
    if(!atRisk.length&&!suspended.length) h+=`<div style="font-size:11px;color:var(--text3);padding:8px 20px">No players at suspension risk</div>`;

    // Feature 6: Matchup Alerts
    h+=`<div class="sec-title" style="color:var(--red)">⚔️ Matchup Alerts</div>`;
    const topMatchupsAll=[];
    for(const f of fx.slice(0,5)){
      const hp=players.filter(p=>p.tid===f.teams.home.id&&p.p90>=0.2);
      const ap=players.filter(p=>p.tid===f.teams.away.id&&p.p90>=0.2);
      let refS=50;
      if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs)refS=rs.strict||50}
      hp.forEach(pA=>{ap.forEach(pB=>{
        const fp90B=pB.mins>0?pB.foulsD/(pB.mins/90):0;
        const sc=(pA.p90*2)+(fp90B*1.5)+(refS/100);
        topMatchupsAll.push({a:pA,b:pB,score:sc,match:f.teams.home.name+' vs '+f.teams.away.name,date:f.fixture.date});
      })});
      ap.forEach(pA=>{hp.forEach(pB=>{
        const fp90B=pB.mins>0?pB.foulsD/(pB.mins/90):0;
        const sc=(pA.p90*2)+(fp90B*1.5)+(refS/100);
        topMatchupsAll.push({a:pA,b:pB,score:sc,match:f.teams.home.name+' vs '+f.teams.away.name,date:f.fixture.date});
      })});
    }
    topMatchupsAll.sort((a,b)=>b.score-a.score);
    const topMU=topMatchupsAll.slice(0,3);
    if(topMU.length){
      topMU.forEach(m=>{
        const barW=Math.min(100,m.score/5*100);
        const rLbl=m.score>3?'HIGH':m.score>2?'MEDIUM':'LOW';
        const rCol=m.score>3?'var(--red)':m.score>2?'var(--orange)':'var(--yellow)';
        h+=`<div class="matchup-row"><img src="${m.a.photo||''}" style="width:24px;height:24px;border-radius:50%;background:var(--card2)" onerror="this.src=''"><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600">${m.a.name} <span class="matchup-arrow">⚡</span> ${m.b.name}</div><div style="font-size:10px;color:var(--text3)">${m.match} · ${sdate(m.date)} · Risk: <strong style="color:${rCol}">${rLbl}</strong></div><div class="matchup-score-bar"><div class="matchup-score-fill" style="width:${barW}%"></div></div></div><img src="${m.b.photo||''}" style="width:24px;height:24px;border-radius:50%;background:var(--card2)" onerror="this.src=''"><div style="flex-shrink:0">${trackBtn(m.match,'Matchup',m.a.name+' to be booked','')}</div></div>`;
      });
    } else {
      h+=`<div style="font-size:11px;color:var(--text3);padding:8px 20px">No high-risk matchups identified for upcoming fixtures</div>`;
    }

    // === CORNER PREDICTIONS SECTION ===
    h+=`<div class="sec-title" style="color:var(--cyan)">⚐ Corner Predictions ${tip('predCorners')}</div>`;
    h+=`<div style="font-size:10px;color:var(--text3);padding:0 20px 8px">Weighted: Team avg corners home/away (35%) · Opponent corners conceded (25%) · Referee corner rate (20%) · Match competitiveness (10%) · H2H corner history (10%)</div>`;

    for(const f of fx.slice(0,5)){
      const cp=await predictCorners(f);
      if(!cp) continue;

      h+=`<div class="predcard" style="border-color:rgba(34,211,238,.15);background:linear-gradient(135deg,#0f1a20,#14202a)">`;
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><img src="${f.teams.home.logo||''}" style="width:20px;height:20px" onerror="this.style.display='none'"><span class="ptitle" style="color:var(--cyan);flex:1">${f.teams.home.name} vs ${f.teams.away.name}</span><img src="${f.teams.away.logo||''}" style="width:20px;height:20px" onerror="this.style.display='none'"></div>`;
      h+=`<div style="font-size:10px;color:var(--text3);margin-bottom:8px">${stime(f.fixture.date)} ${sdate(f.fixture.date)}${f.fixture.referee?' · 🏁 '+f.fixture.referee.split(',')[0]:''}</div>`;

      // Main prediction
      h+=`<div style="display:flex;gap:8px;margin-bottom:8px">`;
      h+=`<div class="stat-card" style="flex:1;padding:8px;background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.1)"><div class="lb" style="color:var(--cyan)">⚐ Predicted Total</div><div class="vl" style="color:var(--cyan)">${cp.total.toFixed(1)}</div></div>`;
      h+=`<div class="stat-card" style="flex:1;padding:8px"><div class="lb">${f.teams.home.name.split(' ')[0]}</div><div class="vl" style="color:var(--blue)">${cp.home.toFixed(1)}</div></div>`;
      h+=`<div class="stat-card" style="flex:1;padding:8px"><div class="lb">${f.teams.away.name.split(' ')[0]}</div><div class="vl" style="color:var(--purple)">${cp.away.toFixed(1)}</div></div>`;
      h+=`</div>`;

      // Over/under lines
      const lines=[{l:'8.5',v:8.5},{l:'9.5',v:9.5},{l:'10.5',v:10.5},{l:'11.5',v:11.5},{l:'12.5',v:12.5}];
      h+=`<div style="display:flex;gap:4px;margin-bottom:6px">`;
      lines.forEach(line=>{
        const over=cp.total>=line.v;
        const conf=Math.min(95,Math.round(Math.abs(cp.total-line.v)/cp.total*100+50));
        const col=over?'var(--green)':'var(--red)';
        h+=`<div style="flex:1;text-align:center;padding:4px 2px;background:${over?'rgba(51,217,106,.06)':'rgba(229,51,51,.06)'};border:1px solid ${over?'rgba(51,217,106,.12)':'rgba(229,51,51,.12)'};border-radius:6px"><div style="font-size:10px;color:var(--text3)">${over?'O':'U'} ${line.l}</div><div style="font-size:10px;font-weight:700;color:${col}">${conf}%</div></div>`;
      });
      h+=`</div>`;

      // Breakdown factors
      h+=`<div style="font-size:10px;font-weight:600;margin-bottom:4px">Prediction Factors</div>`;
      const factors=[
        ['Home team avg corners (H)',cp.homeAvg?.toFixed(1)||'—','var(--blue)'],
        ['Away team avg corners (A)',cp.awayAvg?.toFixed(1)||'—','var(--purple)'],
        ['Corners conceded by home',cp.homeConceded?.toFixed(1)||'—','var(--orange)'],
        ['Corners conceded by away',cp.awayConceded?.toFixed(1)||'—','var(--orange)'],
        ['Referee corner rate',cp.refCorners?.toFixed(1)||'—','var(--cyan)'],
        ['Match competitiveness',cp.compLabel||'Medium','var(--text2)']
      ];
      factors.forEach(([label,val,col])=>{
        h+=`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid var(--divider)"><span style="color:var(--text2)">${label}</span><span style="font-weight:700;color:${col}">${val}</span></div>`;
      });

      // Store + share
      storePrediction(f.fixture.id,'corners',cp.total,{home:f.teams.home.name,away:f.teams.away.name});
      const cornerShareText=`⚐ Corner Tip: ${f.teams.home.name} vs ${f.teams.away.name} (${sdate(f.fixture.date)})\\nPredicted: ${cp.total.toFixed(1)} corners (Home ${cp.home.toFixed(1)} / Away ${cp.away.toFixed(1)})\\n${cp.total>=10.5?'Over':'Under'} 10.5 corners\\nRef avg: ${cp.refCorners.toFixed(1)} corners/m\\n📊 via Booking Analytics Pro`;
      h+=`<div style="display:flex;justify-content:flex-end;margin-top:6px">${shareBtn(cornerShareText)}</div>`;
      h+=`</div>`;
    }

    el.innerHTML=h;
  }catch(e){el.innerHTML=`<div class="pg-title">&#x1F52E; Predictions ${refreshBtn('predictions')}</div>${leagueHdr()}${lpicker()}${errPanel(e.message)}`}
}

// ======================================================================

let liveTimer=null;
async function loadLive(){
  const el=document.getElementById('page-live');
  if(liveTimer)clearInterval(liveTimer);
  async function refresh(){
    try{
      const fx=await api('/fixtures',{live:'all',league:S.league},15);
      let h=`<div class="pg-title">📡 Live Matches</div>${leagueHdr()}${lpicker()}`;
      if(!fx.length){h+=`<div class="empty"><div class="ei">📡</div><div class="et">No Live Matches</div><div class="es">Auto-refreshes every 30s</div></div>`;el.innerHTML=h;return}
      h+=`<div style="font-size:10px;color:var(--text3);padding:4px 20px">${fx.length} live · auto-refresh 30s</div>`;

      // Feature 7: Value alert banners at top
      const valueAlerts=[];

      for(const f of fx){
        h+=`<div class="fcard" style="border:1px solid rgba(51,217,106,.15)">`;
        h+=`<div class="fhdr"><span class="fst" style="color:var(--green);background:rgba(51,217,106,.1)"><span class="ldot" style="width:5px;height:5px;margin-right:4px"></span>${f.fixture.status.elapsed||0}'</span></div>`;
        h+=`<div class="fteams"><div class="fteam"><img src="${f.teams.home.logo||''}" alt="" onerror="this.style.display='none'"><br><span class="ftn">${f.teams.home.name}</span></div><div class="fscore">${f.goals.home??0}<span class="fsep">-</span>${f.goals.away??0}</div><div class="fteam"><img src="${f.teams.away.logo||''}" alt="" onerror="this.style.display='none'"><br><span class="ftn">${f.teams.away.name}</span></div></div>`;

        // Live match stats
        try{
          const ms=await api('/fixtures/statistics',{fixture:f.fixture.id},15);
          if(ms.length===2){
            const getStat=(team,type)=>{const s=team.statistics?.find(s=>s.type===type);return s?s.value:0};
            const stats=['Ball Possession','Shots on Goal','Total Shots','Corner Kicks','Fouls','Yellow Cards','Red Cards','Offsides','Goalkeeper Saves'];
            h+=`<div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--divider)">`;
            stats.forEach(stat=>{
              const hv=getStat(ms[0],stat),av=getStat(ms[1],stat);
              const hn=parseInt(String(hv).replace('%',''))||0,an=parseInt(String(av).replace('%',''))||0;
              const max=Math.max(hn+an,1);
              const isCard=stat.includes('Card');
              const col=isCard?(stat.includes('Red')?'var(--red)':'var(--yellow)'):stat==='Corner Kicks'?'var(--cyan)':'var(--blue)';
              h+=`<div class="mstat"><span class="v vr" style="color:${col}">${hv}</span><div class="bar"><div class="bf" style="width:${hn/max*100}%;background:${col};float:right"></div></div><span class="lb">${stat.replace('Ball ','').replace('Goalkeeper ','')}</span><div class="bar"><div class="bf" style="width:${an/max*100}%;background:${col}"></div></div><span class="v" style="color:${col}">${av}</span></div>`;
            });
            h+=`</div>`;
          }
        }catch(e){}

        // Card events
        try{
          const ev=await api('/fixtures/events',{fixture:f.fixture.id,type:'Card'},15);
          if(ev.length){
            h+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--divider)">`;
            ev.sort((a,b)=>(a.time.elapsed||0)-(b.time.elapsed||0)).forEach(c=>{
              const min=(c.time.elapsed||0)+(c.time.extra||0);
              const type=c.detail==='Yellow Card'?'y':c.detail==='Second Yellow card'?'yr':'r';
              h+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:10px"><span style="font-weight:700;color:var(--text3);width:24px;text-align:right;font-family:monospace">${min}'</span>${ci(type,8)}<span>${c.player.name||'?'}</span><span style="color:var(--text3);margin-left:auto;font-size:10px">${c.team.name}</span></div>`;
            });
            h+=`</div>`;
          }
        }catch(e){}

        // Feature 7: Booking Window indicator
        const elapsed=f.fixture.status.elapsed||0;
        if(f.fixture.referee){
          const rn=f.fixture.referee.split(',')[0].trim();
          const rs=S.refCache[rn];
          if(rs){
            const buckets=['1-15','16-30','31-45','46-60','61-75','76-90'];
            const curBucket=Math.min(Math.floor(elapsed/15),5);
            let peakBucket=0,peakVal=0;
            // Estimate peak from ref data
            buckets.forEach((b,i)=>{
              const v=i===2||i===4?1.3:i===5?1.1:0.8; // generic peak pattern
              if(v>peakVal){peakVal=v;peakBucket=i}
            });
            h+=`<div style="margin-top:6px"><div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px">Booking Window</div><div class="booking-window">`;
            buckets.forEach((b,i)=>{
              const isActive=i===curBucket;
              const isPeak=i===peakBucket;
              h+=`<div class="bw-seg${isActive?' active':''}${isPeak?' peak':''}">${b.replace('-','')}'</div>`;
            });
            h+=`</div></div>`;
          }
        }

        // Feature 7: Match intensity score
        try{
          const ms2=await api('/fixtures/statistics',{fixture:f.fixture.id},15);
          if(ms2.length===2){
            const getSt=(team,type)=>{const s=team.statistics?.find(s=>s.type===type);return parseInt(String(s?.value||0).replace('%',''))||0};
            const totalFouls=getSt(ms2[0],'Fouls')+getSt(ms2[1],'Fouls');
            const totalCards=getSt(ms2[0],'Yellow Cards')+getSt(ms2[1],'Yellow Cards')+getSt(ms2[0],'Red Cards')+getSt(ms2[1],'Red Cards');
            const expectedFouls=elapsed>0?elapsed*0.28:1;
            const expectedCards=elapsed>0?elapsed*0.045:1;
            let refStrict=50;
            if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs)refStrict=rs.strict||50}
            const intensity=Math.min(100,Math.round((totalFouls/Math.max(expectedFouls,1)*40)+(totalCards/Math.max(expectedCards,1)*40)+(refStrict/100*20)));
            const iLbl=intensity>60?'HIGH':intensity>30?'MEDIUM':'LOW';
            const iCls=intensity>60?'intensity-high':intensity>30?'intensity-med':'intensity-low';
            h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><span style="font-size:10px;color:var(--text3)">Match Intensity</span><span class="intensity-gauge ${iCls}">${intensity}/100 ${iLbl}</span></div>`;
          }
        }catch(e){}

        // Booking imminent + Feature 7: Live booking probability
        try{
          const ps=await api('/fixtures/players',{fixture:f.fixture.id},30);
          const cardEv=await api('/fixtures/events',{fixture:f.fixture.id,type:'Card'},15);
          const bookedIds=new Set(cardEv.map(e=>e.player.id));
          let refStrict2=0.5;
          if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs)refStrict2=Math.min(rs.cpm/8,1)}

          const bookingWatch=[];
          ps.forEach(team=>{
            team.players?.forEach(pl=>{
              const fc=pl.statistics?.[0]?.fouls?.committed||0;
              if(fc>=1&&!bookedIds.has(pl.player.id)){
                // Look up base rate from cached player data
                let baseRate=0.2; // default
                const liveProb=Math.min(95,Math.round(baseRate*40*(1+fc*0.3)*refStrict2*100/40));
                bookingWatch.push({name:pl.player.name,id:pl.player.id,team:team.team.name,tlogo:team.team.logo,fouls:fc,prob:liveProb});
                if(liveProb>=65){
                  valueAlerts.push({name:pl.player.name,team:team.team.name,prob:liveProb,matchId:f.fixture.id});
                }
              }
              if(fc>=3&&!bookedIds.has(pl.player.id)){
                h+=`<div class="live-alert warn"><span>⚠️</span><span style="flex:1;font-size:10px">${pl.player.name} — ${fc} fouls, no card</span><span style="font-size:10px;font-weight:700;color:var(--orange)">IMMINENT</span></div>`;
              }
            });
          });

          // Show booking watch list (top 5 by probability)
          bookingWatch.sort((a,b)=>b.prob-a.prob);
          if(bookingWatch.length){
            h+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--divider)"><div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px">Booking Watch</div>`;
            bookingWatch.slice(0,5).forEach(bw=>{
              const col=bw.prob>60?'var(--red)':bw.prob>35?'var(--orange)':'var(--yellow)';
              h+=`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:10px"><span style="flex:1">${bw.name}</span><span style="color:var(--text3)">${bw.fouls} fouls</span><div class="bpbar" style="width:50px;flex-shrink:0"><div class="bpfill" style="width:${bw.prob}%;background:${col}"></div><span class="bplabel" style="color:${col}">${bw.prob}%</span></div></div>`;
            });
            h+=`</div>`;
          }
        }catch(e){}
        h+=`</div>`;
      }
      // Feature 7: Value alert banners at top of live tab
      if(valueAlerts.length){
        let alertH='';
        valueAlerts.slice(0,3).forEach(va=>{
          alertH+=`<div class="value-alert-banner"><span style="font-size:14px">🔔</span><span style="flex:1;font-size:11px"><strong>LIVE VALUE ALERT:</strong> ${va.name} (${va.team}) — ${va.prob}% booking probability. Check in-play odds.</span><button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px" onclick="this.parentElement.remove()">✕</button></div>`;
        });
        h=h.replace('</div>\n      // Feature 7: Value alert banners','</div>');
        // Insert alerts after the live count line
        const insertAfter='auto-refresh 30s</div>';
        h=h.replace(insertAfter,insertAfter+alertH);
      }
      el.innerHTML=h;
    }catch(e){el.innerHTML=`<div class="pg-title">&#x1F4E1; Live Matches ${refreshBtn('live')}</div>${leagueHdr()}${lpicker()}${errPanel(e.message)}`}
  }
  el.innerHTML=`<div class="pg-title">&#x1F4E1; Live Matches ${refreshBtn('live')}${freshnessBadge('live')}</div>${leagueHdr()}${lpicker()}${skeleton('cards')}`;
  await refresh();
  markLoaded('live');
  liveTimer=setInterval(refresh,30000);
}

// ======================================================================
//  FIXTURE DETAIL MODAL — Full Match Stats + Cards + Lineups
// ======================================================================
async function openFixture(id){
  openModal('fixture');
  const body=document.getElementById('modal-fixture-body');
  body.innerHTML=`<div class="loading"><div class="spin"></div><div class="ltxt">Loading details...</div></div>`;
  try{
    let h='';
    let tabContent={stats:'',cards:'',lineups:'',players:''};

    // Fetch all data in parallel
    const [statsData,evData,lineupData,playerData]=await Promise.all([
      api('/fixtures/statistics',{fixture:id},300).catch(()=>[]),
      api('/fixtures/events',{fixture:id},300).catch(()=>[]),
      api('/fixtures/lineups',{fixture:id},3600).catch(()=>[]),
      api('/fixtures/players',{fixture:id},300).catch(()=>[])
    ]);

    // === MATCH STATS TAB ===
    if(statsData.length===2){
      const getStat=(team,type)=>{const s=team.statistics?.find(s=>s.type===type);return s?s.value:0};
      const allStats=['Ball Possession','Total Shots','Shots on Goal','Shots off Goal','Blocked Shots','Shots insidebox','Shots outsidebox','Corner Kicks','Fouls','Yellow Cards','Red Cards','Offsides','Goalkeeper Saves','Total passes','Passes accurate','Passes %'];
      let xg1='',xg2='';
      statsData.forEach(t=>{const x=t.statistics?.find(s=>s.type==='expected_goals');if(x){if(!xg1){xg1=x.value}else{xg2=x.value}}});

      tabContent.stats=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:8px"><div style="display:flex;align-items:center;gap:6px"><img src="${statsData[0].team.logo}" style="width:20px;height:20px"><span style="font-size:12px;font-weight:600">${statsData[0].team.name}</span></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;font-weight:600">${statsData[1].team.name}</span><img src="${statsData[1].team.logo}" style="width:20px;height:20px"></div></div>`;
      if(xg1) tabContent.stats+=`<div class="mstat"><span class="v vr" style="color:var(--cyan)">${xg1}</span><div class="bar"><div class="bf" style="width:${parseFloat(xg1)/(parseFloat(xg1)+parseFloat(xg2||1))*100}%;background:var(--cyan);float:right"></div></div><span class="lb">xG</span><div class="bar"><div class="bf" style="width:${parseFloat(xg2||0)/(parseFloat(xg1)+parseFloat(xg2||1))*100}%;background:var(--cyan)"></div></div><span class="v" style="color:var(--cyan)">${xg2}</span></div>`;

      allStats.forEach(stat=>{
        const hv=getStat(statsData[0],stat),av=getStat(statsData[1],stat);
        const hn=parseInt(String(hv).replace('%',''))||0,an=parseInt(String(av).replace('%',''))||0;
        const max=Math.max(hn+an,1);
        let col='var(--blue)';
        if(stat.includes('Corner'))col='var(--cyan)';
        if(stat.includes('Yellow'))col='var(--yellow)';
        if(stat.includes('Red'))col='var(--red)';
        if(stat.includes('Foul'))col='var(--orange)';
        if(stat.includes('Possession'))col='var(--purple)';
        tabContent.stats+=`<div class="mstat"><span class="v vr" style="color:${col}">${hv}</span><div class="bar"><div class="bf" style="width:${hn/max*100}%;background:${col};float:right"></div></div><span class="lb">${stat.replace('Ball ','').replace('Goalkeeper ','').replace('Total ','')}</span><div class="bar"><div class="bf" style="width:${an/max*100}%;background:${col}"></div></div><span class="v" style="color:${col}">${av}</span></div>`;
      });
    } else tabContent.stats=`<div class="empty"><div class="et">No match stats available</div></div>`;

    // === CARDS TAB ===
    const cards=evData.filter(e=>e.type==='Card').sort((a,b)=>(a.time.elapsed||0)-(b.time.elapsed||0));
    const goals=evData.filter(e=>e.type==='Goal').sort((a,b)=>(a.time.elapsed||0)-(b.time.elapsed||0));
    if(cards.length||goals.length){
      // Timeline
      tabContent.cards=`<div class="tbar"><div class="thalf"></div>`;
      [0,15,30,45,60,75,90].forEach(m=>{tabContent.cards+=`<span class="tmin" style="left:${m/95*100}%">${m}'</span>`});
      cards.forEach(c=>{const min=(c.time.elapsed||0)+(c.time.extra||0);const pct=Math.min(min/95,1)*100;const t=c.detail==='Yellow Card'?'y':c.detail==='Second Yellow card'?'yr':'r';tabContent.cards+=`<div class="tmark" style="left:${pct}%">${ci(t,8)}</div>`});
      tabContent.cards+=`</div>`;

      // Goals
      if(goals.length){
        tabContent.cards+=`<div style="font-size:12px;font-weight:700;margin:8px 0 4px">⚽ Goals</div>`;
        goals.forEach(g=>{const min=(g.time.elapsed||0)+(g.time.extra||0);tabContent.cards+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px"><span style="font-weight:700;color:var(--text3);width:24px;text-align:right;font-family:monospace">${min}'</span><span>⚽</span><span style="flex:1">${g.player.name||'?'}${g.assist?.name?' ('+g.assist.name+')':''}</span><span style="font-size:10px;color:var(--text3)">${g.detail}</span></div>`});
      }

      // Cards list
      tabContent.cards+=`<div style="font-size:12px;font-weight:700;margin:8px 0 4px">Cards (${cards.length})</div>`;
      cards.forEach(c=>{const min=(c.time.elapsed||0)+(c.time.extra||0);const t=c.detail==='Yellow Card'?'y':c.detail==='Second Yellow card'?'yr':'r';tabContent.cards+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--divider);font-size:11px"><span style="font-weight:700;color:var(--text3);width:24px;text-align:right;font-family:monospace">${min}'</span>${ci(t,10)}<div style="flex:1"><span style="cursor:pointer" onclick="closeModal('fixture');openPlayer(${c.player.id})">${c.player.name||'?'}</span></div><span style="font-size:10px;color:var(--text3)">${c.team.name}${c.comments?' · '+c.comments:''}</span></div>`});
    } else tabContent.cards=`<div class="empty"><div class="ei">✅</div><div class="et">No cards or goals</div></div>`;

    // === LINEUPS TAB ===
    if(lineupData.length===2){
      lineupData.forEach(team=>{
        tabContent.lineups+=`<div style="display:flex;align-items:center;gap:6px;margin:8px 0"><img src="${team.team.logo}" style="width:20px;height:20px"><span style="font-size:13px;font-weight:700">${team.team.name}</span><span style="font-size:11px;color:var(--blue);margin-left:auto">${team.formation}</span></div>`;

        // Build pitch visualization from grid positions
        if(team.startXI?.length){
          const rows={};
          team.startXI.forEach(p=>{
            const grid=p.player.grid;
            if(grid){const row=grid.split(':')[0];if(!rows[row])rows[row]=[];rows[row].push(p.player)}
          });
          tabContent.lineups+=`<div class="pitch">`;
          Object.keys(rows).sort((a,b)=>b-a).forEach(row=>{
            tabContent.lineups+=`<div class="pitch-row">${rows[row].map(p=>`<div class="pitch-player"><div class="num">${p.number||''}</div><div class="pn">${p.name?.split(' ').pop()||''}</div></div>`).join('')}</div>`;
          });
          tabContent.lineups+=`</div>`;
        }

        // Subs
        if(team.substitutes?.length){
          tabContent.lineups+=`<div style="font-size:10px;color:var(--text3);margin:6px 0 4px">Substitutes</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;
          team.substitutes.forEach(s=>{tabContent.lineups+=`<span style="font-size:10px;padding:3px 8px;background:var(--card2);border-radius:6px">#${s.player.number||'?'} ${s.player.name?.split(' ').pop()||''}</span>`});
          tabContent.lineups+=`</div>`;
        }
        // Coach
        if(team.coach) tabContent.lineups+=`<div style="font-size:10px;color:var(--text3);margin-top:6px">🎩 ${team.coach.name}</div>`;
      });
    } else tabContent.lineups=`<div class="empty"><div class="et">No lineup data</div></div>`;

    // === TOP PERFORMERS TAB (from /fixtures/players) ===
    if(playerData.length){
      // Find top foulers and carded players
      const allPlayers=[];
      playerData.forEach(team=>{team.players?.forEach(pl=>{
        const s=pl.statistics?.[0];if(!s)return;
        allPlayers.push({name:pl.player.name,photo:pl.player.photo,id:pl.player.id,team:team.team.name,tlogo:team.team.logo,
          rating:parseFloat(s.games?.rating)||0,fouls:s.fouls?.committed||0,foulsD:s.fouls?.drawn||0,
          tackles:s.tackles?.total||0,duels:s.duels?.total||0,duelsW:s.duels?.won||0,
          dribbles:s.dribbles?.success||0,passes:s.passes?.total||0,passAcc:s.passes?.accuracy||0,
          shots:s.shots?.total||0,shotsOn:s.shots?.on||0,yc:s.cards?.yellow||0,rc:s.cards?.red||0});
      })});

      const topFoulers=allPlayers.filter(p=>p.fouls>0).sort((a,b)=>b.fouls-a.fouls).slice(0,5);
      const topTacklers=allPlayers.filter(p=>p.tackles>0).sort((a,b)=>b.tackles-a.tackles).slice(0,5);
      const topRated=allPlayers.filter(p=>p.rating>0).sort((a,b)=>b.rating-a.rating).slice(0,5);
      const topDuels=allPlayers.filter(p=>p.duels>0).sort((a,b)=>(b.duelsW/b.duels)-(a.duelsW/a.duels)).slice(0,5);

      const miniList=(title,emoji,list,valFn)=>{
        let s=`<div style="font-size:12px;font-weight:700;margin:8px 0 4px">${emoji} ${title}</div>`;
        list.forEach((p,i)=>{s+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;cursor:pointer" onclick="closeModal('fixture');openPlayer(${p.id})"><span style="color:var(--text3);width:14px">${i+1}</span><img src="${p.photo||''}" style="width:22px;height:22px;border-radius:50%;background:var(--card2)" onerror="this.src=''"><span style="flex:1">${p.name}</span>${valFn(p)}</div>`});
        return s;
      };
      tabContent.players=miniList('Most Fouls','✋',topFoulers,p=>`<span style="color:var(--orange);font-weight:700">${p.fouls}</span>`);
      tabContent.players+=miniList('Most Tackles','🦵',topTacklers,p=>`<span style="color:var(--blue);font-weight:700">${p.tackles}</span>`);
      tabContent.players+=miniList('Top Rated','⭐',topRated,p=>`<span style="color:var(--yellow);font-weight:700">${p.rating.toFixed(1)}</span>`);
      tabContent.players+=miniList('Duel Win Rate','💪',topDuels,p=>`<span style="color:var(--green);font-weight:700">${p.duels>0?Math.round(p.duelsW/p.duels*100):0}%</span>`);
    } else tabContent.players=`<div class="empty"><div class="et">No player stats</div></div>`;

    // Build tabbed UI
    h+=`<div class="stabs"><button class="stab on" onclick="showFixTab(this,'fx-stats')">Stats</button><button class="stab" onclick="showFixTab(this,'fx-cards')">Cards & Goals</button><button class="stab" onclick="showFixTab(this,'fx-lineups')">Lineups</button><button class="stab" onclick="showFixTab(this,'fx-players')">Players</button></div>`;
    h+=`<div id="fx-stats" class="fx-tab" style="padding-top:10px">${tabContent.stats}</div>`;
    h+=`<div id="fx-cards" class="fx-tab" style="display:none;padding-top:10px">${tabContent.cards}</div>`;

    const posRatio=bench.avg>0?(p.p90/bench.avg):1;
    const posPercentile=Math.max(1,Math.min(99,Math.round(100-Math.min(p.p90/bench.high,1)*100)));
    const posTop=100-posPercentile;
    let posRiskLbl='Low Risk',posRiskCol='var(--text3)';
    if(posTop<=10){posRiskLbl='Very High Risk';posRiskCol='var(--red)'}

    else if(posTop<=50){posRiskLbl='Elevated';posRiskCol='var(--yellow)'}

    const posGA=Math.min(posTop/100,1)*252;

    h+=`<div class="dual-gauge"><div><svg width="90" height="90" viewBox="0 0 130 130"><circle cx="65" cy="65" r="52" fill="none" stroke="var(--card2)" stroke-width="10" stroke-dasharray="327.6" stroke-dashoffset="98.3" transform="rotate(144 65 65)" stroke-linecap="round"/><circle cx="65" cy="65" r="52" fill="none" stroke="${p.rc}" stroke-width="10" stroke-dasharray="${ga} 327.6" transform="rotate(144 65 65)" stroke-linecap="round"/><text x="65" y="58" text-anchor="middle" fill="${p.rc}" font-size="22" font-weight="800">${p.p90.toFixed(2)}</text><text x="65" y="75" text-anchor="middle" fill="var(--text3)" font-size="10">per 90</text></svg><div style="text-align:center;font-size:10px;color:var(--text2);margin-top:2px">Raw Rate</div></div><div><svg width="90" height="90" viewBox="0 0 130 130"><circle cx="65" cy="65" r="52" fill="none" stroke="var(--card2)" stroke-width="10" stroke-dasharray="327.6" stroke-dashoffset="98.3" transform="rotate(144 65 65)" stroke-linecap="round"/><circle cx="65" cy="65" r="52" fill="none" stroke="${posRiskCol}" stroke-width="10" stroke-dasharray="${posGA} 327.6" transform="rotate(144 65 65)" stroke-linecap="round"/><text x="65" y="55" text-anchor="middle" fill="${posRiskCol}" font-size="18" font-weight="800">Top ${posTop}%</text><text x="65" y="72" text-anchor="middle" fill="var(--text3)" font-size="10">${posKey}s</text></svg><div style="text-align:center;font-size:10px;color:var(--text2);margin-top:2px">Position Rank</div></div></div>`;
    h+=`<div style="text-align:center;margin-bottom:4px">${rbadge(p.risk,p.rc)} <span class="rbadge" style="color:${posRiskCol};background:${posRiskCol}22">${posRiskLbl}</span></div>`;
    h+=`<div class="pos-ctx">Most ${posKey.toLowerCase()}s average <strong>${bench.avg}</strong> cards/90. This player is <strong>${posRatio.toFixed(1)}×</strong> the positional average.</div>`;

    h+=`<div class="stat-card" style="padding:8px"><div class="lb">Fouls/90 ${tip('fp90')}</div><div class="vl" style="font-size:16px;color:var(--orange)">${p.fp90.toFixed(1)}</div></div>`;
    h+=`<div class="stat-card" style="padding:8px"><div class="lb">Mins/Card ${tip('mpc')}</div><div class="vl" style="font-size:16px">${p.mpc||'—'}</div></div></div>`;

    // Performance stats
    h+=`<div style="font-size:12px;font-weight:700;padding:6px 0">Performance</div>`;
    h+=`<div class="stat-grid" style="padding:0;gap:6px;margin-bottom:10px">`;
    h+=`<div class="stat-card" style="padding:8px"><div class="lb">⭐ Rating</div><div class="vl" style="font-size:16px;color:var(--yellow)">${p.rating?p.rating.toFixed(1):'—'}</div></div>`;
    h+=`<div class="stat-card" style="padding:8px"><div class="lb">⚽ Goals/Assists</div><div class="vl" style="font-size:16px">${p.goals}/${p.assists}</div></div>`;
    h+=`<div class="stat-card" style="padding:8px"><div class="lb">📊 Apps/Mins</div><div class="vl" style="font-size:16px">${p.apps}</div><div class="sub">${p.mins} mins</div></div>`;
    h+=`<div class="stat-card" style="padding:8px"><div class="lb">🎯 Shots/On</div><div class="vl" style="font-size:16px">${p.shotsT}/${p.shotsOn}</div></div></div>`;

    // Defensive stats
    h+=`<div style="font-size:12px;font-weight:700;padding:6px 0">Defensive</div>`;
    h+=`<div class="stat-grid stat-grid-3" style="padding:0;gap:6px;margin-bottom:10px">`;

    h+=`<div class="stat-card" style="padding:8px"><div class="lb">✅ Pass Acc</div><div class="vl" style="font-size:16px">${p.passA||0}%</div><div class="sub">${p.passT} total</div></div></div>`;

    // Suspension warning
    if(p.y+p.yr>=4){
      const left=5-(p.y+p.yr);
      h+=left<=0?`<div class="sus-alert" style="background:rgba(229,51,51,.06);border-color:rgba(229,51,51,.12);margin:0 0 10px"><span style="color:var(--red)">🚫</span><span>Suspension risk — ${p.y+p.yr} yellows</span></div>`

async function loadPlayerCards(p){
  const el=document.getElementById('player-cards');if(!el)return;
  try{
    const fx=await api('/fixtures',{team:p.tid,season:S.season,league:S.league},3600);
    const finished=fx.filter(f=>['FT','AET','PEN'].includes(f.fixture.status.short)).slice(0,15);
    const buckets=[{l:"1-15'",s:1,e:15,y:0,r:0},{l:"16-30'",s:16,e:30,y:0,r:0},{l:"31-45'",s:31,e:45,y:0,r:0},{l:"46-60'",s:46,e:60,y:0,r:0},{l:"61-75'",s:61,e:75,y:0,r:0},{l:"76-90'",s:76,e:90,y:0,r:0},{l:"90+'",s:91,e:120,y:0,r:0}];
    let cards=[];
    for(const f of finished.slice(0,10)){
      try{
        const ev=await api('/fixtures/events',{fixture:f.fixture.id,type:'Card'},3600);
        ev.filter(e=>e.player.id===p.id).forEach(c=>{
          const min=(c.time.elapsed||0)+(c.time.extra||0);
          const t=c.detail==='Yellow Card'?'y':c.detail==='Second Yellow card'?'yr':'r';
          const opp=f.teams.home.id===p.tid?f.teams.away.name:f.teams.home.name;
          cards.push({min,t,opp,reason:c.comments,date:f.fixture.date});
          buckets.forEach(b=>{if(min>=b.s&&min<=b.e){if(t==='y')b.y++;else b.r++}});
        });
      }catch(e){}
    }
    const mx=Math.max(...buckets.map(b=>b.y+b.r),1);
    let h=`<div style="font-size:12px;font-weight:700;padding:6px 0">📊 When Cards Happen</div><div class="hmap">${buckets.map(b=>{const tot=b.y+b.r;const i=tot/mx;let bg='var(--card2)';if(i>.66)bg='rgba(229,51,51,.5)';else if(i>.33)bg='rgba(255,215,0,.3)';else if(i>0)bg='rgba(255,215,0,.12)';return `<div><div class="hcell" style="background:${bg};color:${tot?'white':'var(--text3)'}">${tot}</div><div class="hlbl">${b.l}</div></div>`}).join('')}</div>`;
    if(cards.length){
      h+=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">Card Log (${cards.length})</div>`;
      cards.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(c=>{
        h+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--divider);font-size:10px">${ci(c.t,9)}<span style="flex:1">${c.min}' vs ${c.opp}</span><span style="color:var(--text3)">${c.reason||''} · ${sdate(c.date)}</span></div>`;
      });
    }
    el.innerHTML=h;
  }catch(e){el.innerHTML=''}
}

async function loadPlayerSeasons(id){
  const el=document.getElementById('player-seasons');if(!el)return;
  const seasons=[S.season-2,S.season-1,S.season];
  const data=[];
  for(const s of seasons){try{const r=await api('/players',{id,season:s},86400);if(r.length){const p=toP(r[0]);if(p)data.push(p)}}catch(e){}}
  if(data.length<2){el.innerHTML='';return}
  const mx=Math.max(...data.map(d=>d.tot),1);
  let h=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">&#x1F4C5; Season Comparison ${sparklineSVG(data.map(d=>d.p90),60,20,'var(--yellow)')}</div>`;
  data.forEach(d=>{
    const yw=(d.y+d.yr)/mx*100,rw=d.rd/mx*100;
    h+=`<div style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-size:10px;color:var(--text2);width:50px">${d.season}/${(d.season+1).toString().slice(-2)}</span><div style="flex:1;display:flex;gap:2px"><div style="width:${yw}%;height:12px;background:var(--yellow);border-radius:3px"></div>${d.rd>0?`<div style="width:${rw}%;height:12px;background:var(--red);border-radius:3px"></div>`:''}</div><span style="font-size:11px;font-weight:700;width:20px;text-align:right">${d.tot}</span></div><div style="font-size:10px;color:var(--text3);padding-left:56px">${d.apps} apps · ${d.p90.toFixed(2)}/90 · ⭐ ${d.rating?d.rating.toFixed(1):'—'}</div></div>`;
  });
  el.innerHTML=h;
}

async function openTeam(tid,name){

      // Get fouls data from recent fixtures
      let teamFouls=0,oppFouls=0,teamCardsFromFx=0,oppCards=0,fxCount=0;
      let homeFouls=0,homeCards=0,homeGames=0,awayFouls=0,awayCards=0,awayGames=0;
      try{

        const finFx=teamFx.filter(fx=>['FT','AET','PEN'].includes(fx.fixture.status.short));

              const isHome=fx.teams.home.id===tid;
              const us=ms.find(t=>t.team.id===tid);
              const them=ms.find(t=>t.team.id!==tid);

              const theirFouls=parseInt(them?.statistics?.find(s=>s.type==='Fouls')?.value)||0;
              const ourYC=parseInt(us?.statistics?.find(s=>s.type==='Yellow Cards')?.value)||0;
              const ourRC=parseInt(us?.statistics?.find(s=>s.type==='Red Cards')?.value)||0;
              const theirYC=parseInt(them?.statistics?.find(s=>s.type==='Yellow Cards')?.value)||0;
              const theirRC=parseInt(them?.statistics?.find(s=>s.type==='Red Cards')?.value)||0;
              teamFouls+=ourFouls;oppFouls+=theirFouls;teamCardsFromFx+=ourYC+ourRC;oppCards+=theirYC+theirRC;fxCount++;
              if(isHome){homeFouls+=ourFouls;homeCards+=ourYC+ourRC;homeGames++}
              else{awayFouls+=ourFouls;awayCards+=ourYC+ourRC;awayGames++}
            }
          }catch(e){}
        }
      }catch(e){}

      if(fxCount>=5){
        const foulsPerCard=teamCardsFromFx>0?(teamFouls/teamCardsFromFx).toFixed(1):'—';
        const oppFoulsPerCard=oppCards>0?(oppFouls/oppCards).toFixed(1):'—';
        const homeFPC=homeCards>0?(homeFouls/homeCards).toFixed(1):'—';
        const awayFPC=awayCards>0?(awayFouls/awayCards).toFixed(1):'—';
        const leagueAvgFPC=3.8;

        h+=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">⚖️ Disciplinary Efficiency</div>`;
        h+=`<div class="stat-grid" style="padding:0;gap:6px;margin-bottom:6px">`;
        h+=`<div class="stat-card" style="padding:8px"><div class="lb">Fouls/Card (Own)</div><div class="vl" style="font-size:16px;color:var(--orange)">${foulsPerCard}</div><div class="sub">Lg avg: ${leagueAvgFPC}</div></div>`;
        h+=`<div class="stat-card" style="padding:8px"><div class="lb">Opp Fouls/Card</div><div class="vl" style="font-size:16px;color:var(--blue)">${oppFoulsPerCard}</div><div class="sub">Against this team</div></div>`;
        h+=`<div class="stat-card" style="padding:8px"><div class="lb">Home F/C Ratio</div><div class="vl" style="font-size:16px">${homeFPC}</div><div class="sub">${homeGames} home games</div></div>`;
        h+=`<div class="stat-card" style="padding:8px"><div class="lb">Away F/C Ratio</div><div class="vl" style="font-size:16px">${awayFPC}</div><div class="sub">${awayGames} away games</div></div>`;
        h+=`</div>`;

        const comparison=parseFloat(foulsPerCard)>leagueAvgFPC?'above':'below';
        h+=`<div style="font-size:11px;color:var(--text2);padding:4px 0 8px;line-height:1.4">Referees book ${decodeURIComponent(name)} after <strong>${foulsPerCard}</strong> fouls on average — <strong>${comparison}</strong> the league average of ${leagueAvgFPC} fouls per card.</div>`;
      }
    }

    // Penalties
    const pen=teamStats.penalty;
    if(pen){
      h+=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">🎯 Penalties</div>`;
      const scored=pen.scored?.total||0,missed=pen.missed?.total||0,total=scored+missed;
      const pct=total>0?Math.round(scored/total*100):0;
      h+=`<div class="stat-grid stat-grid-3" style="padding:0;gap:6px;margin-bottom:10px">`;
      h+=`<div class="stat-card" style="padding:8px"><div class="lb" style="color:var(--green)">Scored</div><div class="vl" style="font-size:16px;color:var(--green)">${scored}</div></div>`;
      h+=`<div class="stat-card" style="padding:8px"><div class="lb" style="color:var(--red)">Missed</div><div class="vl" style="font-size:16px;color:var(--red)">${missed}</div></div>`;
      h+=`<div class="stat-card" style="padding:8px"><div class="lb">Conversion</div><div class="vl" style="font-size:16px">${pct}%</div></div></div>`;
    }

    // Lineups/formations used
    if(teamStats.lineups?.length){
      h+=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">📋 Formations Used</div>`;
      teamStats.lineups.sort((a,b)=>b.played-a.played).forEach(l=>{
        h+=`<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px"><span style="color:var(--blue);font-weight:700;width:55px">${l.formation}</span><div style="flex:1;height:8px;background:var(--card2);border-radius:4px"><div style="height:100%;width:${l.played/(teamStats.lineups[0].played)*100}%;background:var(--blue);border-radius:4px"></div></div><span style="color:var(--text2)">${l.played} matches</span></div>`;
      });
    }

    // Goals by minute
    if(gf?.minute){
      h+=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">⚽ Goals by Minute</div>`;
      const gIntervals=['0-15','16-30','31-45','46-60','61-75','76-90','91-105','106-120'];
      const gData=gIntervals.map(iv=>gf.minute[iv]?.total||0);
      const maxG=Math.max(...gData,1);
      h+=`<div class="hmap">${gIntervals.map((iv,i)=>{const v=gData[i];const intensity=v/maxG;let bg='var(--card2)';if(intensity>.66)bg='rgba(51,217,106,.5)';else if(intensity>.33)bg='rgba(51,217,106,.25)';else if(intensity>0)bg='rgba(51,217,106,.1)';return `<div><div class="hcell" style="background:${bg};color:${v?'white':'var(--text3)'}">${v}</div><div class="hlbl">${iv}'</div></div>`}).join('')}</div>`;
    }

    // Current injuries
    if(injuries.length){
      h+=`<div style="font-size:12px;font-weight:700;padding:8px 0 4px">🩹 Injuries & Suspensions (${injuries.length})</div>`;
      const unique={};
      injuries.forEach(i=>{if(!unique[i.player.id])unique[i.player.id]=i});
      Object.values(unique).slice(0,10).forEach(i=>{
        const isSus=i.player.reason?.toLowerCase().includes('suspend');
        h+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px"><span>${isSus?'🚫':'🩹'}</span><span style="flex:1;cursor:pointer" onclick="closeModal('team');openPlayer(${i.player.id})">${i.player.name}</span><span style="color:${isSus?'var(--yellow)':'var(--red)'};font-size:10px">${i.player.reason||i.player.type||''}</span></div>`;
      });
    }

    body.innerHTML=h;
  }catch(e){body.innerHTML=errPanel(e.message)}
}

async function openH2H(t1,t2,n1,n2,l1,l2){
  openModal('h2h');
  const body=document.getElementById('modal-h2h-body');
  body.innerHTML=`<div class="loading"><div class="spin"></div><div class="ltxt">Loading details...</div></div>`;
  try{
    const fx=await api('/fixtures/headtohead',{h2h:`${t1}-${t2}`,last:10},86400);
    let h=`<div class="h2h-vs"><div class="h2h-team"><img src="${l1}" alt="" onerror="this.style.display='none'"><span>${decodeURIComponent(n1)}</span></div><span class="h2h-x">VS</span><div class="h2h-team"><img src="${l2}" alt="" onerror="this.style.display='none'"><span>${decodeURIComponent(n2)}</span></div></div>`;
    if(!fx.length){h+=`<div class="empty"><div class="et">No H2H data</div></div>`;body.innerHTML=h;return}
    let totalCards=0,totalY=0,totalR=0,totalCorners=0,totalFouls=0,matchCount=0;
    for(const f of fx.slice(0,8)){
      try{
        const [ev,ms]=await Promise.all([
          api('/fixtures/events',{fixture:f.fixture.id,type:'Card'},86400),
          api('/fixtures/statistics',{fixture:f.fixture.id},86400).catch(()=>[])
        ]);
        const yc=ev.filter(e=>e.detail==='Yellow Card').length;
        const rc=ev.filter(e=>e.detail==='Red Card'||e.detail==='Second Yellow card').length;
        totalY+=yc;totalR+=rc;totalCards+=yc+rc;matchCount++;

        // Corners & fouls from stats
        ms.forEach(t=>{t.statistics?.forEach(s=>{
          if(s.type==='Corner Kicks')totalCorners+=(parseInt(s.value)||0);
          if(s.type==='Fouls')totalFouls+=(parseInt(s.value)||0);
        })});

        h+=`<div class="fcard" style="margin:0 0 8px" onclick="openFixture(${f.fixture.id})"><div class="fhdr"><span class="fst" style="color:var(--text3);background:rgba(85,85,85,.1)">FT</span><span style="font-size:10px;color:var(--text3)">${sdate(f.fixture.date)}</span><span style="font-size:10px">${yc?`${ci('y',7)} ${yc}`:''} ${rc?`${ci('r',7)} ${rc}`:''}</span></div><div class="fteams"><div class="fteam"><span class="ftn">${f.teams.home.name}</span></div><div class="fscore" style="font-size:18px">${f.goals.home??0}<span class="fsep">-</span>${f.goals.away??0}</div><div class="fteam"><span class="ftn">${f.teams.away.name}</span></div></div></div>`;
      }catch(e){}
    }
    const avgCards=matchCount>0?(totalCards/matchCount).toFixed(1):'0';
    const avgCorners=matchCount>0?(totalCorners/matchCount).toFixed(1):'0';
    const avgFouls=matchCount>0?(totalFouls/matchCount).toFixed(1):'0';
    const isHeated=avgCards>4.5;
    const summaryH=`<div class="stat-grid" style="padding:0;margin:8px 0;gap:6px"><div class="stat-card" style="padding:8px"><div class="lb">Avg Cards</div><div class="vl" style="font-size:16px;color:${isHeated?'var(--red)':'var(--yellow)'};">${avgCards}</div><div class="sub">${isHeated?'🔥 Heated':'Normal'}</div></div><div class="stat-card" style="padding:8px"><div class="lb">Total Cards</div><div class="vl" style="font-size:16px">${totalCards}</div><div class="sub">${ci('y',7)} ${totalY} · ${ci('r',7)} ${totalR}</div></div><div class="stat-card" style="padding:8px"><div class="lb">⚐ Avg Corners</div><div class="vl" style="font-size:16px;color:var(--cyan)">${avgCorners}</div></div><div class="stat-card" style="padding:8px"><div class="lb">✋ Avg Fouls</div><div class="vl" style="font-size:16px;color:var(--orange)">${avgFouls}</div></div></div><div class="sec-title" style="padding-left:0">Recent Meetings</div>`;
    h=h.replace('</div><div class="fcard"',`</div>${summaryH}<div class="fcard"`);

    // Feature 6: Matchup Intelligence
    try{
      const [p1data,p2data]=await Promise.all([
        api('/players/topyellowcards',{league:S.league,season:S.season},43200).catch(()=>[]),
        Promise.resolve([]) // reuse same data
      ]);
      const allPlayers=p1data.map(toP).filter(Boolean);
      const t1Players=allPlayers.filter(p=>p.tid===t1);
      const t2Players=allPlayers.filter(p=>p.tid===t2);

      if(t1Players.length&&t2Players.length){
        h+=`<div class="sec-title" style="padding-left:0;padding-top:12px">⚔️ Matchup Intelligence</div>`;

        // Get ref strictness
        let refStrict=50;
        // Compute matchup scores
        const matchups=[];
        t1Players.forEach(pA=>{
          t2Players.forEach(pB=>{
            const score=(pA.p90*2)+(pB.foulsD>0&&pB.mins>0?(pB.foulsD/(pB.mins/90))*1.5:0)+(refStrict/100);
            matchups.push({a:pA,b:pB,score,reason:`${pA.p90.toFixed(2)} cards/90 · Opp draws ${pB.mins>0?(pB.foulsD/(pB.mins/90)).toFixed(1):'?'} fouls/90 · Ref ${refStrict}`});
          });
        });
        // Also reverse: B cards vs A draws fouls
        t2Players.forEach(pA=>{
          t1Players.forEach(pB=>{
            const score=(pA.p90*2)+(pB.foulsD>0&&pB.mins>0?(pB.foulsD/(pB.mins/90))*1.5:0)+(refStrict/100);
            matchups.push({a:pA,b:pB,score,reason:`${pA.p90.toFixed(2)} cards/90 · Opp draws ${pB.mins>0?(pB.foulsD/(pB.mins/90)).toFixed(1):'?'} fouls/90 · Ref ${refStrict}`});
          });
        });
        matchups.sort((a,b)=>b.score-a.score);
        const topMatchups=matchups.slice(0,3);

        topMatchups.forEach(m=>{
          const barW=Math.min(100,m.score/5*100);
          const riskLbl=m.score>3?'HIGH':m.score>2?'MEDIUM':'LOW';
          const riskCol=m.score>3?'var(--red)':m.score>2?'var(--orange)':'var(--yellow)';
          h+=`<div class="matchup-row"><img src="${m.a.photo||''}" style="width:28px;height:28px;border-radius:50%;background:var(--card2)" onerror="this.src=''"><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600">${m.a.name} <span class="matchup-arrow">⚡</span> ${m.b.name}</div><div style="font-size:10px;color:var(--text3)">Booking risk: <strong style="color:${riskCol}">${riskLbl}</strong></div><div class="matchup-score-bar"><div class="matchup-score-fill" style="width:${barW}%"></div></div><div style="font-size:10px;color:var(--text3)">${m.reason}</div></div><img src="${m.b.photo||''}" style="width:28px;height:28px;border-radius:50%;background:var(--card2)" onerror="this.src=''"></div>`;
        });
        if(!matchups.length) h+=`<div style="font-size:11px;color:var(--text3);padding:8px 0">No matchup data available. Matchup based on card history only.</div>`;
      }
    }catch(e){}

    body.innerHTML=h;
  }catch(e){body.innerHTML=errPanel(e.message)}
}
