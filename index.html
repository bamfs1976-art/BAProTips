function getWatchPlayers(){try{return JSON.parse(localStorage.getItem('ba_watch_p'))||[]}catch(e){return[]}}
function getWatchTeams(){try{return JSON.parse(localStorage.getItem('ba_watch_t'))||[]}catch(e){return[]}}
function saveWatchPlayers(list){localStorage.setItem('ba_watch_p',JSON.stringify(list.slice(0,20)))}
function saveWatchTeams(list){localStorage.setItem('ba_watch_t',JSON.stringify(list.slice(0,10)))}

function isWatchedPlayer(id){return getWatchPlayers().some(p=>p.id===id)}
function isWatchedTeam(id){return getWatchTeams().some(t=>t.id===id)}

function toggleWatchPlayer(id,name,photo,team,tlogo){
  let list=getWatchPlayers();
  const idx=list.findIndex(p=>p.id===id);
  if(idx>=0)list.splice(idx,1);else list.push({id,name,photo,team,tlogo,added:Date.now()});
  saveWatchPlayers(list);
  if(S.tab==='watchlist')loadWatchlist();
}
function toggleWatchTeam(id,name,logo){
  let list=getWatchTeams();
  const idx=list.findIndex(t=>t.id===id);
  if(idx>=0)list.splice(idx,1);else list.push({id,name,logo,added:Date.now()});
  saveWatchTeams(list);
  if(S.tab==='watchlist')loadWatchlist();
}
function pinBtn(type,id,name,extra1,extra2,extra3){
  const watched=type==='player'?isWatchedPlayer(id):isWatchedTeam(id);
  if(type==='player') return `<button class="pin-btn${watched?' pinned':''}" onclick="event.stopPropagation();toggleWatchPlayer(${id},'${esc(name)}','${extra1||''}','${extra2||''}','${extra3||''}')" title="${watched?'Remove from watchlist':'Add to watchlist'}">${watched?'★':'☆'}</button>`;
  return `<button class="pin-btn${watched?' pinned':''}" onclick="event.stopPropagation();toggleWatchTeam(${id},'${esc(name)}','${extra1||''}')" title="${watched?'Remove from watchlist':'Add to watchlist'}">${watched?'★':'☆'}</button>`;
}

// ======================================================================
//  PREDICTION ACCURACY TRACKER
// ======================================================================
function getPredHistory(){try{return JSON.parse(localStorage.getItem('ba_pred_hist'))||[]}catch(e){return[]}}
function savePredHistory(list){localStorage.setItem('ba_pred_hist',JSON.stringify(list.slice(-100)))}

function storePrediction(fixtureId,type,predicted,details){
  const hist=getPredHistory();
  if(hist.some(h=>h.fid===fixtureId&&h.type===type)) return; // already stored
  hist.push({fid:fixtureId,type,predicted,details,date:Date.now(),result:null,actual:null});
  savePredHistory(hist);
}

async function checkPredAccuracy(){
  const hist=getPredHistory();
  let updated=false;
  for(const pred of hist){
    if(pred.result!==null) continue; // already resolved
    try{
      const fx=await api('/fixtures',{id:pred.fid},300);
      if(!fx.length) continue;
      const f=fx[0];
      if(!['FT','AET','PEN'].includes(f.fixture.status.short)) continue;

      if(pred.type==='cards'){
        const ev=await api('/fixtures/events',{fixture:pred.fid,type:'Card'},3600);
        const actual=ev.filter(e=>e.type==='Card').length;
        pred.actual=actual;
        pred.result=Math.abs(actual-pred.predicted)<=1.5?'hit':'miss';
        updated=true;
      } else if(pred.type==='corners'){
        const ms=await api('/fixtures/statistics',{fixture:pred.fid},3600);
        let actual=0;
        ms.forEach(t=>{const c=t.statistics?.find(s=>s.type==='Corner Kicks');actual+=(parseInt(c?.value)||0)});
        pred.actual=actual;
        pred.result=Math.abs(actual-pred.predicted)<=2?'hit':'miss';
        updated=true;
      }
    }catch(e){}
  }
  if(updated) savePredHistory(hist);
  return hist;
}

function renderAccuracy(hist,type){
  const resolved=hist.filter(h=>h.type===type&&h.result!==null);
  if(!resolved.length) return '';
  const hits=resolved.filter(h=>h.result==='hit').length;
  const pct=Math.round(hits/resolved.length*100);
  const col=pct>=60?'var(--green)':pct>=40?'var(--yellow)':'var(--red)';
  return `<div class="acc-bar"><svg class="acc-ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="14" fill="none" stroke="var(--card2)" stroke-width="4"/><circle cx="18" cy="18" r="14" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${pct*0.88} 88" transform="rotate(-90 18 18)" stroke-linecap="round"/><text x="18" y="20" text-anchor="middle" fill="${col}" font-size="9" font-weight="800">${pct}%</text></svg><div style="flex:1"><div style="font-size:11px;font-weight:700">${type==='cards'?'Booking':'Corner'} Accuracy</div><div style="font-size:10px;color:var(--text3)">${hits}/${resolved.length} predictions within range · Last ${resolved.length} matches</div></div></div>`;
}

// ======================================================================
//  VALUE RATING — model prob vs implied odds prob
// ======================================================================
function calcValue(modelProb,odds){
  // odds is decimal string like "2.50"
  const dec=parseFloat(odds);
  if(!dec||dec<=1) return null;
  const impliedProb=1/dec*100;
  const edge=modelProb-impliedProb;
  if(edge>=15) return {label:'GOOD VALUE',cls:'good',edge:edge.toFixed(0)};
  if(edge>=0) return {label:'FAIR',cls:'fair',edge:edge.toFixed(0)};
  return {label:'POOR VALUE',cls:'poor',edge:edge.toFixed(0)};
}
function valueBadge(v){
  if(!v) return '';
  return `<span class="vbadge ${v.cls}">${v.label} ${v.edge>0?'+':''}${v.edge}%</span>`;
}

  homeBias:{title:'Home/Away Card Bias',body:'Percentage of cards given to home vs away teams. 50% is neutral. Above 55% home bias means the ref cards visiting teams less. Below 45% means the ref is tougher on home teams.'},
  btts:{title:'Both Teams to Score (BTTS)',body:'Both teams must score at least one goal during the match. BTTS Yes wins if both teams score. BTTS No wins if either team fails to score.'},
  oneXtwo:{title:'1X2 (Match Result)',body:'Predict the full time result: Home Win (1), Draw (X) or Away Win (2). The most common football bet type.'},
  asian_handicap:{title:'Asian Handicap',body:'One team is given a goal advantage or deficit before kick off. This removes the draw outcome. A -1 handicap means that team must win by more than one goal for the bet to win.'},
  over_under:{title:'Over/Under Goals',body:'You predict whether the total goals scored in the match will be above or below a set number. Over 2.5 means three or more goals are needed to win.'},
  correct_score:{title:'Correct Score',body:'Predict the exact final score of the match. High odds but requires pinpoint accuracy. Even one goal difference means the bet loses.'},
  first_team_score:{title:'First Team to Score',body:'Which team scores the first goal of the match. If the match ends 0-0 the bet is usually void depending on bookmaker rules.'},
  win_to_nil:{title:'Win to Nil',body:'Your selected team wins the match without conceding any goals. Both conditions must be true for the bet to win.'},

};

function getAccaCache(){try{return JSON.parse(localStorage.getItem('ba_accas'))||{}}catch(e){return{}}}
function saveAccaCache(d){localStorage.setItem('ba_accas',JSON.stringify(d))}
function timeAgo(ts){if(!ts)return'Never';const m=Math.round((Date.now()-ts)/60000);if(m<1)return'Just now';if(m<60)return m+' min ago';const h=Math.round(m/60);return h+'h ago'}
function isWeekend(){const d=new Date().getDay();return d===0||d===6}
function toFrac(dec){if(!dec||dec<=1)return'—';const d=parseFloat(dec);const fracs=[[1,1],[6,5],[5,4],[13,10],[7,5],[6,4],[13,8],[7,4],[15,8],[2,1],[9,4],[5,2],[11,4],[3,1],[10,3],[7,2],[4,1],[9,2],[5,1],[6,1],[7,1],[8,1],[10,1],[12,1],[14,1],[16,1],[20,1],[25,1],[33,1],[50,1],[66,1],[100,1]];let best='',minDiff=999;fracs.forEach(([n,dn])=>{const v=n/dn+1;const diff=Math.abs(v-d);if(diff<minDiff){minDiff=diff;best=n+'/'+dn}});return minDiff<0.15?best:d.toFixed(2)}

async function loadAccas(forceRefresh=false){
  const el=document.getElementById('page-accas');
  const cached=getAccaCache();
  // Show cached immediately while loading
  if(cached.html&&!forceRefresh){
    el.innerHTML=cached.html;
    // Refresh in background if stale
    if(!cached.ts||Date.now()-cached.ts>1800000) generateAccas(false);
    return;
  }
  el.innerHTML=`<div class="pg-title">🎯 Acca Engine</div>${leagueHdr()}<div class="loading"><div class="spin"></div><div class="ltxt">Generating accumulator tips...</div></div>`;
  await generateAccas(true);
}

async function generateAccas(renderNow){
  try{
    // Fetch next 48h fixtures
    const allFx=await api('/fixtures',{league:S.league,season:S.season,next:20},300);
    const now=new Date();
    const in48h=new Date(now.getTime()+48*3600000);
    const fx48=allFx.filter(f=>new Date(f.fixture.date)<=in48h);
    const weekend=isWeekend();
    const wkDay=now.getDay();
    // Weekend fixtures (Sat+Sun)
    const fxWeekend=allFx.filter(f=>{const d=new Date(f.fixture.date).getDay();return d===0||d===6});

    // Fetch predictions for all fixtures
    const predMap={};
    for(const f of allFx.slice(0,15)){
      try{
        const pr=await api('/predictions',{fixture:f.fixture.id},86400);
        if(pr.length) predMap[f.fixture.id]=pr[0];
      }catch(e){}
    }

    // Fetch odds
    const oddsMap={};
    for(const f of allFx.slice(0,15)){
      try{
        const od=await api('/odds',{fixture:f.fixture.id,bookmaker:8},86400);
        if(od.length) oddsMap[f.fixture.id]=od[0];
      }catch(e){}
    }

    // Fetch player data for bookings acca
    let players=[];
    try{
      const yl=await api('/players/topyellowcards',{league:S.league,season:S.season},43200);
      players=yl.map(toP).filter(Boolean);
    }catch(e){}

    const ts=Date.now();
    let h=`<div class="pg-title">🎯 Acca Engine</div>${leagueHdr()}`;
    h+=`<div style="font-size:10px;color:var(--text3);padding:2px 20px 8px">Auto-generated accumulators from our prediction models</div>`;

    // ========== 1. MATCH ACCA ==========
    h+=buildMatchAcca(fx48,predMap,oddsMap,ts);

    // ========== 2. CORNERS ACCA ==========
    h+=buildCornersAcca(fxWeekend,weekend,ts);

    // ========== 3. BOOKINGS ACCA ==========
    h+=buildBookingsAcca(fxWeekend,players,predMap,weekend,ts);

    // ========== 4. BEST VALUE ACCA (ALL LEAGUES) ==========
    h+=await buildBestValueAcca(predMap,oddsMap,ts);

    if(renderNow) document.getElementById('page-accas').innerHTML=h;
    saveAccaCache({html:h,ts});
  }catch(e){
    const el=document.getElementById('page-accas');
    if(el) el.innerHTML+=errPanel(e.message);
  }
}

function buildMatchAcca(fixtures,predMap,oddsMap,ts){
  // Score each fixture
  let scored=[];
  fixtures.forEach(f=>{
    const pred=predMap[f.fixture.id];
    if(!pred) return;
    const ph=parseInt(pred.predictions?.percent?.home)||0;
    const pa=parseInt(pred.predictions?.percent?.away)||0;
    const best=ph>=pa?{tip:'Home Win',team:f.teams.home,conf:ph,side:'home'}:{tip:'Away Win',team:f.teams.away,conf:pa,side:'away'};
    if(best.conf<55) return;
    // Get odds
    let odd='—';
    const od=oddsMap[f.fixture.id];
    if(od){const mw=od.bookmakers?.[0]?.bets?.find(b=>b.id===1);if(mw){const v=best.side==='home'?mw.values.find(v=>v.value==='Home'):mw.values.find(v=>v.value==='Away');if(v)odd=v.odd}}
    scored.push({f,tip:best.tip,team:best.team,opp:best.side==='home'?f.teams.away:f.teams.home,conf:best.conf,odd,lowThreshold:best.conf<60});
  });
  scored.sort((a,b)=>b.conf-a.conf);
  const picks=scored.slice(0,4);

  let h=`<div class="acca-card"><div class="acca-hdr"><span class="acca-type match">Match</span><span class="acca-scope">Daily</span><span class="acca-title">Match Acca</span><button class="acca-refresh" onclick="event.stopPropagation();refreshAcca()" aria-label="Refresh accas">🔄</button></div>`;
  h+=`<div class="acca-meta"><span>Updated ${timeAgo(ts)}</span>${picks.some(p=>p.lowThreshold)?'<span style="color:var(--orange)"> · Threshold lowered to 55%</span>':''}</div>`;

  if(!picks.length){
    h+=`<div class="acca-notice">No qualifying fixtures found. This acca will update when fixtures are available.</div></div>`;return h;
  }

  picks.forEach((p,i)=>{
    h+=`<div class="acca-sel"><span class="acca-num">${i+1}</span><img class="acca-crest" src="${p.team.logo||''}" alt="${p.team.name}" onerror="this.style.display='none'"><div class="acca-info"><div class="acca-match">${p.team.name} vs ${p.opp.name}</div><div class="acca-detail">${stime(p.f.fixture.date)} ${sdate(p.f.fixture.date)}</div></div><div class="acca-tip"><div class="acca-tipval" style="color:var(--blue)">${p.tip}</div><div class="acca-conf">${p.conf}% · ${p.odd}</div></div></div>`;
  });

  if(picks.length<4) h+=`<div class="acca-notice">Only ${picks.length} tip${picks.length===1?'':'s'} met our confidence threshold. We never pad accas to make up numbers.</div>`;

  // Footer
  const combo=picks.reduce((acc,p)=>{const o=parseFloat(p.odd);return o>1?acc*o:acc},1);
  const avgConf=Math.round(picks.reduce((s,p)=>s+p.conf,0)/picks.length);
  h+=accaFooter('match',picks,combo,avgConf,ts);
  h+=`</div>`;
  return h;
}

function buildCornersAcca(fixtures,isWknd,ts){
  let h=`<div class="acca-card${!isWknd?' disabled':''}"><div class="acca-hdr"><span class="acca-type corners">Corners</span><span class="acca-scope">Weekend</span><span class="acca-title">Corners Acca</span>${!isWknd?'<span style="background:rgba(245,158,11,0.1);color:var(--orange);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px">Weekend only</span>':''}<button class="acca-refresh" onclick="event.stopPropagation();refreshAcca()" aria-label="Refresh">🔄</button></div>`;
  h+=`<div class="acca-meta"><span>Updated ${timeAgo(ts)}</span></div>`;

  if(!isWknd){
    h+=`<div class="acca-notice">Available Saturday and Sunday. Check back on the weekend.</div></div>`;return h;
  }

  // Predict corners for each fixture, show odds for Over 9.5, 10.5, 11.5
  const TARGET_LINES=[{l:'9.5',v:9.5},{l:'10.5',v:10.5},{l:'11.5',v:11.5}];
  let scored=[];
  fixtures.forEach(f=>{
    let refCorners=10;
    if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs&&rs.cornpm)refCorners=rs.cornpm}
    const total=refCorners*1.0;

    // Calculate confidence for each target line
    const lineData=TARGET_LINES.map(line=>{
      const margin=total-line.v;
      const isOver=margin>0;
      const conf=isOver?Math.min(95,Math.round(50+margin*12)):Math.max(5,Math.round(50+margin*12));
      return{l:line.l,v:line.v,conf,over:isOver,margin};
    });

    // Pick best value line: highest confidence on any Over line
    let bestLine=null,bestConf=0;
    lineData.forEach(ld=>{
      if(ld.over&&ld.conf>bestConf){bestConf=ld.conf;bestLine=ld}
    });
    if(bestLine&&bestLine.conf>=55) scored.push({f,bestLine,lineData,total,refCorners});
  });
  scored.sort((a,b)=>b.bestLine.conf-a.bestLine.conf);
  const picks=scored.slice(0,4);

  if(!picks.length){
    h+=`<div class="acca-notice">No qualifying fixtures found. Corner data builds as the ref tracker analyses more matches.</div></div>`;return h;
  }

  picks.forEach((p,i)=>{
    // Show all 3 lines with colour-coded confidence
    const lineChips=p.lineData.map(ld=>{
      const col=ld.over&&ld.conf>=65?'var(--green)':ld.over&&ld.conf>=50?'var(--yellow)':'var(--text3)';
      const bg=ld.over&&ld.conf>=65?'rgba(51,217,106,.1)':ld.over&&ld.conf>=50?'rgba(255,215,0,.08)':'rgba(85,85,85,.08)';
      return `<span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;color:${col};background:${bg};margin-right:3px">O${ld.l} ${ld.conf}%</span>`;
    }).join('');

    h+=`<div class="acca-sel"><span class="acca-num">${i+1}</span><img class="acca-crest" src="${p.f.teams.home.logo||''}" alt="" onerror="this.style.display='none'"><div class="acca-info"><div class="acca-match">${p.f.teams.home.name} vs ${p.f.teams.away.name}</div><div class="acca-detail">${stime(p.f.fixture.date)} ${sdate(p.f.fixture.date)} · Pred ${p.total.toFixed(1)} corners · Ref avg ${p.refCorners.toFixed(1)}</div><div style="margin-top:3px">${lineChips}</div></div><div class="acca-tip"><div class="acca-tipval" style="color:var(--green)">Over ${p.bestLine.l}</div><div class="acca-conf">${p.bestLine.conf}%</div></div></div>`;
  });

  if(picks.length<4) h+=`<div class="acca-notice">Only ${picks.length} tip${picks.length===1?'':'s'} met our confidence threshold.</div>`;
  const avgConf=Math.round(picks.reduce((s,p)=>s+p.bestLine.conf,0)/picks.length);
  h+=accaFooter('corners',picks,0,avgConf,ts);
  h+=`</div>`;
  return h;
}

function buildBookingsAcca(fixtures,players,predMap,isWknd,ts){
  let h=`<div class="acca-card${!isWknd?' disabled':''}"><div class="acca-hdr"><span class="acca-type bookings">Bookings</span><span class="acca-scope">Weekend</span><span class="acca-title">Bookings Acca</span>${!isWknd?'<span style="background:rgba(245,158,11,0.1);color:var(--orange);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px">Weekend only</span>':''}<button class="acca-refresh" onclick="event.stopPropagation();refreshAcca()" aria-label="Refresh">🔄</button></div>`;
  h+=`<div class="acca-meta"><span>Updated ${timeAgo(ts)}</span></div>`;

  if(!isWknd){
    h+=`<div class="acca-notice">Available Saturday and Sunday. Check back on the weekend.</div></div>`;return h;
  }

  // Score players for weekend fixtures
  let scored=[];
  const usedFixtures=new Set();
  fixtures.forEach(f=>{
    let refStrict=50;
    if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs)refStrict=rs.strict||50}
    let compFactor=0.5;
    const pred=predMap[f.fixture.id];
    if(pred){const ph=parseInt(pred.predictions?.percent?.home)||50;compFactor=1-Math.abs(ph-50)/50}

    const matchPlayers=players.filter(p=>(p.tid===f.teams.home.id||p.tid===f.teams.away.id)&&!p.injured&&p.pos!=='Goalkeeper');
    matchPlayers.forEach(p=>{
      const prob=Math.min(95,Math.round(p.p90*40+p.fp90*15+(refStrict/100)*25+compFactor*10));
      if(prob>=50){
        const opp=p.tid===f.teams.home.id?f.teams.away:f.teams.home;
        scored.push({p,f,prob,refStrict,opp,reason:`${p.p90.toFixed(2)} cards/90 · Ref strictness ${refStrict} · ${compFactor>0.6?'High-foul match':'Standard match'}`});
      }
    });
  });
  scored.sort((a,b)=>b.prob-a.prob);
  // One player per fixture, no duplicate players
  const picks=[];
  const usedPlayerIds=new Set();
  scored.forEach(s=>{
    if(picks.length>=4) return;
    if(usedFixtures.has(s.f.fixture.id)) return;
    if(usedPlayerIds.has(s.p.id)) return;
    picks.push(s);
    usedFixtures.add(s.f.fixture.id);
    usedPlayerIds.add(s.p.id);
  });

  if(!picks.length){
    h+=`<div class="acca-notice">No qualifying players found. Build your ref tracker data for better predictions.</div></div>`;return h;
  }

  picks.forEach((s,i)=>{
    h+=`<div class="acca-sel"><span class="acca-num">${i+1}</span><img src="${s.p.photo||''}" alt="${s.p.name}" style="width:24px;height:24px;border-radius:50%;background:var(--card2);flex-shrink:0" onerror="this.src=''"><div class="acca-info"><div class="acca-match">${s.p.name} ${ci('y',8)} <img src="${s.p.tlogo||''}" style="width:12px;height:12px;vertical-align:middle" onerror="this.style.display='none'"></div><div class="acca-detail">vs ${s.opp.name} · ${stime(s.f.fixture.date)} · ${s.reason}</div></div><div class="acca-tip"><div class="acca-tipval" style="color:var(--yellow)">${s.prob}%</div><div class="acca-conf">Ref: ${s.refStrict}</div></div></div>`;
  });

  if(picks.length<4) h+=`<div class="acca-notice">Only ${picks.length} player${picks.length===1?'':'s'} met our 50% booking threshold.</div>`;
  const avgConf=Math.round(picks.reduce((s,p)=>s+p.prob,0)/picks.length);
  h+=accaFooter('bookings',picks,0,avgConf,ts);
  h+=`</div>`;
  return h;
}

async function buildBestValueAcca(existingPredMap,existingOddsMap,ts){
  let h=`<div class="acca-card" id="acca-value-card"><div class="acca-hdr"><span class="acca-type value">Value</span><span class="acca-scope">All Leagues</span><span class="acca-title">Best Value Tips</span><button class="acca-refresh" onclick="event.stopPropagation();refreshAcca()" aria-label="Refresh">🔄</button></div>`;
  h+=`<div class="acca-meta"><span>Updated ${timeAgo(ts)}</span></div>`;
  h+=`<div style="font-size:10px;color:var(--text3);padding:0 0 6px">Scans all ${LEAGUES.length} leagues for odds that undervalue our model's predictions</div>`;

  // Scan top leagues for value
  const valuePicks=[];
  const scanLeagues=LEAGUES.filter(l=>![1,4,15].includes(l.id)).slice(0,12); // Skip tournaments, limit API calls

  for(const lg of scanLeagues){
    try{
      const fx=await api('/fixtures',{league:lg.id,season:S.season,next:6},600);
      for(const f of fx.slice(0,4)){
        // Get prediction
        let pred=existingPredMap[f.fixture.id];
        if(!pred){
          try{
            const pr=await api('/predictions',{fixture:f.fixture.id},86400);
            if(pr.length) pred=pr[0];
          }catch(e){}
        }
        if(!pred) continue;

        // Get odds
        let od=existingOddsMap[f.fixture.id];
        if(!od){
          try{
            const ods=await api('/odds',{fixture:f.fixture.id,bookmaker:8},86400);
            if(ods.length) od=ods[0];
          }catch(e){}
        }
        if(!od) continue;

        const ph=parseInt(pred.predictions?.percent?.home)||0;
        const pa=parseInt(pred.predictions?.percent?.away)||0;
        const bestSide=ph>=pa?'home':'away';
        const bestConf=Math.max(ph,pa);
        if(bestConf<55) continue;

        // Get odds for the predicted winner
        const mw=od.bookmakers?.[0]?.bets?.find(b=>b.id===1);
        if(!mw) continue;
        const oddsVal=bestSide==='home'?mw.values.find(v=>v.value==='Home'):mw.values.find(v=>v.value==='Away');
        if(!oddsVal) continue;
        const decOdd=parseFloat(oddsVal.odd);
        if(!decOdd||decOdd<=1) continue;

        // Value calculation: model prob vs implied prob from odds
        const modelProb=bestConf/100;
        const impliedProb=1/decOdd;
        const edge=modelProb-impliedProb;
        const valueRating=edge>0.15?'Strong Value':edge>0.08?'Good Value':edge>0?'Fair Value':'No Value';
        const valueCol=edge>0.15?'var(--green)':edge>0.08?'#a78bfa':edge>0?'var(--yellow)':'var(--text3)';

        if(edge>0.05){ // Only include positive expected value with at least 5% edge
          valuePicks.push({
            f,lg,
            team:bestSide==='home'?f.teams.home:f.teams.away,
            opp:bestSide==='home'?f.teams.away:f.teams.home,
            tip:bestSide==='home'?'Home Win':'Away Win',
            conf:bestConf,odd:decOdd,
            edge:Math.round(edge*100),
            modelProb:Math.round(modelProb*100),
            impliedProb:Math.round(impliedProb*100),
            valueRating,valueCol
          });
        }
      }
    }catch(e){}
  }

  valuePicks.sort((a,b)=>b.edge-a.edge);
  const picks=valuePicks.slice(0,6);

  if(!picks.length){
    h+=`<div class="acca-notice">No value tips found across leagues. Check back when more fixtures and odds are available.</div></div>`;return h;
  }

  picks.forEach((p,i)=>{
    h+=`<div class="acca-sel"><span class="acca-num">${i+1}</span><img class="acca-crest" src="${p.team.logo||''}" alt="${p.team.name}" onerror="this.style.display='none'"><div class="acca-info"><div class="acca-match">${p.team.name} vs ${p.opp.name} <img src="${llogo(p.lg.id)}" style="width:12px;height:12px;vertical-align:middle" onerror="this.style.display='none'"></div><div class="acca-detail">${stime(p.f.fixture.date)} ${sdate(p.f.fixture.date)} · ${p.lg.name} (${p.lg.cc})</div><div style="margin-top:2px"><span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:${p.valueCol};background:${p.valueCol}15">${p.valueRating}</span> <span style="font-size:10px;color:var(--text3)">Model ${p.modelProb}% vs Odds ${p.impliedProb}% → +${p.edge}% edge</span></div></div><div class="acca-tip"><div class="acca-tipval" style="color:${p.valueCol}">${p.tip}</div><div class="acca-conf">${p.conf}% · ${p.odd.toFixed(2)}</div></div></div>`;
  });

  // Build 4-fold from top 4 value picks
  const accaPicks=picks.slice(0,4);
  if(accaPicks.length>=2){
    const combo=accaPicks.reduce((acc,p)=>acc*p.odd,1);
    const avgConf=Math.round(accaPicks.reduce((s,p)=>s+p.conf,0)/accaPicks.length);
    const avgEdge=Math.round(accaPicks.reduce((s,p)=>s+p.edge,0)/accaPicks.length);

    h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--divider)"><div style="display:flex;justify-content:space-around;text-align:center"><div><div style="font-size:10px;color:var(--text2)">4-fold Odds</div><div style="font-size:18px;font-weight:800;color:var(--green)">${combo.toFixed(2)}</div><div style="font-size:10px;color:var(--text3)">${toFrac(combo)}</div></div><div><div style="font-size:10px;color:var(--text2)">Avg Confidence</div><div style="font-size:18px;font-weight:800;color:var(--yellow)">${avgConf}%</div></div><div><div style="font-size:10px;color:var(--text2)">Avg Edge</div><div style="font-size:18px;font-weight:800;color:#a78bfa">+${avgEdge}%</div></div></div></div>`;
  }

  // Copy text
  let copyLines=['BEST VALUE ACCA · Booking Analytics Pro','Scanned '+scanLeagues.length+' leagues'];
  picks.forEach((p,i)=>{
    copyLines.push(`${i+1}. ${p.team.name} to win vs ${p.opp.name} (${p.conf}%) · ${p.odd.toFixed(2)} · ${p.lg.name} · +${p.edge}% edge`);
  });
  if(accaPicks.length>=2){
    const combo=accaPicks.reduce((acc,p)=>acc*p.odd,1);
    copyLines.push(`4-fold combined: ${combo.toFixed(2)} (${toFrac(combo)})`);
  }
  copyLines.push(`Generated: ${new Date(ts).toLocaleString('en-GB')}`);
  const copyText=copyLines.join('\\n');

  h+=`<div class="acca-footer"><div class="acca-actions"><button class="acca-copy" onclick="event.stopPropagation();copyPrediction(\`${copyText}\`)">📋 Copy Tips</button><button class="acca-share" onclick="event.stopPropagation();shareAccaImage('value')">📸 Share Image</button></div></div>`;

  if(picks.length<4) h+=`<div class="acca-notice">Only ${picks.length} tip${picks.length===1?'':'s'} showed meaningful value across all leagues today.</div>`;
  h+=`</div>`;
  return h;
}

function accaFooter(type,picks,combo,avgConf,ts){
  const confCol=avgConf>=65?'var(--green)':avgConf>=50?'var(--yellow)':'var(--orange)';
  let h=`<div class="acca-footer">`;
  if(combo>1){
    h+=`<div class="acca-odds"><div><span class="lbl">Combined Odds</span></div><div><span class="val" style="color:var(--green)">${combo.toFixed(2)}</span> <span style="font-size:10px;color:var(--text3)">(${toFrac(combo)})</span></div></div>`;
  }
  h+=`<div class="acca-odds"><div><span class="lbl">Avg Confidence</span></div><div><span class="val" style="color:${confCol}">${avgConf}%</span></div></div>`;
  // Generate copy text
  const typeLabel=type==='match'?'MATCH ACCA':type==='corners'?'CORNERS ACCA':'BOOKINGS ACCA';
  let copyLines=[`${typeLabel} · Booking Analytics Pro`];
  picks.forEach((p,i)=>{
    if(type==='match') copyLines.push(`${i+1}. ${p.team.name} to win vs ${p.opp.name} (${p.conf}%) · ${p.odd}`);
    else if(type==='corners') copyLines.push(`${i+1}. ${p.f.teams.home.name} vs ${p.f.teams.away.name} — Over ${p.bestLine.l} corners (${p.bestLine.conf}%) · Pred ${p.total.toFixed(1)} · O9.5 ${p.lineData[0].conf}% / O10.5 ${p.lineData[1].conf}% / O11.5 ${p.lineData[2].conf}%`);
    else copyLines.push(`${i+1}. ${p.p.name} to be booked vs ${p.opp.name} (${p.prob}%)`);
  });
  if(combo>1) copyLines.push(`Combined odds: ${combo.toFixed(2)} (${toFrac(combo)})`);
  copyLines.push(`Avg confidence: ${avgConf}%`);
  copyLines.push(`Generated: ${new Date(ts).toLocaleString('en-GB')}`);
  const copyText=copyLines.join('\\n');

  h+=`<div class="acca-actions"><button class="acca-copy" onclick="event.stopPropagation();copyPrediction(\`${copyText}\`)">📋 Copy Acca</button><button class="acca-share" onclick="event.stopPropagation();shareAccaImage('${type}')">📸 Share Image</button></div>`;
  h+=`</div>`;
  return h;
}

// ---- Share Acca as Image ----
async function shareAccaImage(type){
  // Build an offscreen HTML card, render to canvas, download as PNG
  const target=document.getElementById('acca-render-target');
  const card=type==='value'?document.getElementById('acca-value-card'):document.querySelector(`.acca-card .acca-type.${type}`)?.closest('.acca-card');
  if(!card){copyPrediction('Could not generate image');return}

  // Clone the card content into the render target
  target.innerHTML='';
  const clone=card.cloneNode(true);
  clone.style.cssText='background:linear-gradient(135deg,#0d0d14,#1a1030,#0f1a20);color:#fff;padding:20px;border-radius:16px;border:1px solid rgba(255,215,0,.15);font-family:-apple-system,system-ui,sans-serif;width:400px;';
  clone.classList.remove('disabled');
  // Remove refresh button from clone
  const refreshBtn=clone.querySelector('.acca-refresh');
  if(refreshBtn) refreshBtn.remove();
  // Remove action buttons
  const actions=clone.querySelector('.acca-actions');
  if(actions) actions.remove();
  // Add watermark
  const wm=document.createElement('div');
  wm.style.cssText='text-align:center;font-size:10px;color:rgba(255,255,255,.3);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)';
  wm.textContent='Generated by Booking Analytics Pro · '+new Date().toLocaleDateString('en-GB');
  clone.appendChild(wm);
  target.appendChild(clone);
  target.style.left='0';target.style.position='fixed';target.style.top='0';target.style.zIndex='9999';

  try{
    // Use html2canvas if available, otherwise fallback to copy
    if(typeof html2canvas!=='undefined'){
      const canvas=await html2canvas(target,{backgroundColor:null,scale:2});
      target.style.left='-9999px';target.style.zIndex='-1';
      canvas.toBlob(blob=>{
        if(navigator.share&&navigator.canShare){
          const file=new File([blob],`acca-${type}-${Date.now()}.png`,{type:'image/png'});
          navigator.share({files:[file],title:`${type.toUpperCase()} ACCA`,text:'Booking Analytics Pro'}).catch(()=>{});
        } else {
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download=`acca-${type}.png`;a.click();URL.revokeObjectURL(url);
        }
      },'image/png');
    } else {
      target.style.left='-9999px';target.style.zIndex='-1';
      // Fallback: screenshot instruction
      const copyText=`Screenshot the ${type} acca card to share! (html2canvas not loaded)`;
      copyPrediction(copyText);
    }
  }catch(e){
    target.style.left='-9999px';target.style.zIndex='-1';
    copyPrediction('Image generation failed — tip copied instead');
  }
}

function renderTipCards(tips,isDemo){
  const filtered=tipsBetTypeFilter==='All'?tips:tips.filter(t=>t.betType===tipsBetTypeFilter);
  if(!filtered.length) return `<div class="empty"><div class="ei">🔍</div><div class="et">No ${tipsBetTypeFilter} tips today</div><div class="es">Try a different filter or check back tomorrow.</div></div>`;

  let h='';
  const byComp={};
  filtered.forEach(t=>{if(!byComp[t.competition])byComp[t.competition]=[];byComp[t.competition].push(t)});

  for(const[comp,compTips] of Object.entries(byComp)){
    h+=`<div class="sec-title">${comp}</div>`;
    compTips.forEach(t=>{
      const confCol=t.confidence==='High'?'var(--role-win)':t.confidence==='Medium'?'var(--role-cta)':'var(--role-warn)';
      const statCol=t.status==='Won'?'var(--role-win)':t.status==='Lost'?'var(--red)':t.status==='Void'?'var(--role-warn)':'var(--text3)';
      const statBg=t.status==='Won'?'rgba(51,217,106,.1)':t.status==='Lost'?'rgba(229,51,51,.1)':t.status==='Void'?'rgba(245,158,11,.1)':'rgba(85,85,85,.1)';
      h+=`<div class="card" style="padding:12px">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:700">${t.match}</span><span class="rbadge" style="color:${statCol};background:${statBg}">${t.status}${t.settledScore?' · '+t.settledScore:''}</span></div>`;
      h+=`<div style="font-size:10px;color:var(--text3);margin-bottom:6px">${stime(t.kickoff)} ${sdate(t.kickoff)} · ${t.competition}</div>`;
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="rbadge" style="color:var(--role-info);background:rgba(102,153,255,.1)">${t.betType}</span>${betTip(t.betType)}<span style="font-size:13px;font-weight:600">${t.selection}</span><span class="rbadge" style="color:${confCol};background:${confCol}15">${t.confidence}</span></div>`;
      h+=`<div style="font-size:11px;color:var(--text2);line-height:1.4">${t.rationale}</div>`;
      if(t.isAcca&&t.accaLegs?.length){
        h+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--divider);font-size:10px;color:var(--text3)"><div style="font-weight:600;margin-bottom:3px">Acca Legs:</div>`;
        t.accaLegs.forEach(leg=>{h+=`<div>• ${leg}</div>`});
        h+=`</div>`;
      }
      // FIX 5: Copy Tip button (non-acca only)
      if(!t.isAcca){
        const demoTag=isDemo?' (DEMO)':'';
        const copyStr=`${t.match}\\n${t.betType}: ${t.selection}\\nConfidence: ${t.confidence}\\n${t.rationale}\\nKick-off: ${stime(t.kickoff)} ${sdate(t.kickoff)}\\nGenerated by Booking Analytics Pro${demoTag}\\n18+ Gamble responsibly. GambleAware.org`;
        h+=`<button class="acca-copy" style="margin-top:6px;padding:6px 12px" onclick="event.stopPropagation();copyPrediction(\`${copyStr.replace(/`/g,"'")}\`)">📋 Copy Tip</button>`;
      }
      h+=`</div>`;
    });
  }
  return h;
}

//  TIP GENERATION ENGINE
// ======================================================================
async function generateTips(){
  const statusEl=document.getElementById('gen-tips-status');
  const btn=document.getElementById('gen-tips-btn');
  const anKey=localStorage.getItem('anthropicKey');
  if(!anKey){if(statusEl)statusEl.innerHTML=`<div class="errbanner" style="margin:0">Add your Anthropic API key in Settings first.</div>`;return}
  if(!S.apiKey){if(statusEl)statusEl.innerHTML=`<div class="errbanner" style="margin:0">Add your API-Football key in Settings first.</div>`;return}
  if(btn)btn.disabled=true;
  if(statusEl)statusEl.innerHTML=`<div class="loading" style="padding:10px 0"><div class="spin"></div><div class="ltxt">Step 1/3: Fetching fixtures...</div></div>`;

  try{
    // STEP 1: Fetch fixtures for next 48h
    const today=new Date().toISOString().split('T')[0];
    const tomorrow=new Date(Date.now()+86400000).toISOString().split('T')[0];
    // Prioritise leagues
    const priority=[2,39,140,135,78,61,94,88,253,40,179];
    const sortedLeagues=[...LEAGUES].sort((a,b)=>{const ai=priority.indexOf(a.id),bi=priority.indexOf(b.id);return(ai===-1?99:ai)-(bi===-1?99:bi)});

    let allFixtures=[];
    for(const lg of sortedLeagues){
      if(getApiCallCount()>=90) break;
      try{
        const fx=await api('/fixtures',{league:lg.id,season:S.season,from:today,to:tomorrow},300);
        incrApiCallCount();
        fx.forEach(f=>{f._league=lg.name;f._leagueId=lg.id});
        allFixtures.push(...fx);
      }catch(e){}
    }
    // Filter to upcoming only
    allFixtures=allFixtures.filter(f=>['NS','TBD','1H','HT','2H'].includes(f.fixture.status.short)||new Date(f.fixture.date)>new Date());
    localStorage.setItem('rawFixtures',JSON.stringify({data:allFixtures,ts:Date.now()}));

    if(!allFixtures.length){
      if(statusEl)statusEl.innerHTML=`<div class="errbanner" style="margin:0">No upcoming fixtures found for any league.</div>`;
      if(btn)btn.disabled=false;return;
    }

    // STEP 2: Fetch stats per fixture (max 20)
    if(statusEl)statusEl.innerHTML=`<div class="loading" style="padding:10px 0"><div class="spin"></div><div class="ltxt">Step 2/3: Fetching stats for ${Math.min(allFixtures.length,20)} matches...</div></div>`;
    const fixtureData=[];
    for(const f of allFixtures.slice(0,20)){
      if(getApiCallCount()>=90) break;
      const entry={fixture:f,h2h:[],injuries:[]};
      try{
        const h2h=await api('/fixtures/headtohead',{h2h:`${f.teams.home.id}-${f.teams.away.id}`,last:5},86400);
        incrApiCallCount();
        entry.h2h=h2h.map(m=>({home:m.teams.home.name,away:m.teams.away.name,homeGoals:m.goals.home,awayGoals:m.goals.away,date:m.fixture.date}));
      }catch(e){}
      try{
        const inj=await api('/injuries',{fixture:f.fixture.id},3600);
        incrApiCallCount();
        entry.injuries=inj.map(i=>({player:i.player.name,team:i.team.name,type:i.player.type,reason:i.player.reason}));
      }catch(e){}
      fixtureData.push(entry);
    }

    // STEP 3: Send to Claude
    if(statusEl)statusEl.innerHTML=`<div class="loading" style="padding:10px 0"><div class="spin"></div><div class="ltxt">Step 3/3: Generating AI tips...</div></div>`;
    const fixturePayload=fixtureData.map(fd=>({
      match:`${fd.fixture.teams.home.name} vs ${fd.fixture.teams.away.name}`,
      competition:fd.fixture._league,
      kickoff:fd.fixture.fixture.date,
      referee:fd.fixture.fixture.referee,
      homeForm:fd.fixture.teams.home.winner?'Recent winner':'',
      awayForm:fd.fixture.teams.away.winner?'Recent winner':'',
      h2h:fd.h2h,
      injuries:fd.injuries
    }));

    const systemPrompt=`You are an expert football analyst and tipster. You analyse fixture data and statistics to generate high-quality betting tips for casual punters. You consider recent form, head to head records, goal averages, defensive records and player availability. You only generate tips where the data provides clear statistical justification. Every tip must include a confidence level of Low, Medium or High and a plain English rationale of no more than two sentences. You do not encourage irresponsible gambling. Always vary bet types across the tip set.`;

    const userPrompt=`Here is today's fixture and stats data: ${JSON.stringify(fixturePayload)}. Generate up to 10 tips for today across a mix of these bet types: 1X2, BTTS, Over/Under goals (1.5/2.5/3.5), first team to score, clean sheet, correct score, anytime goalscorer, Asian handicap, half time/full time, win to nil. Also generate one accumulator tip combining two to five of your highest confidence selections from different matches. Return your response as a valid JSON array only, no other text. Each tip object must have these fields exactly: match (string), competition (string), kickoff (ISO datetime string), betType (string), selection (string), confidence (string: Low or Medium or High), rationale (string max two sentences), status (string: always Pending for new tips), isAcca (boolean), accaLegs (array of match strings if isAcca is true else empty array).`;

    const claudeResp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':anKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:systemPrompt,messages:[{role:'user',content:userPrompt}]})
    });

    if(!claudeResp.ok){
      const errBody=await claudeResp.text();
      throw new Error(`Anthropic API error ${claudeResp.status}: ${errBody.substring(0,200)}`);
    }

    const claudeData=await claudeResp.json();
    incrAnthCallCount();

    // STEP 4: Parse and store
    let tipText=claudeData.content?.[0]?.text||'';
    // Extract JSON array from response
    const jsonMatch=tipText.match(/\[[\s\S]*\]/);
    if(!jsonMatch) throw new Error('Could not parse tips from AI response');

    let parsedTips=JSON.parse(jsonMatch[0]);
    const ts=Date.now();
    parsedTips=parsedTips.map((t,i)=>({...t,id:`${ts}_${i}`,generatedAt:ts,settledAt:null,settledScore:null}));

    localStorage.setItem('dailyTips',JSON.stringify(parsedTips));
    localStorage.setItem('tipsLastGenerated',String(ts));

    // Push to Supabase if connected
    if(sbReady()){
      try{
        const rows=parsedTips.map(t=>({
          tip_id:t.id,match:t.match,competition:t.competition,kickoff:t.kickoff,
          bet_type:t.betType,selection:t.selection,confidence:t.confidence,
          rationale:t.rationale,status:'Pending',is_acca:t.isAcca||false,
          acca_legs:t.accaLegs||[],generated_at:t.generatedAt
        }));
        await sbClient.from('daily_tips').upsert(rows,{onConflict:'tip_id'});
        console.log('[Supabase] Pushed',rows.length,'tips to cloud');
      }catch(e){console.warn('[Supabase] Push failed:',e.message)}
    }

    if(statusEl)statusEl.innerHTML=`<div style="font-size:12px;color:var(--green);padding:6px 0">Generated ${parsedTips.length} tips successfully!</div>`;
    if(btn)btn.disabled=false;

    // Refresh display
    setTimeout(()=>loadTips(),500);

  }catch(e){
    if(statusEl)statusEl.innerHTML=`<div class="errbanner" style="margin:0">❌ ${e.message}</div>`;
    if(btn)btn.disabled=false;
  }
}

//  TIP SETTLEMENT
// ======================================================================
async function settleTips(){
  const tips=getDailyTips();
  const now=Date.now();
  let changed=false;

  for(const tip of tips){
    if(tip.status!=='Pending') continue;
    const ko=new Date(tip.kickoff).getTime();
    if(now-ko<6000000) continue; // 100 minutes
    if(getApiCallCount()>=90) break;

    // Find fixture from raw fixtures
    const raw=JSON.parse(localStorage.getItem('rawFixtures')||'{}');
    const rawFx=raw.data||[];
    const matchParts=tip.match.split(' vs ');
    if(matchParts.length!==2) continue;
    const homeName=matchParts[0].trim(),awayName=matchParts[1].trim();

    let fixture=rawFx.find(f=>f.teams.home.name===homeName&&f.teams.away.name===awayName);
    if(!fixture) continue;

    try{
      // Fetch final result
      const fx=await api('/fixtures',{id:fixture.fixture.id},60);
      incrApiCallCount();
      if(!fx.length) continue;
      const f=fx[0];
      const st=f.fixture.status.short;
      if(!['FT','AET','PEN'].includes(st)) continue;

      const hg=f.goals.home??0,ag=f.goals.away??0;
      const totalGoals=hg+ag;
      const score=`${hg}-${ag}`;
      let result='Void';

      const sel=tip.selection.toLowerCase();
      const bt=tip.betType.toLowerCase();

      if(bt==='1x2'||bt==='match result'){
        if(sel.includes('home')||sel.includes(homeName.toLowerCase())){result=hg>ag?'Won':'Lost'}
        else if(sel.includes('away')||sel.includes(awayName.toLowerCase())){result=ag>hg?'Won':'Lost'}
        else if(sel.includes('draw')){result=hg===ag?'Won':'Lost'}
      } else if(bt==='btts'||bt.includes('both teams')){
        const btts=hg>0&&ag>0;
        result=(sel.includes('yes')&&btts)||(sel.includes('no')&&!btts)?'Won':'Lost';
      } else if(bt.includes('over')||bt.includes('under')){
        const lineMatch=tip.selection.match(/([\d.]+)/);
        if(lineMatch){
          const line=parseFloat(lineMatch[1]);
          if(sel.includes('over')) result=totalGoals>line?'Won':'Lost';
          else result=totalGoals<line?'Won':'Lost';
        }
      } else if(bt.includes('clean sheet')){
        const team=sel.includes(homeName.toLowerCase())?'home':'away';
        const clean=team==='home'?ag===0:hg===0;
        if(sel.includes('yes')||!sel.includes('no')) result=clean?'Won':'Lost';
        else result=!clean?'Won':'Lost';
      } else if(bt.includes('win to nil')){
        const team=sel.includes(homeName.toLowerCase())?'home':'away';
        result=(team==='home'&&hg>ag&&ag===0)||(team==='away'&&ag>hg&&hg===0)?'Won':'Lost';
      } else if(bt.includes('correct score')){
        const csMatch=sel.match(/(\d+)\s*[-–]\s*(\d+)/);
        if(csMatch) result=(parseInt(csMatch[1])===hg&&parseInt(csMatch[2])===ag)?'Won':'Lost';
      } else if(bt.includes('half time')&&bt.includes('full time')){
        try{
          const evs=await api('/fixtures/events',{fixture:fixture.fixture.id,type:'Goal'},300);
          incrApiCallCount();
          if(!evs.length){result='Void'}else{
            // Count HT goals (elapsed <= 45 incl. stoppage)
            let htHome=0,htAway=0;
            evs.forEach(e=>{
              const min=e.time.elapsed||0;
              if(min<=45){
                if(e.team.id===f.teams.home.id)htHome++;else htAway++;
              }
            });
            const htRes=htHome>htAway?'H':htHome<htAway?'A':'D';
            const ftRes=hg>ag?'H':hg<ag?'A':'D';
            const actual=htRes+'/'+ftRes;
            // Parse selection — expect format like "Home/Home", "Draw/Away", "H/H", "D/A" etc
            const selNorm=sel.replace(/home/gi,'H').replace(/away/gi,'A').replace(/draw/gi,'D').replace(/\s/g,'').toUpperCase();
            const parts=selNorm.split('/');
            if(parts.length===2){
              const expected=parts[0].charAt(0)+'/'+parts[1].charAt(0);
              result=actual===expected?'Won':'Lost';
            } else result='Void';
          }
        }catch(e){result='Void'}
      } else if(bt.includes('first team to score')){
        try{
          const evs=await api('/fixtures/events',{fixture:fixture.fixture.id,type:'Goal'},300);
          incrApiCallCount();
          if(evs.length){
            const first=evs.sort((a,b)=>(a.time.elapsed||0)-(b.time.elapsed||0))[0];
            result=sel.toLowerCase().includes(first.team.name.toLowerCase())?'Won':'Lost';
          } else result='Void';
        }catch(e){result='Void'}
      } else if(bt.includes('goalscorer')){
        try{
          const evs=await api('/fixtures/events',{fixture:fixture.fixture.id,type:'Goal'},300);
          incrApiCallCount();
          const scorerNames=evs.map(e=>(e.player.name||'').toLowerCase());
          // Extract player name from selection
          const playerName=sel.replace(/anytime|to score|goalscorer/gi,'').trim().toLowerCase();
          result=scorerNames.some(n=>n.includes(playerName)||playerName.includes(n))?'Won':'Lost';
        }catch(e){result='Void'}
      } else if(bt.includes('handicap')){
        const hcMatch=sel.match(/([-+][\d.]+)/);
        if(hcMatch){
          const hc=parseFloat(hcMatch[1]);
          const isHome=sel.toLowerCase().includes(homeName.toLowerCase());
          const adjHome=hg+(isHome?hc:0),adjAway=ag+(isHome?0:hc);
          result=isHome?(adjHome>adjAway?'Won':adjHome===adjAway?'Void':'Lost'):(adjAway>adjHome?'Won':adjAway===adjHome?'Void':'Lost');
        }
      }

      // Handle accumulator
      if(tip.isAcca){
        // Accas settled when all legs are checked — simplified: mark based on individual tips
        const legs=tip.accaLegs||[];
        const legResults=legs.map(leg=>{
          const legTip=tips.find(t=>!t.isAcca&&t.match===leg);
          return legTip?legTip.status:'Pending';
        });
        if(legResults.includes('Pending')) continue; // Not all legs settled yet
        if(legResults.includes('Lost')) result='Lost';
        else if(legResults.every(r=>r==='Won')) result='Won';
        else if(legResults.some(r=>r==='Void')&&!legResults.includes('Lost')) result='Void';
        else result='Lost';
      }

      tip.status=result;
      tip.settledAt=now;
      tip.settledScore=score;
      changed=true;
    }catch(e){}
  }

  if(changed){
    localStorage.setItem('dailyTips',JSON.stringify(tips));
    recalcTipStats(tips);
    // Sync settled results to Supabase
    if(sbReady()){
      try{
        for(const t of tips.filter(t=>t.status!=='Pending'&&t.settledAt)){
          await sbClient.from('daily_tips').update({
            status:t.status,settled_at:t.settledAt,settled_score:t.settledScore
          }).eq('tip_id',t.id);
        }
        console.log('[Supabase] Pushed settlement results to cloud');
      }catch(e){console.warn('[Supabase] Settlement push failed:',e.message)}
    }
    if(S.tab==='tips') loadTips();
  }
}

function recalcTipStats(tips){
  const settled=tips.filter(t=>t.status!=='Pending');
  const won=settled.filter(t=>t.status==='Won');
  const lost=settled.filter(t=>t.status==='Lost');
  const voided=settled.filter(t=>t.status==='Void');
  const nonVoid=settled.filter(t=>t.status!=='Void');
  const winRate=nonVoid.length>0?Math.round(won.length/nonVoid.length*100):0;

  // This week
  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);
  const wonThisWeek=won.filter(t=>t.settledAt&&t.settledAt>=weekStart.getTime()).length;

  // Streak
  let streak=0,streakDir='';
  const sorted=[...settled].sort((a,b)=>(b.settledAt||0)-(a.settledAt||0));
  if(sorted.length){
    streakDir=sorted[0].status==='Won'?'W':'L';
    for(const t of sorted){
      if((streakDir==='W'&&t.status==='Won')||(streakDir==='L'&&t.status==='Lost')) streak++;
      else break;
    }
  }

  // By bet type
  const byBetType={};
  settled.forEach(t=>{
    if(!byBetType[t.betType]) byBetType[t.betType]={won:0,total:0};
    if(t.status!=='Void') byBetType[t.betType].total++;
    if(t.status==='Won') byBetType[t.betType].won++;
  });
  const winRateByBetType={};
  for(const[k,v] of Object.entries(byBetType)){winRateByBetType[k]=v.total>0?Math.round(v.won/v.total*100):0}

  // By competition
  const byComp={};
  settled.forEach(t=>{
    if(!byComp[t.competition]) byComp[t.competition]={won:0,total:0};
    if(t.status!=='Void') byComp[t.competition].total++;
    if(t.status==='Won') byComp[t.competition].won++;
  });
  const winRateByComp={};
  for(const[k,v] of Object.entries(byComp)){winRateByComp[k]=v.total>0?Math.round(v.won/v.total*100):0}

  // Acca stats
  const accas=settled.filter(t=>t.isAcca);
  const accaWon=accas.filter(t=>t.status==='Won').length;
  const accaNonVoid=accas.filter(t=>t.status!=='Void').length;
  const accaWinRate=accaNonVoid>0?Math.round(accaWon/accaNonVoid*100):0;

  // Longest streaks
  let longestWin=0,longestLoss=0,cw=0,cl=0;
  sorted.reverse().forEach(t=>{
    if(t.status==='Won'){cw++;cl=0;if(cw>longestWin)longestWin=cw}
    else if(t.status==='Lost'){cl++;cw=0;if(cl>longestLoss)longestLoss=cl}
  });

  const stats={total:settled.length,won:won.length,lost:lost.length,void:voided.length,winRate,wonThisWeek,streak:`${streak}${streakDir}`,streakDir,winRateByBetType,winRateByComp,accaWinRate,longestWin,longestLoss};
  localStorage.setItem('tipStats',JSON.stringify(stats));
}

function loadIntelligence(){
  const el=document.getElementById('page-intelligence');
  const stats=getTipStats();
  const tips=getDailyTips();
  const settled=tips.filter(t=>t.status!=='Pending');

  let h=`<div class="pg-title">🧠 Tip Intelligence</div>`;

  if(!stats||settled.length<5){
    h+=`<div class="empty"><div class="ei">📊</div><div class="et">Not enough data yet</div><div class="es">Tips need to be generated and settled before analysis appears here. You have ${settled.length} settled tip${settled.length===1?'':'s'} — need at least 5.</div></div>`;
    el.innerHTML=h;return;
  }

  // SECTION 1: Performance Overview
  h+=`<div class="sec-title">Performance Overview</div>`;
  const bestBT=Object.entries(stats.winRateByBetType||{}).sort((a,b)=>b[1]-a[1])[0];
  const bestComp=Object.entries(stats.winRateByComp||{}).sort((a,b)=>b[1]-a[1])[0];
  h+=`<div class="stat-grid"><div class="stat-card"><div class="lb">Win Rate</div><div class="vl" style="color:var(--green)">${stats.winRate}%</div><div class="sub">${stats.won}W ${stats.lost}L ${stats.void}V</div></div><div class="stat-card"><div class="lb">Best Bet Type</div><div class="vl" style="color:var(--yellow);font-size:16px">${bestBT?bestBT[0]:'—'}</div><div class="sub">${bestBT?bestBT[1]+'% win rate':'—'}</div></div><div class="stat-card"><div class="lb">Best Competition</div><div class="vl" style="color:var(--blue);font-size:14px">${bestComp?bestComp[0]:'—'}</div><div class="sub">${bestComp?bestComp[1]+'% win rate':'—'}</div></div><div class="stat-card"><div class="lb">Current Streak</div><div class="vl" style="color:${stats.streakDir==='W'?'var(--green)':'var(--red)'}">${stats.streak}</div><div class="sub">Longest W: ${stats.longestWin} · L: ${stats.longestLoss}</div></div></div>`;

  // SECTION 2: Charts
  h+=`<div class="sec-title">Win Rate by Bet Type</div><div class="card"><canvas id="chart-bettype" style="height:180px" role="img" aria-label="Win rate by bet type chart"></canvas></div>`;
  h+=`<div class="sec-title">Win Rate by Competition</div><div class="card"><canvas id="chart-comp" style="height:180px" role="img" aria-label="Win rate by competition chart"></canvas></div>`;

  // Collect weekly data
  const weeklyData={};
  tips.forEach(t=>{
    if(!t.generatedAt) return;
    const d=new Date(t.generatedAt);
    const wk=`${d.getFullYear()}-W${Math.ceil(((d-new Date(d.getFullYear(),0,1))/86400000+1)/7)}`;
    if(!weeklyData[wk]) weeklyData[wk]=0;
    weeklyData[wk]++;
  });
  h+=`<div class="sec-title">Tips per Week</div><div class="card"><canvas id="chart-weekly" style="height:180px" role="img" aria-label="Tips per week chart"></canvas></div>`;

  h+=`<div class="sec-title">Acca Performance</div><div class="card"><div style="display:flex;justify-content:space-around;text-align:center;padding:8px 0"><div><div style="font-size:10px;color:var(--text3)">Acca Win Rate</div><div style="font-size:24px;font-weight:800;color:var(--purple)">${stats.accaWinRate}%</div></div></div></div>`;

  // SECTION 3: AI Recommendations
  h+=`<div class="sec-title">🤖 AI Recommendations</div>`;
  const lastAnalysis=localStorage.getItem('lastAIAnalysis');
  const lastAnalysisTs=localStorage.getItem('lastAIAnalysisTs');
  if(settled.length<10){
    h+=`<div class="card"><button class="btn-p" disabled style="width:100%;opacity:.5">Generate Analysis</button><div style="font-size:11px;color:var(--text3);margin-top:6px">Settle at least 10 tips to unlock AI analysis. You have ${settled.length}.</div></div>`;
  } else {
    h+=`<div class="card"><button class="btn-p" style="width:100%" id="gen-analysis-btn" onclick="generateAnalysis()">🧠 ${lastAnalysis?'Refresh':'Generate'} Analysis</button><div id="analysis-status"></div>`;
    if(lastAnalysis){
      h+=`<div style="margin-top:10px;font-size:10px;color:var(--text3)">Generated: ${lastAnalysisTs?new Date(+lastAnalysisTs).toLocaleString('en-GB'):''}</div>`;
      h+=`<div style="margin-top:8px;font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap">${lastAnalysis}</div>`;
    }
    h+=`</div>`;
  }

  // SECTION 4: Patterns and Alerts
  h+=`<div class="sec-title">⚡ Patterns & Alerts</div>`;
  const btEntries=Object.entries(stats.winRateByBetType||{});
  const compEntries=Object.entries(stats.winRateByComp||{});

  btEntries.forEach(([bt,wr])=>{
    const btCount=(tips.filter(t=>t.betType===bt&&t.status!=='Pending').length);
    if(btCount<5){
      h+=`<div class="sus-alert" style="background:rgba(85,85,85,.06);border-color:rgba(85,85,85,.12)"><span>ℹ️</span><span style="flex:1;font-size:11px">${bt}: Only ${btCount} tips settled — insufficient data for analysis</span></div>`;
    } else if(wr>60){
      h+=`<div class="sus-alert" style="background:rgba(51,217,106,.06);border-color:rgba(51,217,106,.12)"><span>🟢</span><span style="flex:1;font-size:11px"><strong>${bt}</strong> is performing well at ${wr}% win rate</span></div>`;
    } else if(wr<30){
      h+=`<div class="live-alert warn"><span>⚠️</span><span style="flex:1;font-size:11px"><strong>${bt}</strong> is underperforming at ${wr}% win rate — consider reducing</span></div>`;
    }
  });

  compEntries.forEach(([comp,wr])=>{
    const compCount=tips.filter(t=>t.competition===comp&&t.status!=='Pending').length;
    if(compCount>=5&&wr<25){
      h+=`<div class="live-alert warn"><span>⚠️</span><span style="flex:1;font-size:11px">${comp}: ${wr}% win rate — this league is not working for you</span></div>`;
    }
  });

  if(stats.accaWinRate<20&&tips.filter(t=>t.isAcca&&t.status!=='Pending').length>=5){
    h+=`<div class="live-alert warn"><span>⚠️</span><span style="flex:1;font-size:11px">Accas at ${stats.accaWinRate}% — try reducing legs or stick to doubles/trebles</span></div>`;
  }

  if(stats.longestWin>=5){
    h+=`<div class="sus-alert" style="background:rgba(51,217,106,.06);border-color:rgba(51,217,106,.12)"><span>🔥</span><span style="flex:1;font-size:11px">Longest winning streak: ${stats.longestWin} tips — strong form period</span></div>`;
  }

  if(!btEntries.length&&!compEntries.length){
    h+=`<div style="font-size:11px;color:var(--text3);padding:8px 20px">No pattern alerts yet — settle more tips to see insights.</div>`;
  }

  el.innerHTML=h;

  // Render charts — wait for Chart.js to load
  waitForChart(()=>renderIntelCharts(stats,weeklyData));
}

function waitForChart(cb,tries=0){
  if(typeof Chart!=='undefined'){cb();return}
  if(tries>=50){document.querySelectorAll('#page-intelligence canvas').forEach(c=>{const p=c.parentElement;if(p)p.innerHTML=`<div style="text-align:center;padding:20px;font-size:11px;color:var(--text3)">Charts unavailable — reload the page</div>`});return}
  setTimeout(()=>waitForChart(cb,tries+1),100);
}
function renderIntelCharts(stats,weeklyData){
  if(typeof Chart==='undefined') return;
  const isLight=document.documentElement.getAttribute('data-theme')==='light';
  const gridCol=isLight?'#e8e0cc':'#262630';
  const tickCol=isLight?'#5c4a35':'#999';
  const darkOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tickCol,font:{size:10}},grid:{color:gridCol}},y:{ticks:{color:tickCol,font:{size:10}},grid:{color:gridCol}}}};

  // Bet type chart
  const btCtx=document.getElementById('chart-bettype');
  if(btCtx){
    const entries=Object.entries(stats.winRateByBetType||{}).sort((a,b)=>b[1]-a[1]);
    new Chart(btCtx,{type:'bar',data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>e[1]),backgroundColor:isLight?'#1a7a3c':'#33d96a',borderRadius:4}]},options:{...darkOpts,indexAxis:'y',scales:{...darkOpts.scales,x:{...darkOpts.scales.x,max:100}}}});
  }

  // Competition chart
  const compCtx=document.getElementById('chart-comp');
  if(compCtx){
    const entries=Object.entries(stats.winRateByComp||{}).sort((a,b)=>b[1]-a[1]);
    new Chart(compCtx,{type:'bar',data:{labels:entries.map(e=>e[0]),datasets:[{data:entries.map(e=>e[1]),backgroundColor:isLight?'#1558a8':'#6699ff',borderRadius:4}]},options:{...darkOpts,indexAxis:'y',scales:{...darkOpts.scales,x:{...darkOpts.scales.x,max:100}}}});
  }

  // Weekly chart
  const wkCtx=document.getElementById('chart-weekly');
  if(wkCtx){
    const weeks=Object.keys(weeklyData).sort().slice(-8);
    new Chart(wkCtx,{type:'line',data:{labels:weeks,datasets:[{data:weeks.map(w=>weeklyData[w]||0),borderColor:isLight?'#c85a00':'#ffd700',backgroundColor:isLight?'rgba(200,90,0,.08)':'rgba(255,215,0,.1)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:isLight?'#c85a00':'#ffd700'}]},options:darkOpts});
  }
}

async function generateAnalysis(){

  try{

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',

      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sysP,messages:[{role:'user',content:userP}]})
    });

    if(!resp.ok) throw new Error(`API error ${resp.status}`);
    const data=await resp.json();

    const analysis=data.content?.[0]?.text||'No analysis returned';
    localStorage.setItem('lastAIAnalysis',analysis);

    loadIntelligence();
  }catch(e){
    if(statusEl)statusEl.innerHTML=`<div class="errbanner" style="margin:6px 0">❌ ${e.message}</div>`;
    if(btn)btn.disabled=false;
  }
}

function vedgeChip(modelProb,odds,label){
  const dec=parseFloat(odds);
  if(!dec||dec<=1) return `<span class="vedge-chip edge-none" onclick="event.stopPropagation()">No odds</span>`;
  const implied=1/dec*100;
  const edge=modelProb-implied;
  let cls='edge-poor',txt='Poor';
  if(edge>10){cls='edge-good';txt='Good value'}
  else if(edge>=0){cls='edge-fair';txt='Fair'}
  const eStr=edge>=0?'+'+edge.toFixed(0)+'%':edge.toFixed(0)+'%';
  return `<span class="vedge-chip ${cls}" onclick="event.stopPropagation();showVedge(${modelProb.toFixed(1)},${implied.toFixed(1)},${edge.toFixed(1)})" aria-label="Value edge: ${txt} ${eStr}">${txt} ${eStr}</span>`;
}
function showVedge(model,implied,edge){
  const el=document.getElementById('vedge-popover');
  document.getElementById('vedge-body').innerHTML=`<div style="font-size:13px;font-weight:700;margin-bottom:4px">Value Edge Analysis</div><div style="font-size:12px;line-height:1.6">Our model: <strong>${model}%</strong><br>Odds imply: <strong>${implied}%</strong><br>Edge: <strong style="color:${edge>10?'var(--green)':edge>=0?'var(--orange)':'var(--red)'}">${edge>=0?'+':''}${edge}%</strong></div>`;
  el.classList.add('show');
}
function closeVedge(){document.getElementById('vedge-popover').classList.remove('show')}

function getBetTracker(){try{return JSON.parse(localStorage.getItem('bapro_bet_tracker'))||[]}catch(e){return[]}}
function saveBetTracker(arr){localStorage.setItem('bapro_bet_tracker',JSON.stringify(arr))}
let trackerFilter='All',trackerSort='date';

function trackBet(match,type,selection,odds,notes){
  const bets=getBetTracker();
  const bet={id:Date.now()+'_'+Math.random().toString(36).slice(2,6),date:new Date().toISOString(),match:match||'Unknown',type:type||'Booking',selection:selection||'',odds:odds||'',result:'pending',notes:notes||'',pnl:0};
  bets.unshift(bet);
  saveBetTracker(bets);
  // FIX 10: Success micro-animation
  const clickedBtn=event?.target?.closest('.track-btn');
  if(clickedBtn){showTrackSuccess(clickedBtn);return}
  const t=document.getElementById('copy-toast');
  if(t){t.textContent='Bet tracked \u2713';t.classList.add('show');setTimeout(()=>{t.classList.remove('show');t.textContent='Copied to clipboard \u2713'},1500)}
}

function updateBetResult(id,result){
  const bets=getBetTracker();
  const b=bets.find(b=>b.id===id);
  if(!b) return;
  b.result=result;
  if(result==='won'&&b.odds){b.pnl=parseFloat(b.odds)-1}
  else if(result==='lost'){b.pnl=-1}
  else {b.pnl=0}
  saveBetTracker(bets);
  loadTracker();
}

function deleteBet(id){
  if(!confirm('Delete this bet?')) return;
  const bets=getBetTracker().filter(b=>b.id!==id);
  saveBetTracker(bets);
  loadTracker();
}

function exportTrackerCSV(){
  const bets=getBetTracker();
  if(!bets.length){alert('No bets to export');return}
  let csv='Date,Match,Type,Selection,Odds,Result,P&L,Notes\n';
  bets.forEach(b=>{csv+=`"${b.date}","${b.match}","${b.type}","${b.selection}","${b.odds}","${b.result}","${b.pnl}","${b.notes||''}"\n`});
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='bet-tracker-export.csv';a.click();
  URL.revokeObjectURL(url);
}

function loadTracker(){
  const el=document.getElementById('page-tracker');
  const bets=getBetTracker();
  let h=`<div class="pg-title">📈 Bet Tracker</div>`;

  if(!bets.length){
    h+=`<div class="empty"><div class="ei">📈</div><div class="et">No bets tracked yet</div><div class="es">Tap "Track this bet" on any prediction to start logging.</div></div>`;
    el.innerHTML=h;return;
  }

  // Stats
  const won=bets.filter(b=>b.result==='won').length;
  const lost=bets.filter(b=>b.result==='lost').length;
  const voided=bets.filter(b=>b.result==='void').length;
  const pending=bets.filter(b=>b.result==='pending').length;
  const decided=won+lost;
  const strikeRate=decided>0?Math.round(won/decided*100):0;
  const totalPnl=bets.reduce((s,b)=>s+(b.pnl||0),0);
  const roi=decided>0?(totalPnl/decided*100).toFixed(1):'0.0';

  h+=`<div class="stat-grid tracker-hdr-wide" style="padding:0 16px 8px">`;
  h+=`<div class="stat-card" style="padding:8px"><div class="lb">Total</div><div class="vl" style="font-size:18px">${bets.length}</div></div>`;
  h+=`<div class="stat-card" style="padding:8px"><div class="lb" style="color:var(--green)">Won</div><div class="vl" style="font-size:18px;color:var(--green)">${won}</div></div>`;
  h+=`<div class="stat-card" style="padding:8px"><div class="lb" style="color:var(--red)">Lost</div><div class="vl" style="font-size:18px;color:var(--red)">${lost}</div></div>`;
  h+=`<div class="stat-card" style="padding:8px"><div class="lb">Strike</div><div class="vl" style="font-size:18px;color:var(--yellow)">${strikeRate}%</div></div>`;
  h+=`<div class="stat-card" style="padding:8px"><div class="lb">ROI</div><div class="vl" style="font-size:18px;color:${totalPnl>=0?'var(--green)':'var(--red)'};">${roi}%</div></div>`;
  h+=`</div>`;

  // Sparkline
  const last20=bets.filter(b=>b.result==='won'||b.result==='lost').slice(0,20).reverse();
  if(last20.length>=3){
    h+=`<div class="card" style="padding:10px"><div style="font-size:10px;color:var(--text3);margin-bottom:4px">LAST ${last20.length} RESULTS</div><canvas id="tracker-sparkline" height="40"></canvas></div>`;
  }

  // Filters
  h+=`<div class="pills" style="margin-top:4px"><button class="pill${trackerFilter==='All'?' on':''}" onclick="trackerFilter='All';loadTracker()">All (${bets.length})</button><button class="pill${trackerFilter==='won'?' on':''}" onclick="trackerFilter='won';loadTracker()">Won (${won})</button><button class="pill${trackerFilter==='lost'?' on':''}" onclick="trackerFilter='lost';loadTracker()">Lost (${lost})</button><button class="pill${trackerFilter==='void'?' on':''}" onclick="trackerFilter='void';loadTracker()">Void (${voided})</button><button class="pill${trackerFilter==='pending'?' on':''}" onclick="trackerFilter='pending';loadTracker()">Pending (${pending})</button></div>`;

  // Table
  const filtered=trackerFilter==='All'?bets:bets.filter(b=>b.result===trackerFilter);
  h+=`<div class="card card-flush" style="overflow-x:auto"><table class="tracker-tbl"><thead><tr><th>Date</th><th>Match</th><th>Type</th><th>Selection</th><th>Result</th><th></th></tr></thead><tbody>`;
  filtered.forEach(b=>{
    const rCol=b.result==='won'?'var(--green)':b.result==='lost'?'var(--red)':b.result==='void'?'var(--text3)':'var(--orange)';
    h+=`<tr><td style="font-size:10px;white-space:nowrap">${sdate(b.date)}</td><td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.match}</td><td style="font-size:10px">${b.type}</td><td style="font-size:10px">${b.selection}</td><td><select style="font-size:10px;padding:2px 4px;border-radius:4px;border:1px solid var(--divider);background:var(--card2);color:${rCol};font-weight:700" onchange="updateBetResult('${b.id}',this.value)"><option value="pending"${b.result==='pending'?' selected':''}>Pending</option><option value="won"${b.result==='won'?' selected':''}>Won</option><option value="lost"${b.result==='lost'?' selected':''}>Lost</option><option value="void"${b.result==='void'?' selected':''}>Void</option></select></td><td><button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px" onclick="deleteBet('${b.id}')" aria-label="Delete bet">✕</button></td></tr>`;
  });
  h+=`</tbody></table></div>`;

  // Category accuracy
  const cats={};
  bets.filter(b=>b.result!=='pending'&&b.result!=='void').forEach(b=>{
    if(!cats[b.type]) cats[b.type]={won:0,total:0};
    cats[b.type].total++;
    if(b.result==='won') cats[b.type].won++;
  });
  const catEntries=Object.entries(cats);
  if(catEntries.length){
    h+=`<div class="sec-title">Category Accuracy</div><div class="stat-grid" style="padding:0 16px 8px">`;
    catEntries.forEach(([cat,d])=>{
      const pct=d.total>0?Math.round(d.won/d.total*100):0;
      h+=`<div class="stat-card" style="padding:8px"><div class="lb">${cat}</div><div class="vl" style="font-size:16px;color:${pct>=50?'var(--green)':'var(--red)'}">${pct}%</div><div class="sub">${d.won}/${d.total}</div></div>`;
    });
    h+=`</div>`;
  }

  // Export
  h+=`<div style="text-align:center;padding:12px"><button class="btn-p" onclick="exportTrackerCSV()" style="font-size:12px">📥 Export CSV</button></div>`;

  el.innerHTML=h;

  // Render sparkline
  if(last20.length>=3){
    waitForChart(()=>{
      const ctx=document.getElementById('tracker-sparkline');
      if(!ctx) return;
      const isLight=document.documentElement.getAttribute('data-theme')==='light';
      new Chart(ctx,{type:'line',data:{labels:last20.map((_,i)=>i+1),datasets:[{data:last20.map(b=>b.result==='won'?1:0),borderColor:isLight?'#1a7a3c':'#33d96a',backgroundColor:isLight?'rgba(26,122,60,.1)':'rgba(51,217,106,.1)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:last20.map(b=>b.result==='won'?(isLight?'#1a7a3c':'#33d96a'):(isLight?'#b5000a':'#e53333'))}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false,min:-0.2,max:1.2}}}});
    });
  }
}

// Track bet button HTML helper
function trackBtn(match,type,selection,odds){
  const m=(match||'').replace(/'/g,"\\'");
  const t=(type||'Booking').replace(/'/g,"\\'");
  const s=(selection||'').replace(/'/g,"\\'");
  const o=odds||'';
  return `<button class="track-btn" onclick="event.stopPropagation();trackBet('${m}','${t}','${s}','${o}')" aria-label="Track this bet">📊 Track</button>`;
}

// ======================================================================
//  FEATURE 1 — BOOKING POINTS TAB
// ======================================================================
async function loadBookingPts(){
  const el=document.getElementById('page-bookingpts');
  el.innerHTML=`<div class="pg-title">&#x1F3AF; Booking Points ${refreshBtn('bookingpts')}${freshnessBadge('bookingpts')}</div>${leagueHdr()}${lpicker()}${skeleton('table')}`;
  try{
    const [yl,fx]=await Promise.all([
      api('/players/topyellowcards',{league:S.league,season:S.season},43200),
      api('/fixtures',{league:S.league,season:S.season,next:15},300)
    ]);
    const players=yl.map(toP).filter(Boolean);
    const calMult=getCalMult(S.league);

    markLoaded('bookingpts');
    let h=`<div class="pg-title">&#x1F3AF; Booking Points ${refreshBtn('bookingpts')}${freshnessBadge('bookingpts')}</div>${leagueHdr()}${lpicker()}<div style="padding:4px 0">${spicker()}</div>`;
    h+=`<div style="font-size:10px;color:var(--text3);padding:0 20px 6px">Yellow=10pts · Red=25pts · 2nd Yellow+Red=35pts ${calBadge(S.league)}</div>`;

    // Panel A: Match Booking Points Predictions
    h+=`<div class="sec-title"><span class="dot" style="background:var(--yellow)"></span>Match Booking Points Predictions</div>`;
    if(!fx.length){h+=`<div class="empty"><div class="et">No upcoming fixtures</div></div>`}
    for(const f of fx.slice(0,10)){
      const homePlayers=players.filter(p=>p.tid===f.teams.home.id);
      const awayPlayers=players.filter(p=>p.tid===f.teams.away.id);
      let refFactor=0.5;
      if(f.fixture.referee){const rn=f.fixture.referee.split(',')[0].trim();const rs=S.refCache[rn];if(rs)refFactor=Math.min(rs.cpm/8,1)}

      const homeYpred=homePlayers.reduce((s,p)=>s+p.p90*(p.mins/90>0?1:0.5),0)*0.8+refFactor*2;
      const awayYpred=awayPlayers.reduce((s,p)=>s+p.p90*(p.mins/90>0?1:0.5),0)*0.8+refFactor*2;
      const predYellows=Math.max(2,(homeYpred+awayYpred)*calMult);
      const predReds=refFactor*0.3*calMult;
      const rawPts=predYellows*10+predReds*25;
      const pts=Math.round(rawPts);
      const homePts=Math.round(rawPts*(homeYpred/(homeYpred+awayYpred+0.01)));
      const awayPts=pts-homePts;

      let riskLbl='LOW',riskCls='bp-risk-low';
      if(pts>=60){riskLbl='VERY HIGH';riskCls='bp-risk-vhigh'}
      else if(pts>=40){riskLbl='HIGH';riskCls='bp-risk-high'}
      else if(pts>=20){riskLbl='MEDIUM';riskCls='bp-risk-med'}

      h+=`<div class="predcard">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="ptitle" style="flex:1">${f.teams.home.name} vs ${f.teams.away.name}</div><span class="rbadge ${riskCls}">${riskLbl}</span></div>`;
      h+=`<div style="font-size:10px;color:var(--text3);margin-bottom:6px">${stime(f.fixture.date)} ${sdate(f.fixture.date)}${f.fixture.referee?' · 🏁 '+f.fixture.referee.split(',')[0]:''}</div>`;

      h+=`<div style="display:flex;gap:6px;margin-bottom:6px">`;
      h+=`<div class="stat-card" style="flex:1;padding:8px;text-align:center"><div class="lb">Total Pts</div><div class="vl" style="font-size:20px;color:var(--yellow)">${pts}</div></div>`;
      h+=`<div class="stat-card" style="flex:1;padding:8px;text-align:center"><div class="lb">${f.teams.home.name.split(' ')[0]}</div><div class="vl" style="font-size:16px;color:var(--blue)">${homePts}</div></div>`;
      h+=`<div class="stat-card" style="flex:1;padding:8px;text-align:center"><div class="lb">${f.teams.away.name.split(' ')[0]}</div><div class="vl" style="font-size:16px;color:var(--purple)">${awayPts}</div></div>`;
      h+=`</div>`;

      // Over/under lines
      const lines=[20,30,40,50,60];
      h+=`<div style="display:flex;gap:3px;flex-wrap:wrap">`;
      lines.forEach(line=>{
        const over=pts>=line;
        const margin=Math.abs(pts-line);
        const conf=Math.min(95,Math.round(50+margin*1.5));
        h+=`<span class="bp-line ${over?'bp-over':'bp-under'}">${over?'O':'U'}${line} ${conf}%</span>`;
      });
      h+=`</div>`;
      h+=`<div style="display:flex;justify-content:flex-end;margin-top:6px">${trackBtn(f.teams.home.name+' vs '+f.teams.away.name,'Booking Points','Over '+pts+' pts','')}</div>`;
      h+=`</div>`;
    }

    // Panel B: Team Booking Points League Table
    h+=`<div class="sec-title"><span class="dot" style="background:var(--blue)"></span>Team Booking Points Table</div>`;
    const teamMap={};
    const recentFx=await api('/fixtures',{league:S.league,season:S.season,last:50},3600);
    recentFx.forEach(f=>{
      if(!['FT','AET','PEN'].includes(f.fixture.status.short)) return;
      [f.teams.home,f.teams.away].forEach(team=>{
        if(!teamMap[team.id]) teamMap[team.id]={name:team.name,logo:team.logo,matches:0,yellows:0,reds:0,pts:0,highest:0};
      });
    });
    // Count from player data
    players.forEach(p=>{
      if(!teamMap[p.tid]) teamMap[p.tid]={name:p.team,logo:p.tlogo,matches:0,yellows:0,reds:0,pts:0,highest:0};
      teamMap[p.tid].yellows+=p.y+p.yr;
      teamMap[p.tid].reds+=p.rd;
    });
    const teamArr=Object.values(teamMap).map(t=>{
      t.pts=(t.yellows*10)+(t.reds*25);
      const played=recentFx.filter(f=>{
        if(!['FT','AET','PEN'].includes(f.fixture.status.short)) return false;
        return f.teams.home.name===t.name||f.teams.away.name===t.name;
      }).length;
      t.matches=played||1;
      t.avg=Math.round(t.pts/t.matches);
      return t;
    }).filter(t=>t.pts>0).sort((a,b)=>b.pts-a.pts);

    if(teamArr.length){
      h+=`<div class="card card-flush" style="overflow-x:auto"><table class="stable"><thead><tr><th>Team</th><th class="n">M</th><th class="n">Pts</th><th class="n">Avg</th><th class="n">Y</th><th class="n">R</th></tr></thead><tbody>`;
      teamArr.forEach(t=>{
        h+=`<tr><td><div class="tname" onclick="openTeam(${Object.keys(teamMap).find(k=>teamMap[k].name===t.name)||0},'${esc(t.name)}')"><img src="${t.logo||''}" alt="" style="width:16px;height:16px" onerror="this.style.display='none'">${t.name}</div></td><td class="n">${t.matches}</td><td class="n" style="font-weight:800;color:var(--yellow)">${t.pts}</td><td class="n">${t.avg}</td><td class="n">${t.yellows}</td><td class="n" style="color:var(--red)">${t.reds}</td></tr>`;
      });
      h+=`</tbody></table></div>`;
    }

    // Panel C: Player Booking Points Leaderboard
    h+=`<div class="sec-title"><span class="dot" style="background:var(--orange)"></span>Player Booking Points Leaderboard</div>`;
    const playerBP=players.map(p=>{
      const pts=(p.y+p.yr)*10+p.rd*25;
      const pp90=p.mins>0?pts/(p.mins/90):0;
      return {...p,bpts:pts,bpp90:pp90};
    }).sort((a,b)=>b.bpts-a.bpts).slice(0,20);

    if(playerBP.length){
      h+=`<div class="card card-flush">`;
      playerBP.forEach((p,i)=>{
        h+=`<div class="prow" onclick="openPlayer(${p.id})"><span class="prank">${i+1}</span><img class="pphoto" src="${p.photo||''}" alt="" onerror="this.src=''"><div class="pinfo"><div class="pname">${p.name}</div><div class="pteam"><img src="${p.tlogo||''}" alt="" onerror="this.style.display='none'">${p.team} · ${p.pos}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:800;color:var(--yellow)">${p.bpts}</div><div style="font-size:10px;color:var(--text3)">${p.bpp90.toFixed(1)}/90</div></div></div>`;
        if(i<playerBP.length-1) h+=`<div class="rdiv"></div>`;
      });
      h+=`</div>`;
    }

    // Feature 8 Panel: High-Card Leagues comparison
    h+=`<div class="sec-title"><span class="dot" style="background:var(--red)"></span>High-Card Leagues Comparison</div>`;
    const leagueComps=Object.entries(LEAGUE_CALIBRATION).map(([id,d])=>({id:+id,...d,avgPts:Math.round(d.avgCards*10+0.3*25)})).sort((a,b)=>b.avgCards-a.avgCards);
    h+=`<div class="card card-flush" style="overflow-x:auto"><table class="stable"><thead><tr><th>League</th><th class="n">Cards/M</th><th class="n">Pts/M</th><th class="n">Multiplier</th></tr></thead><tbody>`;
    leagueComps.forEach(l=>{
      const diffPct=Math.round((l.mult-1)*100);
      const diffCol=diffPct>10?'var(--red)':diffPct>0?'var(--orange)':diffPct<-5?'var(--blue)':'var(--text3)';
      h+=`<tr><td style="font-size:10px;font-weight:600">${l.name}</td><td class="n" style="color:${l.avgCards>=5?'var(--red)':l.avgCards>=4?'var(--orange)':'var(--text)'}">${l.avgCards}</td><td class="n" style="color:var(--yellow)">${l.avgPts}</td><td class="n" style="color:${diffCol}">${l.mult.toFixed(2)}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
    h+=`<div style="padding:8px 16px;font-size:10px;color:var(--text3);background:rgba(229,51,51,.04);border-radius:10px;margin:6px 16px">Bolivia, Colombia and Paraguay average 5.5-6.2 cards per match. Our model applies league-specific calibration to all predictions.</div>`;

    el.innerHTML=h;
  }catch(e){el.innerHTML=`<div class="pg-title">&#x1F3AF; Booking Points ${refreshBtn('bookingpts')}</div>${leagueHdr()}${lpicker()}${errPanel(e.message)}`}
}

// ---- Theme ----
function setTheme(theme){
  localStorage.setItem('ba_theme',theme);
  if(theme==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('meta[name="theme-color"]')?.setAttribute('content','#f5f0e8')}
  else{document.documentElement.removeAttribute('data-theme');document.querySelector('meta[name="theme-color"]')?.setAttribute('content','#111118')}
  const btn=document.getElementById('theme-toggle-btn');
  if(btn) btn.textContent=theme==='light'?'🌙':'☀️';
  if(S.tab==='settings') renderSettings();
}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');setTheme(cur==='light'?'dark':'light')}
function initTheme(){const saved=localStorage.getItem('ba_theme');if(saved==='light')setTheme('light');else setTheme('dark')}

buildNav();
showOnboarding();

setTimeout(()=>{initSupabase();fullSupabaseSync().catch(()=>{})},1000);

// FIX 1: Nav scroll indicator
(function(){
  const navRow=document.getElementById('nav-row');
  if(navRow){
    function checkScroll(){
      const atEnd=navRow.scrollLeft+navRow.clientWidth>=navRow.scrollWidth-5;
      navRow.classList.toggle('scrolled-end',atEnd);
    }
    navRow.addEventListener('scroll',checkScroll,{passive:true});

  }
})();
